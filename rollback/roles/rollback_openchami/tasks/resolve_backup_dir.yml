# ============================================================================
# resolve_backup_dir.yml — Resolve Backup Directory for Rollback
# ============================================================================
# Reads the upgrade_manifest.yml to determine where the pre-upgrade backup
# was stored. Falls back to rollback_backup_dir_default if manifest is
# unavailable. Also resolves the OIM host-side shared path for delegated
# tasks.
# ============================================================================

# ── Resolve rollback_backup_dir (skip if already set by parent playbook) ──
# On first invocation, reads upgrade_manifest.yml for backup_dir.
# On reruns (after rollback.yml archives upgrade_manifest.yml), the parent
# playbook (rollback_oim.yml) pre-sets rollback_backup_dir via set_fact.
- name: Check if rollback_backup_dir is already set
  ansible.builtin.set_fact:
    _rollback_backup_dir_preset: "{{ (rollback_backup_dir is defined) and (rollback_backup_dir | trim | length > 0) }}"

- name: Check if upgrade_manifest.yml exists
  ansible.builtin.stat:
    path: "{{ manifest_path }}"
  register: rollback_manifest_stat
  when: not (_rollback_backup_dir_preset | bool)

- name: Read upgrade_manifest.yml for backup_dir
  ansible.builtin.slurp:
    src: "{{ manifest_path }}"
  register: rollback_raw_manifest
  when:
    - not (_rollback_backup_dir_preset | bool)
    - rollback_manifest_stat.stat.exists | default(false)

- name: Set rollback backup directory from manifest
  ansible.builtin.set_fact:
    rollback_backup_dir: >-
      {{ (rollback_raw_manifest.content | b64decode | from_yaml).backup_dir
         | default(rollback_backup_dir_default)
         if rollback_manifest_stat.stat.exists | default(false)
         else rollback_backup_dir_default }}
  when: not (_rollback_backup_dir_preset | bool)

- name: Read oim_metadata.yml for shared path
  ansible.builtin.slurp:
    src: "{{ oim_metadata_path }}"
  register: rollback_oim_metadata_raw

- name: Parse oim_shared_path from metadata
  ansible.builtin.set_fact:
    rollback_oim_shared_path: >-
      {{ (rollback_oim_metadata_raw.content | b64decode | from_yaml).oim_shared_path
         | regex_replace('/$', '') }}
    rollback_cluster_name: >-
      {{ (rollback_oim_metadata_raw.content | b64decode | from_yaml).oim_node_name
         | default(ansible_hostname) }}

- name: Compute OIM host-side backup directory
  ansible.builtin.set_fact:
    rollback_oim_host_backup_dir: >-
      {{ rollback_backup_dir | regex_replace('^/opt/omnia', rollback_oim_shared_path ~ '/omnia') }}

- name: Display resolved rollback paths
  ansible.builtin.debug:
    verbosity: 1
    msg:
      - "Rollback backup dir (container): {{ rollback_backup_dir }}"
      - "Rollback backup dir (OIM host):  {{ rollback_oim_host_backup_dir }}"
      - "OIM shared path: {{ rollback_oim_shared_path }}"
      - "Cluster name: {{ rollback_cluster_name }}"
