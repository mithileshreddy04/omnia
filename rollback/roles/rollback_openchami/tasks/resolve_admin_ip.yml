# ============================================================================
# resolve_admin_ip.yml — Resolve OpenCHAMI API Endpoints via podman inspect
# ============================================================================
# Dynamically discovers SMD and BSS container IP addresses and ports from the
# running containers on the OIM using `podman inspect`. This avoids reliance
# on HAProxy HTTPS (which requires valid TLS certificates) and reads the
# actual runtime network state for direct HTTP access.
#
# Sets facts:
#   openchami_smd_endpoint  — Full SMD base URL (http://ip:port/hsm/v2)
#   openchami_bss_endpoint  — Full BSS base URL (http://ip:port/boot/v1)
#
# These facts override the vars/main.yml HTTPS defaults so all downstream
# tasks (health checks) use direct HTTP, bypassing HAProxy/TLS entirely.
# ============================================================================

- name: Get SMD container IP address
  ansible.builtin.shell: |
    set -o pipefail
    podman inspect -f '{% raw %}{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}{% endraw %}' smd
  register: _smd_ip_result
  changed_when: false
  failed_when: _smd_ip_result.rc != 0 or _smd_ip_result.stdout | trim | length == 0
  retries: "{{ max_retries }}"
  delay: "{{ max_delay }}"
  until: _smd_ip_result.rc == 0 and (_smd_ip_result.stdout | default('') | trim | length > 0)
  delegate_to: oim
  delegate_facts: true
  connection: ssh

- name: Get SMD container port
  ansible.builtin.shell: |
    set -o pipefail
    podman inspect -f '{% raw %}{{range $k, $v := .NetworkSettings.Ports}}{{$k}}{{end}}{% endraw %}' smd | sed 's|/tcp||'
  register: _smd_port_result
  changed_when: false
  failed_when: _smd_port_result.rc != 0 or _smd_port_result.stdout | trim | length == 0
  retries: "{{ max_retries }}"
  delay: "{{ max_delay }}"
  until: _smd_port_result.rc == 0 and (_smd_port_result.stdout | default('') | trim | length > 0)
  delegate_to: oim
  delegate_facts: true
  connection: ssh

- name: Get BSS container IP address
  ansible.builtin.shell: |
    set -o pipefail
    podman inspect -f '{% raw %}{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}{% endraw %}' bss
  register: _bss_ip_result
  changed_when: false
  failed_when: _bss_ip_result.rc != 0 or _bss_ip_result.stdout | trim | length == 0
  retries: "{{ max_retries }}"
  delay: "{{ max_delay }}"
  until: _bss_ip_result.rc == 0 and (_bss_ip_result.stdout | default('') | trim | length > 0)
  delegate_to: oim
  delegate_facts: true
  connection: ssh

- name: Get BSS container port
  ansible.builtin.shell: |
    set -o pipefail
    podman inspect -f '{% raw %}{{range $k, $v := .NetworkSettings.Ports}}{{$k}}{{end}}{% endraw %}' bss | sed 's|/tcp||'
  register: _bss_port_result
  changed_when: false
  failed_when: _bss_port_result.rc != 0 or _bss_port_result.stdout | trim | length == 0
  retries: "{{ max_retries }}"
  delay: "{{ max_delay }}"
  until: _bss_port_result.rc == 0 and (_bss_port_result.stdout | default('') | trim | length > 0)
  delegate_to: oim
  delegate_facts: true
  connection: ssh

- name: Set OpenCHAMI endpoint facts from container inspection
  ansible.builtin.set_fact:
    openchami_smd_endpoint: "http://{{ _smd_ip_result.stdout | trim }}:{{ _smd_port_result.stdout | trim }}/hsm/v2"
    openchami_bss_endpoint: "http://{{ _bss_ip_result.stdout | trim }}:{{ _bss_port_result.stdout | trim }}/boot/v1"

- name: Display the discovered OpenCHAMI endpoints
  ansible.builtin.debug:
    verbosity: 1
    msg:
      - "SMD endpoint: {{ openchami_smd_endpoint }}"
      - "BSS endpoint: {{ openchami_bss_endpoint }}"
