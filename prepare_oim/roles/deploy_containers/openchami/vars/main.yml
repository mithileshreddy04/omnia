---

# Usage: deploy_openchami.yml
openchami_git_repo: https://github.com/OpenCHAMI/deployment-recipes.git
openchami_share_dir: /opt/omnia/openchami
openchami_clone_path: "{{ openchami_share_dir }}/deployment-recipes"
openchami_git_version: bf1f6dfdc7f6107a4227568987faedb1b79b95fa
clone_retry: "5"
clone_delay: "10"
dir_permissions_755: "0755"
file_permissions_644: "0644"
openchami_log_dir: /opt/omnia/log/openchami
openchami_inventory_template: "{{ role_path }}/templates/inventory.yaml.j2"
openchami_inventory_file: "{{ openchami_clone_path }}/dell/podman-quadlets/inventory/01-ochami"
openchami_config_vars_path: "/opt/omnia/openchami/configs_vars.yaml"
openchami_config_vars_template: "{{ role_path }}/templates/configs.yaml.j2"
openchami_coredhcp_template: "{{ role_path }}/templates/coredhcp.yaml.j2"
openchami_coredhcp_target: "{{ openchami_clone_path }}/dell/podman-quadlets/roles/configs/templates/coredhcp/coredhcp.yaml.j2"
openchami_install_fail_msg: "Failed to install OpenCHAMI"
network_spec: "{{ hostvars['localhost']['input_project_dir'] }}/network_spec.yml"
network_spec_syntax_fail_msg: "Failed. Syntax errors present in network_spec.yml. Fix errors and re-run playbook again."
provision_config: "{{ hostvars['localhost']['input_project_dir'] }}/provision_config.yml"
provision_config_syntax_fail_msg: "Failed. Syntax errors present in provision_config.yml. Fix errors and re-run playbook again."

# Usage: deploy_openchami.yml - pull openchami images
pull_image_retries: 5
pull_image_delay: 10

# OpenCHAMI image tags
openchami_local_ca_tag: "v0.2.6"
openchami_opaal_tag: "v0.3.12"
openchami_smd_tag: "v2.19.3"
openchami_bss_tag: "v1.32.2"
openchami_cloud_init_tag: "v1.3.0"
openchami_coresmd_tag: "v0.4.3"
# Third-party image tags for OpenCHAMI
minio_release_tag: "RELEASE.2026-04-17T00-00-00Z"
postgres_tag: "11.5-alpine"
hydra_tag: "v2.3"
haproxy_tag: "latest"
registry_tag: "3.1.0"
curl_tag: "latest"
acme_tag: "3.1.1"

# OpenCHAMI images list for podman pull on OIM
openchami_images:
  - "ghcr.io/openchami/local-ca:{{ openchami_local_ca_tag }}"
  - "ghcr.io/openchami/opaal:{{ openchami_opaal_tag }}"
  - "ghcr.io/openchami/smd:{{ openchami_smd_tag }}"
  - "ghcr.io/openchami/bss:{{ openchami_bss_tag }}"
  - "ghcr.io/openchami/cloud-init:{{ openchami_cloud_init_tag }}"
  - "ghcr.io/openchami/coresmd:{{ openchami_coresmd_tag }}"
  - "docker.io/pgsty/minio:{{ minio_release_tag }}"
  - "docker.io/library/postgres:{{ postgres_tag }}"
  - "docker.io/oryd/hydra:{{ hydra_tag }}"
  - "cgr.dev/chainguard/haproxy:{{ haproxy_tag }}"
  - "docker.io/library/registry:{{ registry_tag }}"
  - "cgr.dev/chainguard/curl:{{ curl_tag }}"
  - "docker.io/neilpang/acme.sh:{{ acme_tag }}"

# Usage: verify_openchami.yml
cluster_env_key: "{{ oim_node_name | upper }}_ACCESS_TOKEN"

# --- OpenCHAMI configs role variables ---
# Directory paths
ochami_dir: /etc/ochami
openchami_dir: /etc/openchami
openchami_config_dir: "{{ openchami_dir }}/configs"
openchami_work_dir: "{{ oim_shared_path }}/omnia/openchami/workdir"
data_oci_dir: "{{ oim_shared_path }}/omnia/openchami/s3/data/oci"
data_s3_dir: "{{ oim_shared_path }}/omnia/openchami/s3/data/s3"
s3_work_dir: "{{ oim_shared_path }}/omnia/openchami/s3"

# File permissions
file_perm_rw: "0644"
file_perm_rwx: "0755"

# Ochami CLI config
ochami_cli_log_level: warning
ochami_cli_log_format: rfc3339
ochami_base_url: "https://{{ cluster_name }}.{{ cluster_domain }}:8443"

# OpenCHAMI RPM packages
openchami_rpm_url: https://github.com/OpenCHAMI/release/releases/download/v0.1.5/openchami-0.1.5.rpm
openchami_rpm_name: openchami-0.1.5.rpm
ochami_client_rpm_url: https://github.com/OpenCHAMI/ochami/releases/download/v0.7.1/ochami_0.7.1_linux_amd64.rpm
ochami_client_rpm_name: ochami_0.7.1_linux_amd64.rpm

# System package dependencies
ochami_package_dependencies:
  - buildah
  - jq
  - netavark
  - podman
  - python3
  - python3-pip
  - python3-pyyaml
  - python3-requests

ochami_pip_packages:
  - requests
  - pyyaml
  - jwt
  - jmespath

# Firewall ports
tcp_ports:
  - 9000
  - 9001
  - 5000
  - 5432
  - 27778
  - 27779
  - 8081
  - 8443
udp_ports:
  - 69
  - 67
  - 68
podman_interfaces:
  - podman0
  - podman1
  - podman2
  - podman3
  - podman4

# Retry / timeout settings
wait_time: 30
max_delay: 10
max_retries: 10

# regctl
regctl_url: https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64
regctl_dest: /usr/local/bin/regctl

# EPEL
epel10_url: https://dl.fedoraproject.org/pub/epel/epel-release-latest-10.noarch.rpm
epel10_gpg_key: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-10

# DNS forwarders for CoreDNS
dns_forwarders:
  - 8.8.8.8
  - 1.1.1.1

# CA certificate path for CoreDNS coresmd plugin
ca_cert_path: /root_ca/root_ca.crt

# CoreDHCP defaults (cluster-specific values are set via set_fact in deploy_openchami.yml)
coredhcp_server_id: "{{ cluster_boot_ip }}"
coredhcp_dns_server: "{{ cluster_boot_ip }}"
coredhcp_router: "{{ cluster_boot_ip }}"
coredhcp_tmp_lease_duration: "5m"
coredhcp_cache_validity: "30s"
coredhcp_custom_ipxe: "default"
coredhcp_tftp_single_port_mode: true

# PowerScale S3 endpoint error messages
powerscale_unreachable_msg: |
  Cannot reach PowerScale S3 endpoint: {{ s3_configurations.endpoint_url }}
  Check: network connectivity, S3 service enabled, firewall rules

powerscale_validation_fail_msg: |
  PowerScale S3 backend requires:
    - s3_configurations.endpoint_url in storage_config.yml
    - s3_access_id (PowerScale Access Key -- prompted by prepare_oim)
    - s3_secret_key (PowerScale Secret Key -- prompted by prepare_oim)
