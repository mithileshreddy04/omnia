---

# === EPEL & s3cmd Setup (works for both backends via ~/.s3cfg) ===

- name: Import EPEL GPG key
  ansible.builtin.rpm_key:
    key: "{{ epel10_gpg_key }}"
    state: present

- name: Install EPEL release RPM
  ansible.builtin.dnf:
    name: "{{ epel10_url }}"
    state: present

- name: Install s3cmd
  ansible.builtin.dnf:
    name: s3cmd
    state: present

- name: Create s3cfg
  ansible.builtin.template:
    src: s3/s3cfg.j2
    dest: /root/.s3cfg
    owner: root
    group: root
    mode: "{{ file_perm_rw }}"

# === S3 Bucket Creation ===

- name: Verify s3 bucket
  ansible.builtin.command: s3cmd ls
  changed_when: false
  failed_when: false
  register: s3_bucket_output

- name: Create S3 bucket 'efi'
  ansible.builtin.command: s3cmd mb s3://efi
  register: efi_bucket
  changed_when: "'Bucket' in efi_bucket.stdout"
  when: '"s3://efi" not in s3_bucket_output.stdout'

- name: Create S3 bucket 'boot-images'
  ansible.builtin.command: s3cmd mb s3://boot-images
  register: boot_images_bucket
  changed_when: "'Bucket' in boot_images_bucket.stdout"
  when: '"s3://boot-images" not in s3_bucket_output.stdout'

# === Set ACL to public on buckets AND all objects (recursive) ===
# NOTE: On PowerScale, bucket-level ACL only grants listing.
# Object-level ACL (--recursive) is REQUIRED for anonymous GetObject.

- name: Set ACL to public for 'efi' bucket and all objects
  ansible.builtin.command: s3cmd setacl s3://efi --acl-public --recursive
  changed_when: true

- name: Set ACL to public for 'boot-images' bucket and all objects
  ansible.builtin.command: s3cmd setacl s3://boot-images --acl-public --recursive
  changed_when: true

# === Verify Buckets ===

- name: Verify s3 bucket after creation
  ansible.builtin.command: s3cmd ls
  changed_when: false
  register: s3_bucket_output_final

- name: Verify s3 bucket output
  ansible.builtin.debug:
    msg: "{{ s3_bucket_output_final.stdout_lines }}"

- name: Assert 'efi' and 'boot-images' buckets are present
  ansible.builtin.assert:
    that:
      - '"s3://efi" in s3_bucket_output_final.stdout'
      - '"s3://boot-images" in s3_bucket_output_final.stdout'
    fail_msg: "One or more required S3 buckets were not created successfully."
    success_msg: "All required S3 buckets are confirmed present."

# === PowerScale-specific post-creation tasks (S3 backend only) ===

- name: Update publish_s3 in rhel-base-compute.yaml.j2 to PowerScale endpoint
  ansible.builtin.replace:
    path: >-
      /opt/omnia/openchami/deployment-recipes/dell/podman-quadlets/roles/image/templates/images/rhel-base-compute.yaml.j2
    regexp: "^(\\s*publish_s3:\\s*)'http://\\{\\{\\s*cluster_name\\s*\\}\\}\\.\\{\\{\\s*cluster_domain\\s*\\}\\}:9000'(.*)$"
    replace: "\\1'{{ s3_configurations.endpoint_url }}'\\2"
    backup: true
  when: storage_backend == 'powerscale'
  delegate_to: localhost
  connection: local
