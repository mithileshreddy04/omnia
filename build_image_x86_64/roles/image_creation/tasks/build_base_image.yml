---

- name: Set base image suffix when build stream inputs present
  ansible.builtin.set_fact:
    base_image_suffix: "_{{ build_stream_job_id }}-{{ image_key | default('') }}"
    rhel_base_image_name: "{{ rhel_x86_64_base_image_name }}_{{ build_stream_job_id }}-{{ image_key | default('') }}"
  when:
    - enable_build_stream | bool
    - (build_stream_job_id | default('') | length) > 0
    - (image_key | default('') | length) > 0

- name: Create ochami images directory
  ansible.builtin.file:
    path: "{{ openchami_work_dir }}/images"
    state: directory
    mode: "{{ dir_permissions_755 }}"

- name: Create x86_64 base image log file
  ansible.builtin.file:
    path: "{{ openchami_x86_64_base_image_log_path }}"
    state: touch
    mode: "{{ dir_permissions_644 }}"

- name: Render x86_64 base image build config
  ansible.builtin.template:
    src: "{{ role_path }}/templates/images/rhel-base-config.yaml.j2"
    dest: "{{ openchami_work_dir }}/images/{{ rhel_x86_64_base_image_name }}-{{ rhel_tag }}.yaml"
    mode: "{{ dir_permissions_644 }}"

- name: Build and verify x86_64 base osimage
  block:
    - name: Build x86_64 base osimage
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          podman run --rm --device /dev/fuse --network host \
            {{ ochami_mounts | join(' ') }} \
            {{ ochami_x86_64_image | join(' ') }} \
            {{ ochami_base_command | join(' ') }} \
            > '{{ openchami_x86_64_base_image_log_path }}' 2>&1
      async: 3600
      poll: 0
      register: base_image_build
      changed_when: true

    - name: Wait for x86_64 base image build to complete
      ansible.builtin.async_status:
        jid: "{{ base_image_build.ansible_job_id }}"
      register: job_result
      until: job_result.finished
      retries: "{{ job_retry }}"
      delay: "{{ job_delay }}"

    - name: Verify the x86_64 base osimage in registry
      ansible.builtin.command:
        cmd: "regctl repo ls {{ oim_node_name }}.{{ domain_name }}:5000"
      changed_when: false
      register: verify_base_osimage

    - name: Fail if x86_64 base osimage not created
      ansible.builtin.fail:
        msg: "Failed to build base osimage {{ oim_node_name }}/{{ rhel_x86_64_base_image_name }}"
      when: (oim_node_name + '/' + rhel_x86_64_base_image_name) not in verify_base_osimage.stdout_lines

    - name: Verify x86_64 base osimage output
      ansible.builtin.debug:
        msg: "{{ verify_base_osimage.stdout_lines }}"

  rescue:
    - name: Fail the build if the base image build fails
      ansible.builtin.fail:
        msg: "{{ base_image_failure_msg }}"

  always:
    - name: Set openchami SELinux context for Local flow
      ansible.builtin.command: chcon -R system_u:object_r:container_file_t:s0 "{{ hostvars['localhost']['oim_shared_path'] }}/omnia/openchami"
      changed_when: true
      delegate_to: oim
      connection: ssh
      failed_when: false
      when: hostvars['localhost']['omnia_share_option'] == 'Local'

    - name: Set openchami SELinux context for NFS internal flow
      ansible.builtin.command: chcon -R system_u:object_r:container_file_t:s0 "{{ hostvars['localhost']['nfs_server_share_path'] }}/omnia/openchami"
      changed_when: true
      delegate_to: oim
      connection: ssh
      failed_when: false
      when: (hostvars['localhost']['omnia_share_option'] == 'NFS' and hostvars['localhost']['nfs_type'] | default('') == 'internal')
