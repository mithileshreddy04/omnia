---
# ─────────────────────────────────────────────────────────────────────────
# Play 1: Validate and setup BMC inventory from CSV
# ─────────────────────────────────────────────────────────────────────────
- name: Validate and setup BMC inventory
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Clear stale bmc group from previous run
      ansible.builtin.meta: refresh_inventory

    - name: Include pre-checks for BMC inventory validation
      ansible.builtin.include_role:
        name: idrac_pxe_boot
        tasks_from: pre_checks

# ─────────────────────────────────────────────────────────────────────────
# Play 2: Fetch credentials
# ─────────────────────────────────────────────────────────────────────────
- name: Set_fact for fetch omnia config credentials
  hosts: localhost
  connection: local
  tags: always
  tasks:
    - name: Set dynamic run tags including 'provision'
      when: not config_file_status | default(false) | bool
      ansible.builtin.set_fact:
        omnia_run_tags: "{{ (ansible_run_tags | default([]) + ['provision']) | unique }}"
        cacheable: true

- name: Invoke get_config_credentials.yml
  ansible.builtin.import_playbook: credential_utility/get_config_credentials.yml

# ─────────────────────────────────────────────────────────────────────────
# Play 3: [BSM] Compute effective inventory + capture pre-boot state
# ─────────────────────────────────────────────────────────────────────────
- name: "[BSM] Compute effective restart inventory (diff + failed retry)"
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Compute effective restart inventory
      ansible.builtin.include_role:
        name: pxe_buildstream_manager
        tasks_from: compute_effective_inventory
      when: enable_build_stream | default(false) | bool

# ─────────────────────────────────────────────────────────────────────────
# Play 4: Reboot Host via PXE
# ─────────────────────────────────────────────────────────────────────────
- name: Reboot Host via PXE
  hosts: bmc
  connection: local
  strategy: host_pinned
  gather_facts: false
  roles:
    - role: idrac_pxe_boot

# ─────────────────────────────────────────────────────────────────────────
# Play 5: Synchronized Reporting (iDRAC reboot status only)
# ─────────────────────────────────────────────────────────────────────────
- name: Synchronized Reporting
  hosts: bmc
  connection: local
  gather_facts: false
  tasks:
    - name: Fail if reboot function failed
      ansible.builtin.fail:
        msg: "{{ reboot_status }}"
      when: reboot_failed

    - name: Show passed iDRACs
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ reboot_status }}"

# ─────────────────────────────────────────────────────────────────────────
# Play 6: Filter phone-home list — exclude nodes whose reboot failed
# ─────────────────────────────────────────────────────────────────────────
- name: "[BSM] Filter phone-home target list to exclude failed reboots"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Build list of successfully rebooted BMC IPs (exclude BSM-skipped and failed)
      ansible.builtin.set_fact:
        successful_bmc_ips: "{{ successful_bmc_ips | default([]) + [item] }}"
      loop: "{{ groups['bmc'] | default([]) }}"
      when:
        - not (hostvars[item]['bsm_skip_this_host'] | default(false))
        - not (hostvars[item]['reboot_failed'] | default(true))
      tags: always

    - name: Default successful_bmc_ips to empty list if none succeeded
      ansible.builtin.set_fact:
        successful_bmc_ips: "{{ successful_bmc_ips | default([]) }}"
      tags: always

    - name: Build filtered admin IPs for phone-home (only successfully rebooted nodes)
      ansible.builtin.set_fact:
        target_node_admin_ips: >-
          {{ successful_bmc_ips
             | map('extract', pxe_csv_node_map)
             | map(attribute='ADMIN_IP')
             | list }}
        cacheable: true
      when:
        - enable_build_stream | default(false) | bool
        - pxe_csv_node_map is defined
        - successful_bmc_ips | length > 0
      tags: always

    - name: Set empty phone-home list when no nodes rebooted successfully
      ansible.builtin.set_fact:
        target_node_admin_ips: []
        cacheable: true
      when: successful_bmc_ips | default([]) | length == 0
      tags: always

    - name: Report phone-home target list
      ansible.builtin.debug:
        msg: >-
          Phone-home targets: {{ target_node_admin_ips | default([]) | length }} of
          {{ groups['bmc'] | default([]) | length }} nodes
          ({{ successful_bmc_ips | default([]) | length }} rebooted successfully,
          {{ (groups['bmc'] | default([]) | length) - (successful_bmc_ips | default([]) | length) }} failed)
      tags: always

# ─────────────────────────────────────────────────────────────────────────
# Play 7: Create OIM group for phone-home verification
# ─────────────────────────────────────────────────────────────────────────
- name: Create oim group for phone-home verification
  hosts: localhost
  connection: local
  roles:
    - create_container_group
  vars:
    oim_group: true
  tags: always

# ─────────────────────────────────────────────────────────────────────────
# Play 8: [Phone-Home] via pxe_buildstream_manager role task
# Runs on oim host — journalctl is on the OIM server
# Only runs when enable_build_stream is true (same gate as rest of BSM)
# Skipped entirely when no nodes rebooted successfully
# ─────────────────────────────────────────────────────────────────────────
- name: "[Phone-Home] Wait for cloud-init completion on all nodes"
  hosts: oim
  connection: ssh
  gather_facts: false
  become: true
  ignore_unreachable: true
  max_fail_percentage: 100
  tasks:
    - name: Skip phone-home when no nodes rebooted successfully
      ansible.builtin.debug:
        msg: "Skipping phone-home verification — no nodes rebooted successfully"
      when: hostvars['localhost']['target_node_admin_ips'] | default([]) | length == 0

    - name: Run cloud-init phone-home verification via BSM role
      ansible.builtin.include_role:
        name: pxe_buildstream_manager
        tasks_from: cloudinit_phone_home
      when:
        - hostvars['localhost']['enable_build_stream'] | default(false) | bool
        - hostvars['localhost']['target_node_admin_ips'] | default([]) | length > 0
      vars:
        pxe_start_epoch: "{{ hostvars['localhost']['pxe_start_epoch'] }}"
        target_node_admin_ips: "{{ hostvars['localhost']['target_node_admin_ips'] }}"

# ─────────────────────────────────────────────────────────────────────────
# Play 9: [BSM] Write per-node results AFTER phone-home verified
# ─────────────────────────────────────────────────────────────────────────
- name: "[BSM] Write per-node results, update persistent state, and upload to GitLab"
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Execute BuildStream Manager post-processing
      ansible.builtin.include_role:
        name: pxe_buildstream_manager
      when: enable_build_stream | default(false) | bool

# ─────────────────────────────────────────────────────────────────────────
# Play 10: Upload to GitLab
# ─────────────────────────────────────────────────────────────────────────
- name: Upload failed_nodes to gitlab
  hosts: gitlab_server
  become: true
  gather_facts: true
  tasks:
    - name: Upload failed_nodes to gitlab
      ansible.builtin.include_role:
        name: pxe_buildstream_manager
        tasks_from: upload_to_gitlab
      when: hostvars['localhost']['enable_build_stream'] | default(false) | bool
