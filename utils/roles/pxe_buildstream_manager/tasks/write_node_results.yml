---
- name: Fail if job_id is not provided
  ansible.builtin.fail:
    msg: "{{ bsm_job_id_missing_msg }}"
  when: job_id is not defined or job_id | length == 0

- name: Set node results directory from job_id
  ansible.builtin.set_fact:
    bsm_job_id: "{{ job_id }}"
    node_results_dir: "/opt/omnia/build_stream_root/artifacts/{{ job_id }}"

- name: Build reverse map of ADMIN_IP to BMC_IP for phone-home failure lookup
  ansible.builtin.set_fact:
    admin_to_bmc_map: "{{ admin_to_bmc_map | default({}) | combine({pxe_csv_node_map[item]['ADMIN_IP']: item}) }}"
  loop: "{{ pxe_csv_node_map | default({}) | list }}"
  when:
    - pxe_csv_node_map is defined
    - pxe_csv_node_map[item]['ADMIN_IP'] is defined

- name: Build phone-home failed BMC IPs list
  ansible.builtin.set_fact:
    phone_home_failed_bmc_ips: "{{ phone_home_failed_bmc_ips | default([]) + [admin_to_bmc_map[item]] }}"
  loop: "{{ phone_home_failed_ips | default([]) }}"
  when:
    - admin_to_bmc_map is defined
    - item in admin_to_bmc_map

- name: Default phone_home_failed_bmc_ips if not set
  ansible.builtin.set_fact:
    phone_home_failed_bmc_ips: "{{ phone_home_failed_bmc_ips | default([]) }}"

- name: Build per-node results (only hosts that were actually PXE booted, not BSM-skipped)
  ansible.builtin.set_fact:
    pxe_node_results: >-
      {{ pxe_node_results | default([]) + [{
        'bmc_ip': item,
        'hostname': (pxe_csv_node_map[item]['HOSTNAME'] | default(''))
                    if pxe_csv_node_map is defined and item in pxe_csv_node_map else '',
        'service_tag': (pxe_csv_node_map[item]['SERVICE_TAG'] | default(''))
                       if pxe_csv_node_map is defined and item in pxe_csv_node_map else '',
        'status': _node_status,
        'message': _node_message
      }] }}
  loop: "{{ groups['bmc'] | default([]) }}"
  when: >
    groups['bmc'] is defined and (groups['bmc'] | length > 0)
    and not (hostvars[item]['bsm_skip_this_host'] | default(false))
  vars:
    _reboot_failed: "{{ hostvars[item]['reboot_failed'] | default(true) }}"
    _phone_home_failed: "{{ item in (phone_home_failed_bmc_ips | default([])) }}"
    _node_status: "{{ 'failed' if (_reboot_failed | bool or _phone_home_failed | bool) else 'success' }}"
    _node_message: >-
      {{ hostvars[item]['reboot_status'] | default('No status available')
         + (' | Phone-home failed: cloud-init did not complete' if (not _reboot_failed | bool and _phone_home_failed | bool) else '') }}

- name: Ensure directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ node_results_dir }}"
    - "{{ restart_state_dir }}/{{ job_id }}"

- name: Write node_results.json
  ansible.builtin.copy:
    content: "{{ node_results_report | to_nice_json }}"
    dest: "{{ node_results_dir }}/node_results.json"
    mode: "0644"
  vars:
    success_list: "{{ pxe_node_results | default([]) | selectattr('status', 'equalto', 'success') | list }}"
    failed_list: "{{ pxe_node_results | default([]) | selectattr('status', 'equalto', 'failed') | list }}"
    node_results_report:
      job_id: "{{ bsm_job_id }}"
      stage_name: "restart"
      timestamp: "{{ ansible_date_time.iso8601 }}"
      total_nodes: "{{ pxe_node_results | default([]) | length }}"
      success_count: "{{ success_list | length }}"
      failure_count: "{{ failed_list | length }}"
      nodes: "{{ pxe_node_results | default([]) }}"
