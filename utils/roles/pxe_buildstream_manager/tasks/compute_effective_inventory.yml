# effective_bmc_ips = current_bmc_ips (from CSV) - total_booted_ips (from restart_state + failed_nodes success)

# --- Step 1: Read current inventory from pxe_mapping_file.csv ---
---
- name: Ensure job-specific restart_state directory exists
  ansible.builtin.file:
    path: "{{ restart_state_dir }}/{{ job_id }}"
    state: directory
    mode: "0755"

- name: Read PXE mapping file
  ansible.builtin.read_csv:
    path: "{{ input_dir }}/pxe_mapping_file.csv"
  register: pxe_csv_data

- name: Set current inventory
  ansible.builtin.set_fact:
    current_inventory: "{{ pxe_csv_data.list }}"
    current_bmc_ips: "{{ pxe_csv_data.list | map(attribute='BMC_IP') | list }}"

- name: Log current inventory
  ansible.builtin.debug:
    msg: "[BSM] Current CSV inventory: {{ current_bmc_ips | length }} nodes: {{ current_bmc_ips }}"

# --- Step 2: Read booted nodes from restart_state.json ---
- name: Check if restart_state.json exists
  ansible.builtin.stat:
    path: "{{ restart_state_dir }}/{{ job_id }}/restart_state.json"
  register: state_file_stat

- name: Load booted nodes from restart_state.json
  when: state_file_stat.stat.exists
  block:
    - name: Read restart_state.json
      ansible.builtin.slurp:
        src: "{{ restart_state_dir }}/{{ job_id }}/restart_state.json"
      register: state_raw

    - name: Parse restart_state.json
      ansible.builtin.set_fact:
        restart_state: "{{ state_raw.content | b64decode | from_json }}"

    - name: Extract booted IPs
      ansible.builtin.set_fact:
        booted_ips: "{{ restart_state.booted_nodes | default([]) | map(attribute='bmc_ip') | list }}"

- name: Default booted IPs to empty if no restart_state.json
  when: not state_file_stat.stat.exists
  ansible.builtin.set_fact:
    booted_ips: []
    restart_state: {}

- name: Log booted nodes
  ansible.builtin.debug:
    msg: "[BSM] Booted nodes from restart_state.json: {{ booted_ips | length }} nodes: {{ booted_ips }}"

# --- Step 3: Read failed_nodes.json and move status=success to booted ---
- name: Check if failed_nodes.json exists
  ansible.builtin.stat:
    path: "{{ restart_state_dir }}/{{ job_id }}/failed_nodes.json"
  register: failed_nodes_stat

- name: Process failed_nodes.json
  when: failed_nodes_stat.stat.exists
  block:
    - name: Read failed_nodes.json
      ansible.builtin.slurp:
        src: "{{ restart_state_dir }}/{{ job_id }}/failed_nodes.json"
      register: failed_raw

    - name: Parse failed_nodes.json
      ansible.builtin.set_fact:
        failed_nodes_data: "{{ (failed_raw.content | b64decode | from_json).failed_nodes | default([]) }}"

    - name: Extract manually booted IPs (status=success in failed_nodes.json)
      ansible.builtin.set_fact:
        manually_booted_ips: "{{ failed_nodes_data | selectattr('status', 'equalto', 'success') | map(attribute='bmc_ip') | list }}"
        manually_booted_nodes: "{{ failed_nodes_data | selectattr('status', 'equalto', 'success') | list }}"

    - name: Log manually booted nodes from failed_nodes.json
      ansible.builtin.debug:
        msg: "[BSM] Manually booted (status=success in failed_nodes.json): {{ manually_booted_ips }}"
      when: manually_booted_ips | length > 0

    - name: Add manually booted nodes to restart_state.json
      when: manually_booted_ips | length > 0
      block:
        - name: Build new booted entries
          ansible.builtin.set_fact:
            new_booted_entries: >-
              {{ new_booted_entries | default([]) + [{
                'bmc_ip': item.bmc_ip,
                'hostname': item.hostname | default(''),
                'booted_at': ansible_date_time.iso8601,
                'manually_booted': true
              }] }}
          loop: "{{ manually_booted_nodes }}"
          when: item.bmc_ip not in booted_ips

        - name: Write updated restart_state.json
          ansible.builtin.copy:
            content: "{{ updated_state | to_nice_json }}"
            dest: "{{ restart_state_dir }}/{{ job_id }}/restart_state.json"
            mode: "0644"
          vars:
            existing_booted: "{{ restart_state.booted_nodes | default([]) | list }}"
            new_entries: "{{ new_booted_entries | default([]) | list }}"
            updated_state:
              updated_at: "{{ ansible_date_time.iso8601 }}"
              previous_inventory: "{{ restart_state.previous_inventory | default({'source': 'pxe_mapping_file.csv', 'nodes': []}) }}"
              booted_nodes: "{{ existing_booted + new_entries }}"
          when: new_booted_entries | default([]) | length > 0

        - name: Update booted_ips with manually booted
          ansible.builtin.set_fact:
            booted_ips: "{{ (booted_ips + manually_booted_ips) | unique }}"

- name: Default manually booted to empty if no failed_nodes.json
  when: not failed_nodes_stat.stat.exists
  ansible.builtin.set_fact:
    manually_booted_ips: []

# --- Step 4: Compute effective inventory = current - booted ---
- name: Compute effective BMC IPs
  ansible.builtin.set_fact:
    effective_bmc_ips: "{{ current_bmc_ips | difference(booted_ips) }}"

- name: Report effective inventory
  ansible.builtin.debug:
    msg: >-
      [BSM] Inventory: {{ current_bmc_ips | length }} in CSV,
      {{ booted_ips | length }} booted (excluded),
      {{ manually_booted_ips | length }} manually booted (from failed_nodes.json),
      {{ effective_bmc_ips | length }} effective targets: {{ effective_bmc_ips }}

# --- Step 5: Mark hosts for PXE boot ---
- name: Mark hosts for PXE boot based on effective inventory
  block:
    - name: Mark all bmc hosts to skip by default
      ansible.builtin.set_fact:
        bsm_skip_this_host: true
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['bmc'] | default([]) }}"

    - name: Mark only effective hosts to NOT skip
      ansible.builtin.set_fact:
        bsm_skip_this_host: false
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ effective_bmc_ips }}"
      when: effective_bmc_ips | length > 0

- name: Store CSV node metadata for reporting
  ansible.builtin.set_fact:
    pxe_csv_node_map: "{{ dict(pxe_csv_data.list | map(attribute='BMC_IP') | zip(pxe_csv_data.list)) }}"

- name: Skip PXE boot when effective inventory is empty
  ansible.builtin.debug:
    msg: "{{ bsm_empty_inventory_msg }}"
  when: effective_bmc_ips | length == 0

- name: Set skip flag for empty inventory
  ansible.builtin.set_fact:
    bsm_skip_pxe: "{{ effective_bmc_ips | length == 0 }}"

# Epoch captured here — survives all play boundaries via cacheable
- name: Capture PXE boot start epoch for phone-home time-gating
  ansible.builtin.set_fact:
    pxe_start_epoch: "{{ ansible_date_time.epoch }}"
    cacheable: true

- name: Read PXE mapping file for admin IPs
  community.general.read_csv:
    path: "{{ input_project_dir | default('/opt/omnia/input/project_default') }}/pxe_mapping_file.csv"
  register: pxe_csv_for_phone_home
  when: groups['bmc'] is defined and groups['bmc'] | length > 0

- name: Build list of target node admin IPs for phone-home verification
  ansible.builtin.set_fact:
    target_node_admin_ips: "{{ pxe_csv_for_phone_home.list | map(attribute='ADMIN_IP') | list }}"
    cacheable: true
  when:
    - groups['bmc'] is defined
    - groups['bmc'] | length > 0
    - pxe_csv_for_phone_home is defined
    - pxe_csv_for_phone_home.list is defined
