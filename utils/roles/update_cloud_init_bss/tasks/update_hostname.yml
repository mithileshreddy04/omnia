---
# ============================================================================
# Update hostname configuration for nodes
# ============================================================================
# Uses the ochami CLI to set hostname from the provided hostname YAML file.
#
# Required variables:
#   hostname_file_path      — Path to pre-rendered hostname YAML file (on target host)
#   functional_group_name   — Name of the functional group
# ============================================================================

- name: Verify hostname file exists - {{ functional_group_name }}
  ansible.builtin.stat:
    path: "{{ hostname_file_path }}"
  register: hostname_file_stat

- name: Fail if hostname file not found - {{ functional_group_name }}
  ansible.builtin.fail:
    msg: "{{ hostname_file_missing_msg }}"
  when: not hostname_file_stat.stat.exists

- name: Set hostname configuration - {{ functional_group_name }}
  ansible.builtin.command: >
    /usr/bin/ochami cloud-init node set -f yaml -d @{{ hostname_file_path }}
  changed_when: true
  register: hostname_set_result

- name: Fail if hostname update failed - {{ functional_group_name }}
  ansible.builtin.fail:
    msg: "{{ hostname_update_fail_msg }}"
  when: hostname_set_result.rc != 0
