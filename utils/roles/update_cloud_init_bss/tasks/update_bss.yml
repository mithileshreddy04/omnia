---
# ============================================================================
# Update BSS boot parameters for a functional group
# ============================================================================
# Uses the ochami CLI to delete existing boot params and set new ones
# from the provided BSS YAML file.
#
# Required variables:
#   bss_file_path          — Path to pre-rendered BSS YAML file (on target host)
#   functional_group_name  — Name of the functional group
#
# The BSS YAML file should contain kernel, initrd, params, and macs fields.
# See provision/roles/configure_ochami/templates/bss/bss.yaml.j2 for format.
# ============================================================================

- name: Verify BSS file exists - {{ functional_group_name }}
  ansible.builtin.stat:
    path: "{{ bss_file_path }}"
  register: bss_file_stat

- name: Fail if BSS file not found - {{ functional_group_name }}
  ansible.builtin.fail:
    msg: "{{ bss_file_missing_msg }}"
  when: not bss_file_stat.stat.exists

- name: Delete existing BSS boot params - {{ functional_group_name }}
  ansible.builtin.command: >
    /usr/bin/ochami bss boot params delete --no-confirm -f yaml -d @{{ bss_file_path }}
  changed_when: true
  failed_when: false

- name: Set BSS boot params - {{ functional_group_name }}
  ansible.builtin.command: >
    /usr/bin/ochami bss boot params set -f yaml -d @{{ bss_file_path }}
  changed_when: true
  register: bss_set_result

- name: Fail if BSS update failed - {{ functional_group_name }}
  ansible.builtin.fail:
    msg: "{{ bss_update_fail_msg }}"
  when: bss_set_result.rc != 0

- name: Verify BSS boot params updated - {{ functional_group_name }}
  ansible.builtin.command: ochami bss boot params get -F yaml
  changed_when: false
  register: bss_verify_output

- name: Display BSS verification - {{ functional_group_name }}
  ansible.builtin.debug:
    msg: "{{ bss_verify_output.stdout_lines }}"
    verbosity: 1
