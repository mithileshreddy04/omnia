# ============================================================================
# update_cloud_init_bss.yml — Utility Playbook
# ============================================================================
# Updates cloud-init group configuration and/or BSS boot parameters for
# a specified functional group using pre-rendered YAML files.
#
# This utility is designed to be:
#   1. Called standalone for ad-hoc updates
#   2. Imported from upgrade/rollback flows via import_playbook
#
# Prerequisites:
#   - OpenCHAMI services running on OIM host
#   - Pre-rendered BSS and/or cloud-init YAML files on the OIM host
#   - include_input_dir.yml must have been run (or pass oim_node_name)
#
# Required variables:
#   functional_group_name  — Functional group name (e.g., slurm_node_x86_64)
#
# Optional variables:
#   bss_file_path          — Path to BSS YAML file on OIM host
#   cloud_init_file_path   — Path to cloud-init group YAML on OIM host
#   ci_defaults_file_path  — Path to ci-defaults YAML on OIM host
#   ci_common_file_path    — Path to ci-group-common YAML on OIM host
#   update_bss             — Update BSS boot params (default: true)
#   update_cloud_init      — Update cloud-init group config (default: true)
#   update_ci_defaults     — Update ci-defaults config (default: false)
#   update_ci_common       — Update ci-group-common config (default: false)
#
# Usage examples:
#   # Update both BSS and cloud-init for a functional group:
#   ansible-playbook utils/update_cloud_init_bss.yml \
#     -e functional_group_name=slurm_node_x86_64 \
#     -e bss_file_path=/opt/omnia/openchami/workdir/boot/bss-slurm_node_x86_64.yaml \
#     -e cloud_init_file_path=/opt/omnia/openchami/workdir/cloud-init/ci-group-slurm_node_x86_64.yaml
#
#   # Update only BSS:
#   ansible-playbook utils/update_cloud_init_bss.yml \
#     -e functional_group_name=slurm_node_x86_64 \
#     -e bss_file_path=/opt/omnia/openchami/workdir/boot/bss-slurm_node_x86_64.yaml \
#     -e update_cloud_init=false
#
#   # Update only cloud-init:
#   ansible-playbook utils/update_cloud_init_bss.yml \
#     -e functional_group_name=slurm_node_x86_64 \
#     -e cloud_init_file_path=/opt/omnia/openchami/workdir/cloud-init/ci-group-slurm_node_x86_64.yaml \
#     -e update_bss=false
#
#   # Update all (BSS + cloud-init + ci-defaults + ci-group-common):
#   ansible-playbook utils/update_cloud_init_bss.yml \
#     -e functional_group_name=slurm_node_x86_64 \
#     -e bss_file_path=/opt/omnia/openchami/workdir/boot/bss-slurm_node_x86_64.yaml \
#     -e cloud_init_file_path=/opt/omnia/openchami/workdir/cloud-init/ci-group-slurm_node_x86_64.yaml \
#     -e ci_defaults_file_path=/opt/omnia/openchami/workdir/cloud-init/ci-defaults.yaml \
#     -e ci_common_file_path=/opt/omnia/openchami/workdir/cloud-init/ci-group-common.yaml \
#     -e update_ci_defaults=true -e update_ci_common=true
# ============================================================================

- name: Include input project directory
  when: not project_dir_status | default(false) | bool
  ansible.builtin.import_playbook: include_input_dir.yml
  vars:
    openchami_vars_suppport: true
    omnia_metadata_support: true

- name: Create OIM host group
  ansible.builtin.import_playbook: create_container_group.yml
  vars:
    oim_group: true
  tags: always

- name: Authenticate and update cloud-init/BSS configuration
  hosts: oim
  connection: ssh
  gather_facts: false
  tasks:
    - name: Refresh OpenCHAMI access token
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../common/tasks/common/openchami_auth.yml"
      vars:
        oim_node_name: "{{ hostvars['localhost']['oim_node_name'] }}"

    - name: Update cloud-init and BSS for functional group
      environment: "{{ hostvars['oim']['ochami_env'] }}"
      block:
        - name: Include update_cloud_init_bss role
          ansible.builtin.include_role:
            name: update_cloud_init_bss
