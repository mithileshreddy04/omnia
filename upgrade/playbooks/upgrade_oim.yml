# ============================================================================
# upgrade_oim.yml — Internal playbook (imported by upgrade.yml --tags oim)
# ============================================================================
# Upgrades OIM components: OpenCHAMI containers + BuildStream (if enabled).
# Prerequisites: prepare_upgrade.yml must have been run first.
# Reads upgrade_manifest.yml and skips if oim already completed.
#
# Flow:
#   1. Pre-flight: read manifest, check idempotency
#   2. User approval prompt before proceeding
#   3. OpenCHAMI container upgrade (pg_dump, deployment-recipes, image pull,
#      ordered restart, DB migration, validation)
#   4. BuildStream container upgrade (conditional on enable_build_stream)
#   5. Mark OIM as completed in manifest
# ============================================================================

- name: Upgrade OIM (OpenCHAMI + conditional BuildStream)
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    component_name: oim
    input_project_dir: "/opt/omnia/input/project_default"
    build_stream_config_path: "/opt/omnia/input/project_default/build_stream_config.yml"
  tasks:

    # ── Pre-flight: manifest read + idempotency ─────────────────────────
    - name: Read upgrade_manifest.yml
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: raw_manifest

    - name: Parse manifest
      ansible.builtin.set_fact:
        manifest: "{{ raw_manifest.content | b64decode | from_yaml }}"

    - name: Skip if OIM already upgraded
      ansible.builtin.meta: end_play
      when:
        - manifest.component_status[component_name] | default('pending') == 'completed'

    # ── User approval before proceeding ─────────────────────────────────
    # Bypass with: -e skip_approval=true (for CI/CD automation)
    - name: Display OIM upgrade summary and request approval
      ansible.builtin.pause:
        prompt: |

          ══════════════════════════════════════════════════════════════
                         OIM UPGRADE — APPROVAL REQUIRED
          ══════════════════════════════════════════════════════════════
          Source: {{ manifest.source_version | default('2.1.0.0') }}
          Target: {{ manifest.target_version | default('2.2.0.0') }}

          This will upgrade the following OIM components:
            1. OpenCHAMI containers (pg_dump backup → deployment-recipes
               update → image pull → ordered restart → DB migration)
            2. BuildStream container (if enabled in build_stream_config.yml)

          WARNING: This operation modifies running OIM services.
          Ensure you have reviewed prepare_upgrade.yml output first.

          Press ENTER to proceed or Ctrl+C to abort.
          ══════════════════════════════════════════════════════════════
      when: not (skip_approval | default(false) | bool)

    - name: Set OIM upgrade status to in-progress
      ansible.builtin.copy:
        content: >-
          {{ manifest | combine({
               'component_status': manifest.component_status | combine({
                 component_name: 'in-progress'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'

    - name: "Display upgrade status in-progress — {{ component_name }}"
      ansible.builtin.debug:
        msg: "[UPGRADE] Component '{{ component_name }}' — status changed to: in-progress"

    # ── Phase 1: OpenCHAMI Container Upgrade (ESpec §4.4) ──────────────
    # The upgrade_openchami role handles the full lifecycle:
    #   pre_upgrade_health_check → upgrade_openchami_containers → post_upgrade_health_check
    # It delegates all container operations to the 'oim' host via SSH.
    # On failure, the role's upgrade_status.yml raises ansible.builtin.fail,
    # which lands in the rescue block below.
    # On skip (not deployed / already at target), the role completes normally
    # and sets openchami_deployed / upgrade_needed facts accordingly.
    - name: "Phase 1 — OpenCHAMI Container Upgrade"
      block:
        - name: Upgrade OpenCHAMI containers and services
          ansible.builtin.include_role:
            name: ../roles/upgrade_openchami

        - name: Display OpenCHAMI upgrade outcome
          ansible.builtin.debug:
            msg: >-
              OpenCHAMI Phase 1 result —
              deployed={{ openchami_deployed | default(false) }},
              upgrade_needed={{ upgrade_needed | default(true) }},
              failed={{ openchami_upgrade_failed | default(false) }}

        # Only update version tracking when an upgrade actually took place.
        # Skipped when OpenCHAMI was not deployed or was already at target.
        - name: Read current version.yml (if exists)
          ansible.builtin.slurp:
            src: "/opt/omnia/.data/version.yml"
          register: raw_version_yml
          failed_when: false
          when:
            - openchami_deployed | default(false) | bool
            - upgrade_needed | default(true) | bool

        - name: Parse current version.yml
          ansible.builtin.set_fact:
            current_version_data: "{{ raw_version_yml.content | b64decode | from_yaml }}"
          when:
            - openchami_deployed | default(false) | bool
            - upgrade_needed | default(true) | bool
            - raw_version_yml is defined
            - raw_version_yml.content is defined

        - name: Update version.yml with OpenCHAMI target version
          ansible.builtin.copy:
            content: >-
              {{ (current_version_data | default({})) | combine({
                   'openchami_version': manifest.target_version | default('2.2.0.0'),
                   'openchami_previous_version': manifest.source_version | default('2.1.0.0'),
                   'openchami_upgrade_timestamp': lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ')
                 }) | to_nice_yaml }}
            dest: "/opt/omnia/.data/version.yml"
            mode: '0644'
          when:
            - openchami_deployed | default(false) | bool
            - upgrade_needed | default(true) | bool

      rescue:
        # Re-read the manifest file to capture any intermediate writes
        # (e.g., the in-progress status set earlier in this play).
        - name: Re-read upgrade_manifest.yml after failure
          ansible.builtin.slurp:
            src: "{{ manifest_path }}"
          register: rescue_raw_manifest

        - name: Parse current manifest state
          ansible.builtin.set_fact:
            rescue_manifest: "{{ rescue_raw_manifest.content | b64decode | from_yaml }}"

        - name: OpenCHAMI upgrade failed — mark component as failed
          ansible.builtin.copy:
            content: >-
              {{ rescue_manifest | combine({
                   'component_status': rescue_manifest.component_status | combine({
                     component_name: 'failed'
                   })
                 }) | to_nice_yaml }}
            dest: "{{ manifest_path }}"
            mode: '0644'

        - name: Fail with OpenCHAMI upgrade error
          ansible.builtin.fail:
            msg: >-
              OpenCHAMI upgrade failed
              ({{ rescue_manifest.source_version | default('N/A') }} →
              {{ rescue_manifest.target_version | default('N/A') }}).
              Check logs and consider running rollback.

    # ── Finalize: mark OIM as completed ─────────────────────────────────
    - name: Mark OIM upgrade as completed
      ansible.builtin.copy:
        content: >-
          {{ manifest | combine({
               'component_status': manifest.component_status | combine({
                 component_name: 'completed'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'

    - name: "Display upgrade status completed — {{ component_name }}"
      ansible.builtin.debug:
        msg: "[UPGRADE] Component '{{ component_name }}' — status changed to: completed"
