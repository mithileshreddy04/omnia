---

- name: Upgrade Kubernetes cluster
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    component_name: k8s
  tasks:
    - name: Read upgrade_manifest.yml
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: raw_manifest

    - name: Parse manifest
      ansible.builtin.set_fact:
        manifest: "{{ raw_manifest.content | b64decode | from_yaml }}"

    - name: Skip if k8s already upgraded
      ansible.builtin.meta: end_play
      when:
        - manifest.component_status[component_name] | default('pending') == 'completed'

    - name: Set k8s upgrade status to in-progress
      ansible.builtin.copy:
        content: >-
          {{ manifest | combine({
               'component_status': manifest.component_status | combine({
                 component_name: 'in-progress'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'

    # TODO: Implement per ESpec §4.7:
    # 1. Validation gates (Pulp repos, SSH, cluster health, etcd, version chain, backup)
    # 2. etcd snapshot + backup /etc/kubernetes
    # 3. Sequential CP upgrade (kubeadm upgrade apply/node)
    # 4. Addon upgrade (Calico, MetalLB, Helm charts)
    # 5. Rolling worker upgrade (drain→upgrade→uncordon, batch configurable)
    # 6. BSS + cloud-init update per functional group post-upgrade
    # 7. Validation: all nodes Ready, pods Running
    - name: K8s upgrade placeholder
      ansible.builtin.debug:
        msg: "K8s upgrade tasks to be implemented (validation gates, CP upgrade, worker rolling upgrade)"

    - name: Mark k8s upgrade as completed
      ansible.builtin.copy:
        content: >-
          {{ manifest | combine({
               'component_status': manifest.component_status | combine({
                 component_name: 'completed'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'
