---

- name: Upgrade Slurm cluster (feature updates)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    component_name: slurm
  tasks:
    - name: Read upgrade_manifest.yml
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: raw_manifest

    - name: Parse manifest
      ansible.builtin.set_fact:
        manifest: "{{ raw_manifest.content | b64decode | from_yaml }}"

    - name: Skip if slurm already upgraded
      ansible.builtin.meta: end_play
      when:
        - manifest.component_status[component_name] | default('pending') == 'completed'

    - name: Set slurm upgrade status to in-progress
      ansible.builtin.copy:
        content: >-
          {{ manifest | combine({
               'component_status': manifest.component_status | combine({
                 component_name: 'in-progress'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'

    # TODO: Implement per ESpec §4.10:
    # 1. IB network config (pxe_mapping_file transform, IP preservation)
    # 2. Centralized DNS configuration
    # 3. VAST mount support
    # 4. DCGM for GPU compute nodes
    # 5. HPC tools for login/compiler nodes
    # 6. Node add/remove post-upgrade validation
    - name: Slurm upgrade placeholder
      ansible.builtin.debug:
        msg: "Slurm feature upgrade tasks to be implemented (IB config, DNS, VAST, DCGM, HPC tools)"

    - name: Mark slurm upgrade as completed
      ansible.builtin.copy:
        content: >-
          {{ manifest | combine({
               'component_status': manifest.component_status | combine({
                 component_name: 'completed'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'
