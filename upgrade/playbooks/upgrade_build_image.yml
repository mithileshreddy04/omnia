---

- name: Upgrade Build Image (SquashFS build)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    component_name: build_image
  tasks:
    - name: Read upgrade_manifest.yml
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: raw_manifest

    - name: Parse manifest
      ansible.builtin.set_fact:
        manifest: "{{ raw_manifest.content | b64decode | from_yaml }}"

    - name: Skip if build_image already upgraded
      ansible.builtin.meta: end_play
      when:
        - manifest.component_status[component_name] | default('pending') == 'completed'

    - name: Set build_image upgrade status to in-progress
      ansible.builtin.copy:
        content: >-
          {{ manifest | combine({
               'component_status': manifest.component_status | combine({
                 component_name: 'in-progress'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'

    # TODO: Implement per ESpec §4.6 and Build_Image_Upgrade_Component_Spec:
    # 1. Check MinIO for existing target-version SquashFS images (reuse if exists)
    # 2. Preserve existing 2.1 images
    # 3. Build new SquashFS images for target version via BuildStream
    # 4. Upload built images to MinIO
    # 5. Validate all required images are available in MinIO
    - name: Build image upgrade placeholder
      ansible.builtin.debug:
        msg: "Build image upgrade tasks to be implemented (MinIO check, SquashFS build, upload)"

    - name: Mark build_image upgrade as completed
      ansible.builtin.copy:
        content: >-
          {{ manifest | combine({
               'component_status': manifest.component_status | combine({
                 component_name: 'completed'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'
