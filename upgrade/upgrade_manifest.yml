# ============================================================================
# OMNIA UPGRADE CONFIGURATION (Production Recommended)
# ============================================================================
# Upgrade metadata (source and target Omnia versions) is read automatically
# from /opt/omnia/.data/oim_metadata.yml after omnia_core execution.
#
# Design:
#   omnia_upgrade_paths — defines the Omnia version upgrade sequence.
#     Each entry specifies the software versions for the NEXT Omnia version.
#
#   components — defines each software component and its valid version sequence.
#     supported_versions — ordered list used for automatic intermediate hop
#     generation when a K8s version gap is detected.
#
# Automatic intermediate hop detection:
#   When the target K8s version skips one or more entries in supported_versions,
#   the system auto-generates one K8s hop per intermediate version.
#
#   Example: Omnia 2.1.0.0 (K8s 1.34.1) → Omnia 2.3.0.0 (K8s 1.37.1)
#     Omnia path  : 2.1.0.0 → 2.2.0.0 → 2.3.0.0
#     K8s hops    : 1.34.1 → 1.35.1   (Omnia 2.1→2.2, direct)
#                   1.35.1 → 1.36.1   (auto-generated, within 2.2→2.3)
#                   1.36.1 → 1.37.1   (Omnia 2.2→2.3, final)
# ============================================================================

# ============================================================================
# OMNIA VERSION UPGRADE PATHS
# ============================================================================
# Each entry:
#   "<current_omnia_version>":
#     next_omnia_version: "<next_omnia_version>"
#     software_versions:
#       <component>: "<target_software_version_for_next_omnia>"
# ============================================================================
omnia_upgrade_paths:
  "2.1.0.0":
    next_omnia_version: "2.2.0.0"
    software_versions:
      service_k8s: "1.35.1"
  # Uncomment to enable multi-hop upgrade to Omnia 2.3.0.0:
  # K8s 1.35.1 -> 1.37.1 will auto-generate intermediate hop via 1.36.1
  # "2.2.0.0":
  #   next_omnia_version: "2.3.0.0"
  #   software_versions:
  #     service_k8s: "1.37.1"

# ============================================================================
# COMPONENT CONFIGURATION
# ============================================================================
# Each component:
#   json_file        — base name for versioned JSON files
#                      (e.g., "service_k8s" → service_k8s_v1.35.1.json)
#   enabled          — whether this component participates in upgrade
#   supported_versions — ordered list of all valid software versions.
#                        When target skips versions, intermediate hops are
#                        auto-generated in sequence order.
# ============================================================================
components:
  service_k8s:
    json_file: "service_k8s"
    enabled: true
    supported_versions:
      - "1.34.1"
      - "1.35.1"
  # Additional components (placeholders)
  # slurm_custom:
  #   json_file: "slurm_custom"
  #   enabled: false
  #   supported_versions:
  #     - "24.05"
  #     - "25.11"
  #     - "26.05"
