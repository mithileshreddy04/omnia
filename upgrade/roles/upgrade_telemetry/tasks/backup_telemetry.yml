# ============================================================================
# Backup Telemetry Scripts (Pre-Provision)
# ============================================================================
# Called from upgrade_provision.yml BEFORE provision regenerates manifests.
# Backs up:
#   1. Complete telemetry folder (deployments, scripts)
#   2. telemetry.sh script from control plane
#   3. All PVs metadata cluster-wide
# ============================================================================

# ── Backup complete telemetry folder for rollback ──
- name: Backup telemetry folder (pre-provision)
  when:
    - k8s_client_mount_path is defined
    - k8s_client_mount_path | length > 0
  block:
    - name: Set telemetry backup directory
      ansible.builtin.set_fact:
        tel_backup_dir: "{{ k8s_client_mount_path }}/upgrade/telemetry/omnia_{{ manifest.source_version | default('unknown') }}"
      delegate_to: oim

    - name: Create telemetry backup directory
      ansible.builtin.file:
        path: "{{ tel_backup_dir }}"
        state: directory
        mode: '0755'
      delegate_to: oim

    - name: Backup telemetry folder (pre-provision)
      ansible.builtin.copy:
        src: "{{ k8s_client_mount_path }}/telemetry"
        dest: "{{ tel_backup_dir }}/telemetry"
        remote_src: true
        mode: preserve
      delegate_to: oim
      failed_when: false

    - name: Backup idrac_telemetry folder (pre-provision)
      ansible.builtin.copy:
        src: "{{ k8s_client_mount_path }}/idrac_telemetry"
        dest: "{{ tel_backup_dir }}/idrac_telemetry"
        remote_src: true
        mode: preserve
      delegate_to: oim
      failed_when: false

    - name: Check if kube_vip is reachable
      ansible.builtin.wait_for:
        host: "{{ kube_vip }}"
        port: 22
        timeout: 5
      when: kube_vip is defined
      register: kube_vip_reachable
      failed_when: false

    - name: Backup telemetry.sh from control plane
      ansible.builtin.fetch:
        src: /root/telemetry.sh
        dest: "{{ tel_backup_dir }}/telemetry.sh"
        flat: true
      delegate_to: "{{ kube_vip }}"
      when:
        - kube_vip is defined
        - kube_vip_reachable is defined
        - kube_vip_reachable is succeeded
      failed_when: false

    - name: Display telemetry backup location
      ansible.builtin.debug:
        msg: "{{ telemetry_backup_msgs.telemetry_folder }}"

# ── Backup PV metadata cluster-wide (for disaster recovery) ──
- name: Backup PV metadata cluster-wide
  when:
    - kube_vip is defined
    - k8s_client_mount_path is defined
  block:
    - name: Create PV backup directory
      ansible.builtin.file:
        path: "{{ telemetry_backup_dir }}"
        state: directory
        mode: '0755'
      delegate_to: "{{ kube_vip }}"

    - name: Backup all PVs metadata
      ansible.builtin.shell: |
        /usr/bin/kubectl get pv -o yaml > {{ telemetry_pv_backup_file }}
      delegate_to: "{{ kube_vip }}"
      register: pv_backup_result
      changed_when: true

    - name: Display PV backup status
      ansible.builtin.debug:
        msg: "{{ telemetry_backup_msgs.pv_backup }}"
