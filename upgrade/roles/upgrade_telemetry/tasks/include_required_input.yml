---
# ============================================================================
# Include Required Input Variables
# ============================================================================
# Loads all required configuration files and sets up input variables
# for Victoria upgrade detection.
#
# Loads:
#   - omnia_config.yml
#   - storage_config.yml
#   - high_availability_config.yml
#   - telemetry_config.yml
#   - software_config.json
#   - service_k8s_v1.35.1.json (for victoria operator package name)
# ============================================================================
# ── Load omnia_config.yml ──
- name: Load omnia_config.yml
  ansible.builtin.slurp:
    src: "{{ input_project_dir }}/omnia_config.yml"
  register: omnia_config_slurp
  failed_when: false
  tags: always

- name: Parse omnia_config.yml
  ansible.builtin.set_fact:
    omnia_config: "{{ omnia_config_slurp.content | b64decode | from_yaml }}"
  when: omnia_config_slurp is not failed
  tags: always

# ── Load storage_config.yml ──
- name: Load storage_config.yml
  ansible.builtin.slurp:
    src: "{{ input_project_dir }}/storage_config.yml"
  register: storage_config_slurp
  failed_when: false
  tags: always

- name: Parse storage_config.yml
  ansible.builtin.set_fact:
    storage_config: "{{ storage_config_slurp.content | b64decode | from_yaml }}"
  when: storage_config_slurp is not failed
  tags: always

- name: Set k8s_nfs_storage_name
  ansible.builtin.set_fact:
    k8s_nfs_storage_name: "{{ omnia_config.service_k8s_cluster[0].nfs_storage_name }}"
  when:
    - omnia_config is defined
    - omnia_config.service_k8s_cluster is defined
  tags: always

- name: Set k8s_client_mount_path
  ansible.builtin.set_fact:
    k8s_client_mount_path: >-
      {{ (storage_config.mounts
          | selectattr('name', 'equalto', k8s_nfs_storage_name)
          | first).mount_point }}
  when:
    - storage_config is defined
    - k8s_nfs_storage_name is defined
  tags: always
# ── Load high_availability_config.yml ──
- name: Read high_availability_config.yml for kube_vip
  ansible.builtin.include_vars:
    file: "{{ input_project_dir }}/high_availability_config.yml"
    name: ha_config

- name: Debug high_availability_config.yml content
  ansible.builtin.debug:
    msg: "service_k8s_cluster_ha: {{ ha_config.service_k8s_cluster_ha | default('NOT SET') }}"
  when:
    - ha_config is defined

# ── Resolve kube_vip ──
- name: Set kube_vip
  ansible.builtin.set_fact:
    kube_vip: "{{ ha_config.service_k8s_cluster_ha[0].virtual_ip_address | default('') }}"
    cacheable: true
  when:
    - ha_config.service_k8s_cluster_ha is defined
    - ha_config.service_k8s_cluster_ha | length > 0

# ── Load telemetry_config.yml ──
- name: Load telemetry_config.yml
  ansible.builtin.slurp:
    src: "{{ input_project_dir }}/telemetry_config.yml"
  register: telemetry_config_slurp
  failed_when: false
  tags: always

- name: Parse telemetry_config.yml
  ansible.builtin.set_fact:
    telemetry_config: "{{ telemetry_config_slurp.content | b64decode | from_yaml }}"
  when: telemetry_config_slurp is not failed
  tags: always

# ── Check if VictoriaMetrics is in collection targets ──
- name: Check if victoria_metrics is in collection targets
  ansible.builtin.set_fact:
    victoria_in_targets: >-
      {{
        telemetry_config.telemetry_sources.idrac.collection_targets | default([]) | select('search', 'victoria_metrics') | list | length > 0
        or telemetry_config.telemetry_sources.powerscale.collection_targets | default([]) | select('search', 'victoria_metrics') | list | length > 0
        or telemetry_config.telemetry_sources.vast.collection_targets | default([]) | select('search', 'victoria_metrics') | list | length > 0
        or telemetry_config.telemetry_sources.ufm.collection_targets | default([]) | select('search', 'victoria_metrics') | list | length > 0
      }}
  when:
    - telemetry_config is defined
    - telemetry_config.telemetry_sources is defined
  tags: always

- name: Set victoria_in_targets to false if telemetry_config not loaded
  ansible.builtin.set_fact:
    victoria_in_targets: false
  when: telemetry_config is not defined
  tags: always

# ── Load software_config.json ──
- name: Load software_config.json
  ansible.builtin.slurp:
    src: "{{ input_project_dir }}/software_config.json"
  register: software_config_slurp
  failed_when: false
  tags: always

- name: Parse software_config.json
  ansible.builtin.set_fact:
    software_config: "{{ software_config_slurp.content | b64decode | from_yaml }}"
  when: software_config_slurp is not failed
  tags: always

- name: Set architecture from software_config.json (from service_k8s arch)
  ansible.builtin.set_fact:
    architecture: "{{ (software_config.softwares | selectattr('name', 'equalto', 'service_k8s') | map(attribute='arch') | first | first) }}"
  when:
    - software_config is defined
    - software_config.softwares is defined
  tags: always

- name: Set os_version from software_config.json
  ansible.builtin.set_fact:
    os_version: "{{ software_config.cluster_os_version }}"
  when:
    - software_config is defined
    - software_config.cluster_os_version is defined
  tags: always

- name: Set k8s_version from software_config.json
  ansible.builtin.set_fact:
    k8s_version: "{{ software_config.softwares | selectattr('name', 'equalto', 'service_k8s') | map(attribute='version') | first }}"
  when:
    - software_config is defined
    - software_config.softwares is defined
  tags: always

# ── Load service_k8s JSON for victoria operator package name ──
- name: Load service_k8s JSON
  ansible.builtin.slurp:
    src: "{{ input_project_dir }}/config/{{ architecture }}/rhel/{{ os_version }}/service_k8s_v{{ k8s_version }}.json"
  register: service_k8s_slurp
  failed_when: false
  delegate_to: "{{ oim_host | default('localhost') }}"
  connection: ssh
  tags: always

- name: Parse service_k8s JSON
  ansible.builtin.set_fact:
    service_k8s_config: "{{ service_k8s_slurp.content | b64decode | from_yaml }}"
  when: service_k8s_slurp is not failed
  tags: always

- name: Extract victoria operator package name from service_k8s JSON
  ansible.builtin.set_fact:
    victoria_operator_pkg: >-
      {{ service_k8s_config.service_k8s.cluster | selectattr('type', 'equalto', 'tarball') |
         selectattr('package', 'search', 'victoria-metrics-operator') |
         map(attribute='package') |
         first|
         default('victoria-metrics-operator') }}
  when:
    - service_k8s_config is defined
    - service_k8s_config.service_k8s is defined
    - service_k8s_config.service_k8s.cluster is defined
  tags: always
