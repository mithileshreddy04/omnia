# ============================================================================
# OMNIA VERSION-SPECIFIC REPOSITORIES FOR MULTI-HOP UPGRADES
# ============================================================================
# This file contains repositories organized by Omnia version to support:
# - Multi-hop upgrades (e.g., 2.1.0.0 → 2.2.0.0 → 2.3.0.0)
# - Automatic intermediate K8s hop support
# - Future component additions (e.g., slurm in Omnia 2.3.0.0)
# - Rollback to any intermediate Omnia version
#
# Structure:
#   omnia_versions:
#     "<omnia_version>":
#       omnia_repo_url_rhel_x86_64: [ repo entries... ]
#
# Design Rule:
#   Each Omnia version entry must contain ALL repositories needed for
#   packages downloaded during that Omnia version's upgrade hop.
#   This includes repositories for auto-generated intermediate K8s hops.
#
#   Example: Omnia 2.3.0.0 with K8s 1.35.1 -> 1.37.1 (auto-generates 1.36.1):
#     "2.3.0.0" must include repos for both kubernetes-v1-36 AND kubernetes-v1-37
#
# Shared repos (epel, doca, docker-ce, baseos, appstream) come from
# input/local_repo_config.yml and are NOT duplicated here.
#
# Multi-Hop Examples:
#   2.1.0.0 → 2.2.0.0  : Uses omnia_versions["2.2.0.0"] repos
#   2.1.0.0 → 2.3.0.0  : Uses omnia_versions["2.2.0.0"] + omnia_versions["2.3.0.0"] repos
# ============================================================================

# Omnia version-specific repositories
omnia_versions:

  # --------------------------------------------------------------------------
  # Omnia 2.2.0.0 — K8s v1.35.1
  # K8s hop: 1.34.1 → 1.35.1 (direct, no intermediate hops)
  # --------------------------------------------------------------------------
  "2.2.0.0":
    omnia_repo_url_rhel_x86_64:
      - url: "https://pkgs.k8s.io/core:/stable:/v1.35/rpm/"
        gpgkey: "https://pkgs.k8s.io/core:/stable:/v1.35/rpm/repodata/repomd.xml.key"
        name: "kubernetes-v1-35"
      - url: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v1.35/rpm/"
        gpgkey: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v1.35/rpm/repodata/repomd.xml.key"
        name: "cri-o-v1-35"

  # --------------------------------------------------------------------------
  # Omnia 2.3.0.0 — K8s v1.37.1 (target), with auto-generated intermediate 1.36.1
  # K8s hops auto-generated: 1.35.1 → 1.36.1 → 1.37.1
  # Both kubernetes-v1-36 and kubernetes-v1-37 repos required here because
  # the intermediate hop (1.36.1) is downloaded as part of this Omnia upgrade.
  # --------------------------------------------------------------------------
  # Uncomment to enable multi-hop upgrade to Omnia 2.3.0.0:
  # "2.3.0.0":
  #   omnia_repo_url_rhel_x86_64:
  #     # Intermediate auto-generated hop: K8s 1.35.1 → 1.36.1
  #     - url: "https://pkgs.k8s.io/core:/stable:/v1.36/rpm/"
  #       gpgkey: "https://pkgs.k8s.io/core:/stable:/v1.36/rpm/repodata/repomd.xml.key"
  #       name: "kubernetes-v1-36"
  #     - url: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v1.36/rpm/"
  #       gpgkey: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v1.36/rpm/repodata/repomd.xml.key"
  #       name: "cri-o-v1-36"
  #     # Final hop: K8s 1.36.1 → 1.37.1
  #     - url: "https://pkgs.k8s.io/core:/stable:/v1.37/rpm/"
  #       gpgkey: "https://pkgs.k8s.io/core:/stable:/v1.37/rpm/repodata/repomd.xml.key"
  #       name: "kubernetes-v1-37"
  #     - url: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v1.37/rpm/"
  #       gpgkey: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v1.37/rpm/repodata/repomd.xml.key"
  #       name: "cri-o-v1-37"

    # User-defined repositories for custom components (placeholder for future use)
    # user_repo_url_x86_64:
    #   - { url: "https://download.schedmd.com/slurm/25.11/rpm/rhel10/x86_64/", gpgkey: "...", name: "slurm_custom" }
