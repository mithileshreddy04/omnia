---
# Detect the upgrade hop chain from upgrade_vars.yml
# This replaces the separate upgrade_paths.yml file for single source of truth
#
# Inputs:
#   k8s_from_version   — current cluster version (e.g. "1.34.1")
#   k8s_from_minor     — current cluster minor (e.g. "1.34")
#   components         — loaded from upgrade_vars.yml (top-level key)
#
# Outputs (set_fact):
#   hop_chain         — list of dicts: [{from_minor, to_version}, ...]
#   is_multi_hop      — boolean, true if chain has > 1 hop
#   k8s_target_version — target version from manifest

# ── Extract target version from manifest ─────────────────────────────
- name: Set k8s_target_version from manifest
  ansible.builtin.set_fact:
    k8s_target_version: "{{ components.service_k8s.supported_versions | last }}"

# ── Extract supported versions from manifest ────────────────────────
- name: Set supported versions list
  ansible.builtin.set_fact:
    _supported_versions: "{{ components.service_k8s.supported_versions }}"

# ── Find current version index in supported versions ─────────────────
- name: Find current version index
  ansible.builtin.set_fact:
    _current_version_index: "{{ _supported_versions.index(k8s_from_version) }}"
  when: k8s_from_version in _supported_versions

# ── Fail if current version not in supported versions ───────────────
- name: Fail if current version not supported
  ansible.builtin.fail:
    msg: >-
      Current K8s version {{ k8s_from_version }} not found in supported versions: {{ _supported_versions | join(', ') }}.
      Cannot determine upgrade path.
  when: k8s_from_version not in _supported_versions

# ── Build hop chain from supported versions ───────────────────────────
- name: Build hop chain from current version to target
  ansible.builtin.set_fact:
    _hop_chain_raw: "{{ _supported_versions[_current_version_index | int + 1 :] }}"
  when: _current_version_index is defined

# ── Convert version list to hop chain format ─────────────────────────
# For multi-hop chains, each hop's from_minor must be the minor version
# of the PREVIOUS version in _supported_versions, not the initial
# k8s_from_minor.  e.g. 1.34.1 → 1.35.1 → 1.36.1 produces:
#   hop 1: from_minor=1.34, to_version=1.35.1
#   hop 2: from_minor=1.35, to_version=1.36.1
- name: Build from-version list for each hop
  ansible.builtin.set_fact:
    _hop_from_versions: >-
      {{ _supported_versions[_current_version_index | int : _current_version_index | int + (_hop_chain_raw | length)] }}
  when: _hop_chain_raw is defined and _hop_chain_raw | length > 0

- name: Initialize hop chain
  ansible.builtin.set_fact:
    hop_chain: []
  when: _hop_chain_raw is defined and _hop_chain_raw | length > 0

- name: Build hop chain with correct from_minor per hop
  ansible.builtin.set_fact:
    hop_chain: >-
      {{ hop_chain + [{
        'from_minor': _hop_from_versions[hop_idx] | regex_replace('\.[0-9]+$', ''),
        'to_version': _hop_chain_raw[hop_idx],
        'artifacts_dir': 'v' + _hop_chain_raw[hop_idx]
      }] }}
  loop: "{{ range(_hop_chain_raw | length) | list }}"
  loop_control:
    loop_var: hop_idx
  when: _hop_chain_raw is defined and _hop_chain_raw | length > 0

# ── Handle case where already at target version ───────────────────────
- name: Set empty hop chain if already at target
  ansible.builtin.set_fact:
    hop_chain: []
  when: _hop_chain_raw is not defined or _hop_chain_raw | length == 0

# ── Set is_multi_hop flag ───────────────────────────────────────────
- name: Set is_multi_hop flag
  ansible.builtin.set_fact:
    is_multi_hop: "{{ hop_chain | length > 1 }}"

# ── Display hop chain ────────────────────────────────────────────────
- name: Display upgrade hop chain
  ansible.builtin.debug:
    msg: >-
      Upgrade hop chain ({{ hop_chain | length }} hop{{ 's' if hop_chain | length > 1 else '' }}):
      {% for hop in hop_chain %}
      {{ loop.index }}. {{ hop.from_minor }} → {{ hop.to_version }}
      {% endfor %}
      {% if hop_chain | length == 0 %}
      Cluster already at target version {{ k8s_target_version }}.
      {% endif %}

# ── Display configuration summary ─────────────────────────────────────
- name: Display configuration summary
  ansible.builtin.debug:
    msg: >-
      Hop chain derived from upgrade_vars.yml.
      Current: {{ k8s_from_version }}, Target: {{ k8s_target_version }}
      Hops: {{ hop_chain | length }}
