---
- name: Validate node version and status - {{ current_node_name }}
  ansible.builtin.command:
    cmd: >-
      kubectl get node {{ node_ip }}
      -o jsonpath="{.status.nodeInfo.kubeletVersion} {range .status.conditions[?(@.type==\"Ready\")]}{.status}{end}"
  delegate_to: "{{ kube_vip }}"
  register: validate_result
  changed_when: false

- name: Verify node is at target version and Ready
  ansible.builtin.assert:
    that:
      - "'v' + k8s_target_version in validate_result.stdout"
      - "'True' in validate_result.stdout"
    fail_msg: >-
      Node {{ current_node_name }} validation failed.
      Expected v{{ k8s_target_version }} Ready, got: {{ validate_result.stdout }}
    success_msg: "Node {{ current_node_name }} upgraded to v{{ k8s_target_version }} and Ready."
