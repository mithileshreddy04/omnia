# Node-specific status updates using custom k8s_upgrade_status module
# This module provides optimized performance with file locking and atomic operations
#
# Required variables:
#   - node_name: The name of the node to update
#   - node_status_update: The status update dictionary for this node
#   - status_file: path to status file on kube_vip
#   - kube_vip: target host where status file is stored
#
# Example usage:
#   - ansible.builtin.include_tasks: update_node_status.yml
#     vars:
#       node_name: "{{ current_node_name }}"
#       node_status_update:
#         status: in_progress
#         steps:
#           setup_repos:
#             status: completed
#             timestamp: "{{ now(utc=true).isoformat() }}"

- name: Update node status using custom module
  k8s_upgrade_status:
    status_file: "{{ status_file }}"
    kube_vip: "{{ kube_vip }}"
    node_name: "{{ node_name }}"
    node_status_update: "{{ node_status_update }}"
  delegate_to: "{{ kube_vip }}"
  register: _status_update_result

- name: Update in-memory upgrade_status
  ansible.builtin.set_fact:
    upgrade_status: "{{ _status_update_result.merged_status }}"
