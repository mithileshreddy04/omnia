---
# This file contains the tasks to upgrade a single additional control plane node.
# It is meant to be included from a play that targets k8s_control_plane hosts.
# This is the task-only version of upgrade_cp.yml (without the hosts: directive).

- name: Check if upgrade status file exists on kube_vip
  ansible.builtin.stat:
    path: "{{ status_file }}"
  delegate_to: "{{ kube_vip }}"
  register: status_file_check
  run_once: true

- name: Load upgrade status
  ansible.builtin.slurp:
    src: "{{ status_file }}"
  delegate_to: "{{ kube_vip }}"
  register: status_slurp
  run_once: true
  when: status_file_check.stat.exists | default(false)

- name: Parse upgrade status
  ansible.builtin.set_fact:
    upgrade_status: "{{ status_slurp.content | b64decode | from_yaml }}"
  run_once: true
  when: status_file_check.stat.exists | default(false)

- name: Abort if upgrade status file is missing on kube_vip
  ansible.builtin.fail:
    msg: >-
      Upgrade status file is missing on kube_vip ({{ kube_vip }}).
      Expected: {{ status_file }}
      This file should be created during the orchestration phase (load_status.yml).
  run_once: true
  when: not (status_file_check.stat.exists | default(false))

- name: Set current node name
  ansible.builtin.set_fact:
    current_node_name: "{{ inventory_hostname }}"

- name: Set node IP from upgrade status
  ansible.builtin.set_fact:
    node_ip: "{{ upgrade_status.nodes[inventory_hostname].ip }}"
  when: upgrade_status.nodes[inventory_hostname].ip is defined

- name: Skip node if already completed - {{ current_node_name }}
  ansible.builtin.debug:
    msg: "Node {{ current_node_name }} already completed — skipping."
  when: (upgrade_status.nodes[current_node_name].status | default('pending')) == 'completed'

- name: Upgrade control plane {{ current_node_name }}
  when: (upgrade_status.nodes[current_node_name].status | default('pending')) != 'completed'
  block:
    - name: Mark node in_progress
      ansible.builtin.include_tasks: update_node_status.yml
      vars:
        node_name: "{{ current_node_name }}"
        node_status_update:
          status: in_progress

    # ── setup_repos ──────────────────────────────────────────────────
    # NOTE: setup_repos is now done globally in upgrade_k8s.yml before Execute play
    # Mark as completed here for status tracking
    - name: Mark setup_repos completed (done globally)
      ansible.builtin.include_tasks: update_node_status.yml
      vars:
        node_name: "{{ current_node_name }}"
        node_status_update:
          steps:
            setup_repos:
              status: completed
              timestamp: "{{ ansible_date_time.iso8601 }}"
              error:

    - name: Run kubeadm_install on {{ current_node_name }}
      when: (upgrade_status.nodes[current_node_name].steps.kubeadm_install.status | default('pending')) != 'completed'
      block:
        - name: Mark kubeadm_install in_progress
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                kubeadm_install:
                  status: in_progress
                  timestamp: "{{ ansible_date_time.iso8601 }}"
        - name: Execute kubeadm install
          ansible.builtin.include_tasks: step_kubeadm_install.yml
        - name: Mark kubeadm_install completed
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                kubeadm_install:
                  status: completed
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  error:

    - name: Run kubeadm_upgrade_node on {{ current_node_name }}
      when: (upgrade_status.nodes[current_node_name].steps.kubeadm_upgrade_node.status | default('pending')) != 'completed'
      block:
        - name: Mark kubeadm_upgrade_node in_progress
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                kubeadm_upgrade_node:
                  status: in_progress
                  timestamp: "{{ ansible_date_time.iso8601 }}"
        - name: Execute kubeadm upgrade node
          ansible.builtin.include_tasks: step_upgrade_node.yml
        - name: Mark kubeadm_upgrade_node completed
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                kubeadm_upgrade_node:
                  status: completed
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  error:

    - name: Run drain on {{ current_node_name }}
      when: (upgrade_status.nodes[current_node_name].steps.drain.status | default('pending')) != 'completed'
      block:
        - name: Mark drain in_progress
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                drain:
                  status: in_progress
                  timestamp: "{{ ansible_date_time.iso8601 }}"
        - name: Execute drain
          ansible.builtin.include_tasks: step_drain.yml
        - name: Mark drain completed
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                drain:
                  status: completed
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  error:

    - name: Run kubelet_install on {{ current_node_name }}
      when: (upgrade_status.nodes[current_node_name].steps.kubelet_install.status | default('pending')) != 'completed'
      block:
        - name: Mark kubelet_install in_progress
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                kubelet_install:
                  status: in_progress
                  timestamp: "{{ ansible_date_time.iso8601 }}"
        - name: Execute kubelet install
          ansible.builtin.include_tasks: step_kubelet_install.yml
        - name: Mark kubelet_install completed
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                kubelet_install:
                  status: completed
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  error:

    - name: Run crio_install on {{ current_node_name }}
      when: (upgrade_status.nodes[current_node_name].steps.crio_install.status | default('pending')) != 'completed'
      block:
        - name: Mark crio_install in_progress
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                crio_install:
                  status: in_progress
                  timestamp: "{{ ansible_date_time.iso8601 }}"
        - name: Execute crio install
          ansible.builtin.include_tasks: step_crio_install.yml
        - name: Mark crio_install completed
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                crio_install:
                  status: completed
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  error:

    - name: Run kubelet_restart on {{ current_node_name }}
      when: (upgrade_status.nodes[current_node_name].steps.kubelet_restart.status | default('pending')) != 'completed'
      block:
        - name: Mark kubelet_restart in_progress
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                kubelet_restart:
                  status: in_progress
                  timestamp: "{{ ansible_date_time.iso8601 }}"
        - name: Execute kubelet restart
          ansible.builtin.include_tasks: step_kubelet_restart.yml
        - name: Mark kubelet_restart completed
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                kubelet_restart:
                  status: completed
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  error:

    - name: Run uncordon on {{ current_node_name }}
      when: (upgrade_status.nodes[current_node_name].steps.uncordon.status | default('pending')) != 'completed'
      block:
        - name: Mark uncordon in_progress
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                uncordon:
                  status: in_progress
                  timestamp: "{{ ansible_date_time.iso8601 }}"
        - name: Execute uncordon
          ansible.builtin.include_tasks: step_uncordon.yml
        - name: Mark uncordon completed
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                uncordon:
                  status: completed
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  error:

    - name: Run validation on {{ current_node_name }}
      when: (upgrade_status.nodes[current_node_name].steps.validation.status | default('pending')) != 'completed'
      block:
        - name: Execute node validation
          ansible.builtin.include_tasks: step_validate_node.yml
        - name: Mark validation completed
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                validation:
                  status: completed
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  error:

    - name: Run etcd health check after {{ current_node_name }}
      when: (upgrade_status.nodes[current_node_name].steps.etcd_health_check.status | default('pending')) != 'completed'
      block:
        - name: Execute etcd health check
          ansible.builtin.include_tasks: step_etcd_health_check.yml
        - name: Mark etcd_health_check completed
          ansible.builtin.include_tasks: update_node_status.yml
          vars:
            node_name: "{{ current_node_name }}"
            node_status_update:
              steps:
                etcd_health_check:
                  status: completed
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  error:

    - name: Mark node completed - {{ current_node_name }}
      ansible.builtin.include_tasks: update_node_status.yml
      vars:
        node_name: "{{ current_node_name }}"
        node_status_update:
          status: completed
          version_current: "{{ k8s_target_version }}"

    - name: Display upgrade completion for {{ current_node_name }}
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════════════════════════════════
          NODE UPGRADE COMPLETE: {{ current_node_name }}
          ════════════════════════════════════════════════════════════════════
          Role: Control Plane
          From version: {{ upgrade_status.nodes[current_node_name].version_before | default('unknown') }}
          To version: {{ k8s_target_version }}
          Status: COMPLETED
          ════════════════════════════════════════════════════════════════════

  rescue:
    - name: Mark node as failed - {{ current_node_name }}
      ansible.builtin.include_tasks: update_node_status.yml
      vars:
        node_name: "{{ current_node_name }}"
        node_status_update:
          status: failed

    - name: Warn about CP failure (continues to next CP)
      ansible.builtin.debug:
        msg: "WARNING: Control plane {{ current_node_name }} upgrade failed. Will retry on next run."
