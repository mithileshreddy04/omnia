---
- name: Verify calico-node pods are Running
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: >-
      kubectl get pods -n kube-system -l k8s-app=calico-node
      --no-headers -o custom-columns=':status.phase'
  register: calico_pods
  changed_when: false
  failed_when: false

- name: Warn if any calico-node pod is not Running
  ansible.builtin.debug:
    msg: "WARNING: Some calico-node pods are not Running: {{ calico_pods.stdout }}"
  when: "'Running' not in calico_pods.stdout or calico_pods.rc != 0"

- name: Verify MetalLB pods are Running
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: >-
      kubectl get pods -n metallb-system --no-headers
      -o custom-columns=':metadata.name,:status.phase'
  register: metallb_pods
  changed_when: false
  failed_when: false

- name: Warn if any MetalLB pod is not Running
  ansible.builtin.debug:
    msg: "WARNING: Some MetalLB pods not Running: {{ metallb_pods.stdout }}"
  when: "'Running' not in metallb_pods.stdout or metallb_pods.rc != 0"

- name: Verify LoadBalancer services have EXTERNAL-IP
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: >-
      kubectl get svc -A --field-selector spec.type=LoadBalancer
      -o jsonpath='{range .items[*]}{.metadata.name}: {.status.loadBalancer.ingress[0].ip}{"\n"}{end}'
  register: lb_services
  changed_when: false
  failed_when: false

- name: Display addon validation summary
  ansible.builtin.debug:
    msg: >-
      Addon validation complete.
      Calico pods: {{ 'OK' if calico_pods.rc == 0 else 'WARN' }}
      MetalLB pods: {{ 'OK' if metallb_pods.rc == 0 else 'WARN' }}
      LoadBalancer IPs: {{ lb_services.stdout | default('none') }}
