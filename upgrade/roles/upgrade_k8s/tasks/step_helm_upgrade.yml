---
- name: Set Helm tarball and binary paths (consistent with fresh install)
  ansible.builtin.set_fact:
    helm_tarball: "{{ k8s_client_mount_path }}/helm/{{ helm_package }}.tar.gz"
    helm_binary_path: "{{ k8s_client_mount_path }}/helm/linux-amd64-helm-v{{ helm_target_version }}/helm"

- name: Back up current Helm binary
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: "cp /usr/local/bin/helm /usr/local/bin/helm.bak"
  changed_when: true
  failed_when: false

- name: Copy Helm binary from NFS to kube_vip
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.copy:
    src: "{{ helm_binary_path }}"
    dest: /usr/local/bin/helm
    mode: "0755"
    remote_src: true

- name: Verify Helm version
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: helm version --short
  register: helm_version_check
  changed_when: false

- name: Display Helm version
  ansible.builtin.debug:
    msg: "Helm upgraded to: {{ helm_version_check.stdout }}"
