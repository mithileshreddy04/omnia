---
- name: Set MetalLB manifest path
  ansible.builtin.set_fact:
    metallb_source: "{{ k8s_client_mount_path }}/metallb/{{ metallb_package }}.yml"
    metallb_work: "/tmp/metallb-upgrade-{{ metallb_target_version }}.yaml"

- name: Copy MetalLB manifest to working location
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.copy:
    src: "{{ metallb_source }}"
    dest: "{{ metallb_work }}"
    remote_src: true
    mode: "0644"

- name: Apply MetalLB manifest
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: "kubectl apply --server-side --force-conflicts -f {{ metallb_work }}"
  register: metallb_apply
  changed_when: true

- name: Wait for MetalLB speaker DaemonSet rollout
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: "kubectl rollout status daemonset/speaker -n metallb-system --timeout={{ addon_rollout_timeout }}s"
  register: metallb_speaker_rollout
  changed_when: false

- name: Wait for MetalLB controller Deployment rollout
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: "kubectl rollout status deployment/controller -n metallb-system --timeout=120s"
  register: metallb_controller_rollout
  changed_when: false
