---
# Sync local Pulp repos for ALL hop target versions in a single local_repo call.
#
# Merges local_repo_config.yml and service_k8s.json from every hop's artifacts
# directory into a combined staging directory, then invokes local_repo.yml once.
# This avoids N× overhead of credential loading, Pulp validation, and SELinux setup.
#
# Inputs:
#   hop_chain        — list of hops (from detect_hop_chain_from_manifest.yml)
#   input_project_dir — real input directory (shared files symlinked from here)

- name: "Prep_sync_repos — Check which hops already have Pulp repos"
  ansible.builtin.command:
    cmd: >-
      pulp rpm distribution show
      --name x86_64_rhel_{{ cluster_os_version }}_kubernetes-v{{ item.to_version
        | regex_replace('\.[0-9]+$', '')
        | replace('.', '-') }}
  loop: "{{ hop_chain }}"
  loop_control:
    label: "v{{ item.to_version }}"
  register: _pulp_checks
  changed_when: false
  failed_when: false

- name: "Prep_sync_repos — Build list of hops needing sync"
  ansible.builtin.set_fact:
    _hops_needing_sync: >-
      {{ _pulp_checks.results
         | selectattr('rc', 'ne', 0)
         | map(attribute='item')
         | list }}

- name: "Prep_sync_repos — Skip if all repos already synced"
  ansible.builtin.debug:
    msg: >-
      All {{ hop_chain | length }} hop(s) already have Pulp repos synced — skipping.
  when: _hops_needing_sync | length == 0

- name: Prep sync repos — Sync repos
  when: _hops_needing_sync | length > 0
  block:
    - name: "Prep_sync_repos — Create staging directory"
      ansible.builtin.tempfile:
        state: directory
        prefix: "upgrade_repo_sync_"
      register: _repo_staging

    - name: "Prep_sync_repos — Merge configs from all hops"
      ansible.builtin.include_tasks: prep_merge_configs.yml
      vars:
        _staging_dir: "{{ _repo_staging.path }}"

    # Symlink shared (non-version-specific) files from real input dir.
    # local_repo.yml / validate_config may need these.
    - name: "Prep_sync_repos — Symlink shared files from input_project_dir"
      ansible.builtin.file:
        src: "{{ input_project_dir }}/{{ item }}"
        dest: "{{ _repo_staging.path }}/{{ item }}"
        state: link
        force: false
      loop:
        - network_spec.yml
        - omnia_config_credentials.yml
        - build_stream_config.yml
        - storage_config.yml
        - high_availability_config.yml
      failed_when: false

    # Symlink package manifests (used by parse_and_download for RPM list).
    - name: "Prep_sync_repos — Create config subdirectories for shared package manifests"
      ansible.builtin.file:
        path: "{{ _repo_staging.path }}/config/x86_64/rhel/{{ cluster_os_version }}"
        state: directory
        mode: "{{ dir_perm_755 }}"

    - name: "Prep_sync_repos — Symlink shared package manifests"
      ansible.builtin.file:
        src: "{{ input_project_dir }}/config/x86_64/rhel/{{ cluster_os_version }}/{{ item }}"
        dest: "{{ _repo_staging.path }}/config/x86_64/rhel/{{ cluster_os_version }}/{{ item }}"
        state: link
        force: false
      loop:
        - default_packages.json
        - additional_packages.json
        - admin_debug_packages.json
      failed_when: false

    - name: "Prep_sync_repos — Run local_repo playbook with merged staging dir"
      ansible.builtin.command:
        cmd: >-
          ansible-playbook
          {{ role_path }}/../../local_repo/local_repo.yml
          --extra-vars "input_project_dir={{ _repo_staging.path }}"
          --extra-vars "project_dir_status=true"
          --extra-vars "softwares=service_k8s"
      register: _sync_result
      changed_when: "'changed=' in _sync_result.stdout"

    - name: "Prep_sync_repos — Verify repos exist for all hops"
      ansible.builtin.command:
        cmd: >-
          pulp rpm distribution show
          --name x86_64_rhel_{{ cluster_os_version }}_kubernetes-v{{ item.to_version
            | regex_replace('\.[0-9]+$', '')
            | replace('.', '-') }}
      loop: "{{ _hops_needing_sync }}"
      loop_control:
        label: "v{{ item.to_version }}"
      changed_when: false

  always:
    - name: "Prep_sync_repos — Clean up staging directory"
      ansible.builtin.file:
        path: "{{ _repo_staging.path }}"
        state: absent
      when: _repo_staging.path is defined
