---
- name: Load upgrade status from kube_vip
  ansible.builtin.slurp:
    src: "{{ k8s_client_mount_path }}/upgrade/upgrade_status.yml"
  delegate_to: "{{ kube_vip }}"
  register: status_slurp

- name: Parse upgrade status
  ansible.builtin.set_fact:
    upgrade_status: "{{ status_slurp.content | b64decode | from_yaml }}"

- name: Check if k8s config backup is already completed
  ansible.builtin.debug:
    msg: "k8s config backup already completed (status: {{ upgrade_status.k8s_config_backup.status | default('pending') }}) - skipping backup"
  when:
    - upgrade_status.k8s_config_backup.status | default('pending') == 'completed'

- name: Skip k8s config backup if already completed
  ansible.builtin.meta: noop
  when: upgrade_status.k8s_config_backup.status | default('pending') == 'completed'

- name: Ensure config backup directory exists
  ansible.builtin.file:
    path: "{{ k8s_config_backup_dir }}"
    state: directory
    mode: "0755"
  when: upgrade_status.k8s_config_backup.status | default('pending') != 'completed'

- name: Create node-specific backup directories
  ansible.builtin.file:
    path: "{{ k8s_config_backup_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  when: upgrade_status.k8s_config_backup.status | default('pending') != 'completed'

- name: Check if k8s-config backup already exists
  ansible.builtin.stat:
    path: "{{ k8s_config_backup_dir }}/{{ inventory_hostname }}/k8s-config.tar.gz"
  register: k8s_config_backup_stat
  when: upgrade_status.k8s_config_backup.status | default('pending') != 'completed'

- name: Archive /etc/kubernetes to NFS mount (only if backup doesn't exist)
  ansible.builtin.archive:
    path: /etc/kubernetes
    dest: "{{ k8s_config_backup_dir }}/{{ inventory_hostname }}/k8s-config.tar.gz"
    format: gz
    mode: "0644"
  register: k8s_config_archive
  when:
    - upgrade_status.k8s_config_backup.status | default('pending') != 'completed'
    - k8s_config_backup_stat.stat is defined
    - not k8s_config_backup_stat.stat.exists

- name: Set permissions on archived k8s config
  ansible.builtin.file:
    path: "{{ k8s_config_backup_dir }}/{{ inventory_hostname }}/k8s-config.tar.gz"
    mode: "0644"
  when:
    - k8s_config_archive is defined
    - k8s_config_archive.dest is defined

- name: Update k8s config backup status
  ansible.builtin.include_tasks: update_status.yml
  run_once: true
  when: upgrade_status.k8s_config_backup.status | default('pending') != 'completed'
  vars:
    status_file: "{{ k8s_client_mount_path }}/upgrade/upgrade_status.yml"
    status_update:
      k8s_config_backup:
        status: completed
        path: "{{ k8s_config_backup_dir }}"
        timestamp: "{{ now(utc=true).isoformat() }}"
        error:
