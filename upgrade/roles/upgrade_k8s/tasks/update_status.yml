# Consolidated task for updating upgrade_status.yml using custom k8s_upgrade_status module
# This module provides optimized performance with file locking and atomic operations
#
# Required variables:
#   - status_file: path to status file on kube_vip
#   - kube_vip: target host where status file is stored
#
# For general updates (etcd_backup, k8s_config_backup, addon_upgrade, etc.):
#   - status_update: dict to merge into status
#
# For node-specific updates:
#   - node_name: name of the node to update
#   - node_status_update: dict to merge into that node's status
#
# Example usage (general):
#   - ansible.builtin.include_tasks: update_status.yml
#     vars:
#       status_update:
#         etcd_backup:
#           status: completed
#           timestamp: "{{ now(utc=true).isoformat() }}"
#
# Example usage (node-specific):
#   - ansible.builtin.include_tasks: update_status.yml
#     vars:
#       node_name: kcp1
#       node_status_update:
#         status: in_progress
#         steps:
#           drain:
#             status: completed

- name: Update status using custom module (node-specific)
  k8s_upgrade_status:
    status_file: "{{ status_file }}"
    kube_vip: "{{ kube_vip }}"
    node_name: "{{ node_name }}"
    node_status_update: "{{ node_status_update }}"
  delegate_to: "{{ kube_vip }}"
  register: _status_update_result
  when: node_name is defined and node_status_update is defined

- name: Update status using custom module (general)
  k8s_upgrade_status:
    status_file: "{{ status_file }}"
    kube_vip: "{{ kube_vip }}"
    status_update: "{{ status_update }}"
  delegate_to: "{{ kube_vip }}"
  register: _status_update_result
  when: status_update is defined and node_name is not defined

- name: Update in-memory upgrade_status
  ansible.builtin.set_fact:
    upgrade_status: "{{ _status_update_result.merged_status }}"
