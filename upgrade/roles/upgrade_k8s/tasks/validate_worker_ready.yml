---
# Validate a specific worker node is ready after upgrade (Component Spec PHASE 6).
# This validates that worker-1 is ready after its individual upgrade before
# proceeding to upgrade the remaining workers.

- name: Get target node status
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: "kubectl get node {{ target_node_ip }} --no-headers"
  register: worker_node_status
  changed_when: false

- name: Verify target node is Ready
  ansible.builtin.fail:
    msg: >-
      Worker-1 validation failed: Node {{ target_node }} is not Ready.
      {{ worker_node_status.stdout }}
  when: "'NotReady' in worker_node_status.stdout"

- name: Get target node version
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: >-
      kubectl get node {{ target_node_ip }}
      -o jsonpath='{.status.nodeInfo.kubeletVersion}'
  register: worker_node_version
  changed_when: false

- name: Verify target node is at target version
  ansible.builtin.fail:
    msg: >-
      Worker-1 validation failed: Node {{ target_node }} is not at v{{ k8s_target_version }}.
      Current version: {{ worker_node_version.stdout }}
  when: "'v' + k8s_target_version not in worker_node_version.stdout"

- name: Display worker-1 validation success
  ansible.builtin.debug:
    msg: >-
      Worker-1 validation successful: {{ target_node }} is Ready at v{{ k8s_target_version }}.
