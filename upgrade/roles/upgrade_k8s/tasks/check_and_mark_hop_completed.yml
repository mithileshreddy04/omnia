---
- name: Get all node versions
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: >-
      kubectl get nodes -o jsonpath='{range .items[*]}{.status.nodeInfo.kubeletVersion}{"\n"}{end}'
  register: all_node_versions
  changed_when: false

- name: Check if all nodes are at target version
  ansible.builtin.set_fact:
    _all_nodes_upgraded: >-
      {{ all_node_versions.stdout_lines
      | map('regex_replace', '^v', '')
      | unique | list
      | length == 1
      and k8s_target_version in all_node_versions.stdout }}

- name: Update hop_status to completed if all nodes upgraded
  ansible.builtin.include_tasks: update_node_step.yml
  vars:
    status_update:
      hop_status: >-
        {{ {k8s_target_version: {'status': 'completed', 'completed_at': ansible_date_time.iso8601}} }}
  when: _all_nodes_upgraded | bool

- name: Display hop completion status
  ansible.builtin.debug:
    msg: >-
      {% if _all_nodes_upgraded %}
      Hop to {{ k8s_target_version }} COMPLETED - All nodes upgraded successfully.
      {% else %}
      Hop to {{ k8s_target_version }} IN PROGRESS - Some nodes still pending upgrade.
      {% endif %}
