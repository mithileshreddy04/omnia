# ── Helm upgrade (ABORT on failure) ─────────────────────────────
- name: Starting Helm upgrade
  ansible.builtin.debug:
    msg: "Starting Helm addon upgrade from {{ helm_from_version | default('unknown') }} to {{ helm_target_version }}..."
  when: (upgrade_status.addon_upgrade.helm.status | default('pending')) != 'completed'

- name: Mark Helm in_progress
  ansible.builtin.include_tasks: update_addon_step.yml
  vars:
    addon_name: helm
    addon_status_update:
      status: in_progress
      from_version: "{{ helm_from_version | default('unknown') }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"
  when: (upgrade_status.addon_upgrade.helm.status | default('pending')) != 'completed'

- name: Upgrade Helm
  when: (upgrade_status.addon_upgrade.helm.status | default('pending')) != 'completed'
  block:
    - name: Execute Helm upgrade
      ansible.builtin.include_tasks: step_helm_upgrade.yml

    - name: Mark Helm completed
      ansible.builtin.include_tasks: update_addon_step.yml
      vars:
        addon_name: helm
        addon_status_update:
          status: completed
