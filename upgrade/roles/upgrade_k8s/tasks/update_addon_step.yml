---
- name: Build resolved addon status entry for {{ addon_name }}
  ansible.builtin.set_fact:
    _addon_status_entry: >-
      {{ {addon_name: addon_status_update} }}

- name: Update addon status
  ansible.builtin.include_tasks: update_node_step.yml
  vars:
    status_update:
      addon_upgrade: "{{ _addon_status_entry }}"
