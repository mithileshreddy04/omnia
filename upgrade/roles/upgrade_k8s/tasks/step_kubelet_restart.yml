---
# Part 1: Reload systemd on the node
- name: Reload systemd on {{ current_node_name }}
  ansible.builtin.systemd:
    daemon_reload: true
  delegate_to: "{{ current_node_name }}"

# Part 2: Restart crio service
- name: Restart crio on {{ current_node_name }}
  ansible.builtin.systemd:
    name: crio
    state: restarted
  delegate_to: "{{ current_node_name }}"

# Part 3: Restart kubelet service
- name: Restart kubelet on {{ current_node_name }}
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
  delegate_to: "{{ current_node_name }}"

# Part 4: Wait for node to become Ready with correct version
- name: Wait for node to become Ready
  ansible.builtin.command: >-
    kubectl get node {{ node_ip }}
    -o jsonpath="{.status.nodeInfo.kubeletVersion}:{range .status.conditions[?(@.type==\"Ready\")]}{.status}{end}"
  delegate_to: "{{ kube_vip }}"
  register: node_ready_check
  changed_when: false
  retries: "{{ kubelet_ready_retries }}"
  delay: "{{ kubelet_ready_delay }}"
  until:
    - node_ready_check.rc == 0
    - "'v' + k8s_target_version + ':True' in node_ready_check.stdout"
