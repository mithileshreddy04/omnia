---

- name: Post-upgrade health check
  block:
    - name: Wait for service initialization
      ansible.builtin.pause:
        seconds: 60

    - name: Test BSS endpoint availability
      ansible.builtin.uri:
        url: "{{ openchami_bss_endpoint }}"
        method: GET
        validate_certs: false
        status_code: [200, 401]
      register: bss_post_check
      failed_when: bss_post_check.status not in [200, 401]

    - name: Test SMD endpoint availability
      ansible.builtin.uri:
        url: "{{ openchami_smd_endpoint }}"
        method: GET
        validate_certs: false
        status_code: [200, 401]
      register: smd_post_check
      failed_when: smd_post_check.status not in [200, 401]

    - name: Capture post-upgrade node count from SMD
      ansible.builtin.shell: |
        set -o pipefail
        curl -k -s {{ openchami_smd_endpoint }} | jq '.Components | length' || echo "0"
      register: post_upgrade_node_count
      changed_when: false

    - name: Verify node count matches baseline
      ansible.builtin.assert:
        that:
          - post_upgrade_node_count.stdout | int == pre_upgrade_node_count.stdout | int
        fail_msg: "{{ upgrade_messages.health_check.node_count_mismatch }}"
        success_msg: "{{ upgrade_messages.health_check.node_count_match }}"

    - name: Test MinIO S3 access
      ansible.builtin.shell: |
        set -o pipefail
        podman exec minio-server mc ls local/
      register: minio_post_check
      changed_when: false
      failed_when: minio_post_check.rc != 0

    - name: Verify container image versions
      ansible.builtin.shell: |
        set -o pipefail
        podman inspect {{ item.container }} --format '{% raw %}{{.Image}}{% endraw %}' | \
        podman inspect --format '{% raw %}{{index .RepoTags 0}}{% endraw %}' -
      loop: "{{ openchami_containers }}"
      register: version_check
      changed_when: false
      failed_when: version_check.stdout != item.expected_image

    - name: Display post-upgrade health check success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.health_check.post_check_success }}"

  rescue:
    - name: Post-upgrade health check failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.health_check.post_check_failure }}\n{{ upgrade_messages.troubleshooting.post_check_diagnosis }}"
