---

- name: Post-upgrade health check
  block:
    - name: Wait for service initialization
      ansible.builtin.pause:
        seconds: 60

    - name: Verify all OpenCHAMI containers are running
      ansible.builtin.command: podman ps --filter "name={{ item }}" --format '{% raw %}{{.Names}}{% endraw %}'
      loop: "{{ openchami_critical_containers }}"
      register: container_check
      changed_when: false
      failed_when: container_check.stdout | length == 0
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Check postgres database connectivity
      ansible.builtin.shell: |
        set -o pipefail
        podman exec postgres pg_isready
      register: postgres_check
      changed_when: false
      failed_when: postgres_check.rc != 0
      delegate_to: oim
      connection: ssh

    - name: Verify container image versions
      ansible.builtin.shell: |
        set -o pipefail
        podman inspect {{ item.container }} --format '{% raw %}{{index .RepoTags 0}}{% endraw %}'
      loop: "{{ openchami_containers }}"
      register: version_check
      changed_when: false
      failed_when: version_check.stdout != item.expected_image
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display post-upgrade health check success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.health_check.post_check_success }}"

  rescue:
    - name: Post-upgrade health check failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.health_check.post_check_failure }}\n{{ upgrade_messages.troubleshooting.post_check_diagnosis }}"
