---

- name: Post-upgrade health check
  block:
    - name: Wait for service initialization
      ansible.builtin.pause:
        seconds: 60

    - name: Get admin_nic_ip from hostvars
      ansible.builtin.set_fact:
        openchami_endpoint_ip: "{{ hostvars['localhost']['admin_nic_ip'] | default(ansible_default_ipv4.address) }}"
      delegate_to: oim
      delegate_facts: true

    - name: Test BSS endpoint availability
      ansible.builtin.uri:
        url: "https://{{ openchami_endpoint_ip }}:8443/boot/v1/bootscript"
        method: GET
        validate_certs: false
        status_code: [200, 401]
        timeout: 10
      register: bss_post_check
      failed_when: bss_post_check.status not in [200, 401]
      delegate_to: oim
      connection: ssh

    - name: Test SMD endpoint availability
      ansible.builtin.uri:
        url: "https://{{ openchami_endpoint_ip }}:8443/hsm/v2/State/Components"
        method: GET
        validate_certs: false
        status_code: [200, 401]
        timeout: 10
      register: smd_post_check
      failed_when: smd_post_check.status not in [200, 401]
      delegate_to: oim
      connection: ssh

    - name: Capture post-upgrade node count from SMD
      ansible.builtin.uri:
        url: "https://{{ openchami_endpoint_ip }}:8443/hsm/v2/State/Components"
        method: GET
        validate_certs: false
        return_content: true
        status_code: [200, 401]
        timeout: 10
      register: smd_components_post
      delegate_to: oim
      connection: ssh

    - name: Parse node count from SMD response
      ansible.builtin.set_fact:
        post_upgrade_node_count: "{{ (smd_components_post.json.Components | default([])) | length }}"
      delegate_to: oim
      delegate_facts: true

    - name: Verify node count matches baseline
      ansible.builtin.assert:
        that:
          - post_upgrade_node_count | int == pre_upgrade_node_count | int
        fail_msg: "{{ upgrade_messages.health_check.node_count_mismatch }}"
        success_msg: "{{ upgrade_messages.health_check.node_count_match }}"

    - name: Test MinIO S3 access
      ansible.builtin.shell: |
        set -o pipefail
        podman exec minio-server mc ls local/
      register: minio_post_check
      changed_when: false
      failed_when: minio_post_check.rc != 0
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Verify container image versions
      ansible.builtin.shell: |
        set -o pipefail
        podman inspect {{ item.container }} --format '{% raw %}{{.Image}}{% endraw %}' | \
        podman inspect --format '{% raw %}{{index .RepoTags 0}}{% endraw %}' -
      loop: "{{ openchami_containers }}"
      register: version_check
      changed_when: false
      failed_when: version_check.stdout != item.expected_image
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display post-upgrade health check success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.health_check.post_check_success }}"

  rescue:
    - name: Post-upgrade health check failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.health_check.post_check_failure }}\n{{ upgrade_messages.troubleshooting.post_check_diagnosis }}"
