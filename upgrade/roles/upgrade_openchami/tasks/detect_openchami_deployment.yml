---

- name: Check if podman is installed
  ansible.builtin.command: which podman
  register: podman_check
  changed_when: false
  failed_when: false

- name: Set podman availability fact
  ansible.builtin.set_fact:
    podman_available: "{{ podman_check.rc == 0 }}"

- name: Check if openchami.target exists
  ansible.builtin.systemd:
    name: openchami.target
  register: openchami_target_check
  failed_when: false
  when: podman_available | bool

- name: Check for OpenCHAMI containers
  ansible.builtin.command: podman ps -a --filter "name={{ item }}" --format '{% raw %}{{.Names}}{% endraw %}'
  loop: "{{ openchami_critical_containers }}"
  register: openchami_containers_check
  changed_when: false
  failed_when: false
  when: podman_available | bool

- name: Determine if OpenCHAMI is deployed
  ansible.builtin.set_fact:
    openchami_deployed: >-
      {{
        podman_available | bool and
        openchami_containers_check.results is defined and
        openchami_containers_check.results | selectattr('stdout', 'defined') | selectattr('stdout', '!=', '') | list | length > 0
      }}

- name: Display OpenCHAMI deployment status
  ansible.builtin.debug:
    msg: "OpenCHAMI deployment detected: {{ openchami_deployed }}"
