---

- name: Check if podman is installed
  ansible.builtin.command: which podman
  register: podman_check
  changed_when: false
  failed_when: false

- name: Set podman availability fact
  ansible.builtin.set_fact:
    podman_available: "{{ podman_check.rc == 0 }}"

- name: Check for running OpenCHAMI containers
  ansible.builtin.shell: |
    set -o pipefail
    podman ps --filter "name={{ item }}" --format '{% raw %}{{.Names}}{% endraw %}' | grep -w "{{ item }}" || true
  loop: "{{ openchami_critical_containers }}"
  register: openchami_containers_check
  changed_when: false
  failed_when: false
  when: podman_available | bool

- name: Debug individual container results
  ansible.builtin.debug:
    msg: "Container {{ item.item }}: stdout='{{ item.stdout }}' rc={{ item.rc }}"
  loop: "{{ openchami_containers_check.results | default([]) }}"
  when: podman_available | bool

- name: Count running OpenCHAMI containers
  ansible.builtin.set_fact:
    running_containers_count: >-
      {{
        openchami_containers_check.results | default([]) |
        selectattr('stdout', 'defined') |
        rejectattr('stdout', 'equalto', '') |
        list | length
      }}
  when: podman_available | bool

- name: Determine if OpenCHAMI is deployed and running
  ansible.builtin.set_fact:
    openchami_deployed: >-
      {{
        podman_available | bool and
        running_containers_count | default(0) | int >= 3
      }}

- name: Display OpenCHAMI deployment status
  ansible.builtin.debug:
    msg: "OpenCHAMI deployment detected: {{ openchami_deployed }} ({{ running_containers_count | default(0) }}/{{ openchami_critical_containers | length }} critical containers running)"
