# ============================================================================
# retrieve_postgres_credentials.yml — Dynamically Resolve PostgreSQL Credentials
# ============================================================================
# Reads the POSTGRES_MULTIPLE_DATABASES environment variable from the running
# postgres container to extract the actual database name and user.
# Format: "dbname:dbuser:password,dbname2:dbuser2:password2,..."
# The first entry (hmsds) is used for all HMS/SMD database operations.
#
# Falls back to POSTGRES_USER env var if POSTGRES_MULTIPLE_DATABASES is absent.
# Falls back to the default in vars/main.yml ('ochami') if neither is set.
#
# Sets facts: postgres_db_name, postgres_db_user
# Guard: Only runs if credentials haven't been resolved yet (still at default).
# ============================================================================

- name: Retrieve PostgreSQL credentials from container (if not already resolved)
  when: postgres_db_user == 'ochami' or postgres_db_user is not defined
  block:
    - name: Get POSTGRES_MULTIPLE_DATABASES from postgres container
      ansible.builtin.shell: |
        set -o pipefail
        podman exec postgres printenv POSTGRES_MULTIPLE_DATABASES 2>/dev/null || echo ""
      register: _pg_multi_db_env
      changed_when: false
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Extract hmsds database user from POSTGRES_MULTIPLE_DATABASES
      ansible.builtin.set_fact:
        postgres_db_name: "{{ _pg_multi_db_env.stdout.split(',')[0].split(':')[0] }}"
        postgres_db_user: "{{ _pg_multi_db_env.stdout.split(',')[0].split(':')[1] }}"
      when:
        - _pg_multi_db_env.stdout | default('') | length > 0
        - "':' in _pg_multi_db_env.stdout"

    - name: Fall back to POSTGRES_USER if POSTGRES_MULTIPLE_DATABASES is not set
      when: _pg_multi_db_env.stdout | default('') | length == 0 or ':' not in _pg_multi_db_env.stdout
      block:
        - name: Get POSTGRES_USER from postgres container
          ansible.builtin.shell: |
            set -o pipefail
            podman exec postgres printenv POSTGRES_USER 2>/dev/null || echo "ochami"
          register: _pg_user_env
          changed_when: false
          failed_when: false
          delegate_to: oim
          delegate_facts: true
          connection: ssh

        - name: Set postgres_db_user from POSTGRES_USER
          ansible.builtin.set_fact:
            postgres_db_user: "{{ _pg_user_env.stdout | trim }}"

    - name: Display resolved PostgreSQL credentials
      ansible.builtin.debug:
        msg: "PostgreSQL credentials resolved — db: {{ postgres_db_name }}, user: {{ postgres_db_user }}"
