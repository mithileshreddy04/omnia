# ===========================================================================
# Post-upgrade verification gate (HARD GATE)
# Fails the playbook if any services are in failed state or :latest tags remain
# ===========================================================================

- name: Post-upgrade verification gate
  tags: [openchami, upgrade, verification]
  block:

    - name: Verify no services in failed state
      ansible.builtin.shell: |
        systemctl list-dependencies omnia.target --no-pager | grep -E "^×|^\s+×" || true
      register: failed_services
      changed_when: false
      failed_when: failed_services.stdout | length > 0
      delegate_to: oim
      connection: ssh

    # WHY exclude haproxy and hydra-gen-jwks: haproxy intentionally has no
    # pinned version. hydra-gen-jwks uses curlimages/curl:latest by design.
    # WHY exclude minio-server, registry, pulp, omnia_core: These are NOT part
    # of openchami.target — they're managed separately by omnia.target.
    - name: Verify no unexpected containers running with :latest tag
      ansible.builtin.shell: |
        podman ps --format "{% raw %}{{.Names}} {{.Image}}{% endraw %}" | grep ":latest" | grep -vE '^(haproxy|hydra-gen-jwks|minio-server|registry|pulp|omnia_core) ' || true
      register: latest_containers
      changed_when: false
      failed_when: latest_containers.stdout | trim | length > 0
      delegate_to: oim
      connection: ssh

    - name: Verify coresmd services are active
      ansible.builtin.command: systemctl is-active {{ item }}
      register: coresmd_active
      changed_when: false
      failed_when: coresmd_active.stdout != "active"
      loop:
        - coresmd-coredhcp.service
        - coresmd-coredns.service
      delegate_to: oim
      connection: ssh

    - name: Verify omnia.target is active
      ansible.builtin.command: systemctl is-active omnia.target
      register: omnia_target_active
      changed_when: false
      failed_when: omnia_target_active.stdout != "active"
      delegate_to: oim
      connection: ssh

    - name: Final upgrade verification report
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "✅ All services in omnia.target are active"
          - "✅ All containers running with pinned versions"
          - "✅ coresmd-coredhcp and coresmd-coredns active"
          - "✅ No :latest tags remain"
          - "✅ OpenCHAMI v2.1.0.0 → v2.2.0.0 upgrade SUCCESSFUL"
          - "============================================================"

  rescue:
    - name: Collect verification failure diagnostics
      ansible.builtin.shell: |
        echo "=== FAILED SERVICES ==="
        systemctl list-dependencies omnia.target --no-pager | grep -E "^×|^\s+×" || echo "None"
        echo ""
        echo "=== CONTAINERS WITH :LATEST TAGS ==="
        podman ps --format "{% raw %}{{.Names}} {{.Image}}{% endraw %}" | grep ":latest" | grep -vE '^(haproxy|hydra-gen-jwks) ' || echo "None"
        echo ""
        echo "=== ALL CONTAINERS ==="
        podman ps --format "table {% raw %}{{.Names}}\t{{.Status}}\t{{.Image}}{% endraw %}"
        echo ""
        echo "=== CORESMD SERVICE STATUS ==="
        systemctl status coresmd-coredhcp.service --no-pager -l || true
        echo ""
        systemctl status coresmd-coredns.service --no-pager -l || true
      register: verification_diagnostics
      changed_when: false
      failed_when: false
      delegate_to: oim
      connection: ssh

    - name: Display verification failure diagnostics
      ansible.builtin.debug:
        msg: "{{ verification_diagnostics.stdout_lines | default([]) }}"

    - name: Upgrade verification FAILED
      ansible.builtin.fail:
        msg: |
          ❌ POST-UPGRADE VERIFICATION FAILED ❌
          
          One or more critical checks failed:
          - Services in failed state: {{ 'YES' if failed_services.stdout | default('') | length > 0 else 'NO' }}
          - Containers with :latest tags: {{ 'YES' if latest_containers.stdout | default('') | length > 0 else 'NO' }}
          - coresmd services inactive: {{ 'YES' if coresmd_active is failed else 'NO' }}
          
          Review diagnostics above and run:
            ansible-playbook upgrade_omnia.yml --tags openchami,diagnostics
          
          To diagnose coresmd failures specifically.
