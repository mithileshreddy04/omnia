---

- name: Pre-upgrade health check
  block:
    - name: Verify all OpenCHAMI containers are running
      ansible.builtin.command: podman ps --filter "name={{ item }}" --format '{% raw %}{{.Names}}{% endraw %}'
      loop: "{{ openchami_critical_containers }}"
      register: container_check
      changed_when: false
      failed_when: container_check.stdout | length == 0
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Check postgres database connectivity
      ansible.builtin.shell: |
        set -o pipefail
        podman exec postgres pg_isready -U {{ openchami_postgres_user }}
      register: postgres_check
      changed_when: false
      failed_when: postgres_check.rc != 0
      delegate_to: oim
      connection: ssh

    - name: Capture baseline node count from database
      ansible.builtin.shell: |
        set -o pipefail
        podman exec postgres psql -U {{ openchami_postgres_user }} -d hmsds -t -c "SELECT COUNT(*) FROM smd.xname;" 2>/dev/null || echo "0"
      register: pre_upgrade_node_count
      changed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display pre-upgrade health check success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.health_check.pre_check_success }}"

  rescue:
    - name: Pre-upgrade health check failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.health_check.pre_check_failure }} {{ upgrade_messages.troubleshooting.pre_check_diagnosis }}"
