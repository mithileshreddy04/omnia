---

- name: Pre-upgrade health check
  block:
    - name: Verify all OpenCHAMI containers are running
      ansible.builtin.command: podman ps --filter "name={{ item }}" --format '{% raw %}{{.Names}}{% endraw %}'
      loop: "{{ openchami_critical_containers }}"
      register: container_check
      changed_when: false
      failed_when: container_check.stdout | length == 0
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Get admin_nic_ip from hostvars
      ansible.builtin.set_fact:
        openchami_endpoint_ip: "{{ hostvars['localhost']['admin_nic_ip'] | default(ansible_default_ipv4.address) }}"
      delegate_to: oim
      delegate_facts: true

    - name: Test BSS endpoint availability
      ansible.builtin.uri:
        url: "https://{{ openchami_endpoint_ip }}:8443/boot/v1/bootscript"
        method: GET
        validate_certs: false
        status_code: [200, 401]
        timeout: 10
      register: bss_pre_check
      failed_when: bss_pre_check.status not in [200, 401]
      delegate_to: oim
      connection: ssh

    - name: Test SMD endpoint availability
      ansible.builtin.uri:
        url: "https://{{ openchami_endpoint_ip }}:8443/hsm/v2/State/Components"
        method: GET
        validate_certs: false
        status_code: [200, 401]
        timeout: 10
      register: smd_pre_check
      failed_when: smd_pre_check.status not in [200, 401]
      delegate_to: oim
      connection: ssh

    - name: Capture baseline node count from SMD
      ansible.builtin.uri:
        url: "https://{{ openchami_endpoint_ip }}:8443/hsm/v2/State/Components"
        method: GET
        validate_certs: false
        return_content: true
        status_code: [200, 401]
        timeout: 10
      register: smd_components_pre
      delegate_to: oim
      connection: ssh

    - name: Parse node count from SMD response
      ansible.builtin.set_fact:
        pre_upgrade_node_count: "{{ (smd_components_pre.json.Components | default([])) | length }}"
      delegate_to: oim
      delegate_facts: true

    - name: Display pre-upgrade health check success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.health_check.pre_check_success }}"

  rescue:
    - name: Pre-upgrade health check failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.health_check.pre_check_failure }} {{ upgrade_messages.troubleshooting.pre_check_diagnosis }}"
