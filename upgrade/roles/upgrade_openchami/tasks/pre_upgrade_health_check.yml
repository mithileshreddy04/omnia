---

- name: Pre-upgrade health check
  block:
    - name: Verify all OpenCHAMI containers are running
      ansible.builtin.command: podman ps --filter "name={{ item }}" --format '{% raw %}{{.Names}}{% endraw %}'
      loop: "{{ openchami_critical_containers }}"
      register: container_check
      changed_when: false
      failed_when: container_check.stdout | length == 0
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Test BSS endpoint availability
      ansible.builtin.shell: |
        set -o pipefail
        curl -k -s -o /dev/null -w "%{http_code}" --connect-to {{ admin_nic_ip }}:8443:127.0.0.1:8443 https://{{ admin_nic_ip }}:8443/boot/v1/bootscript
      register: bss_pre_check
      changed_when: false
      failed_when: bss_pre_check.stdout not in ["200", "401"]
      delegate_to: oim
      connection: ssh

    - name: Test SMD endpoint availability
      ansible.builtin.shell: |
        set -o pipefail
        curl -k -s -o /dev/null -w "%{http_code}" --connect-to {{ admin_nic_ip }}:8443:127.0.0.1:8443 https://{{ admin_nic_ip }}:8443/hsm/v2/State/Components
      register: smd_pre_check
      changed_when: false
      failed_when: smd_pre_check.stdout not in ["200", "401"]
      delegate_to: oim
      connection: ssh

    - name: Capture baseline node count from SMD
      ansible.builtin.shell: |
        set -o pipefail
        curl -k -s --connect-to {{ admin_nic_ip }}:8443:127.0.0.1:8443 https://{{ admin_nic_ip }}:8443/hsm/v2/State/Components | jq '.Components | length' || echo "0"
      register: pre_upgrade_node_count
      changed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display pre-upgrade health check success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.health_check.pre_check_success }}"

  rescue:
    - name: Pre-upgrade health check failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.health_check.pre_check_failure }} {{ upgrade_messages.troubleshooting.pre_check_diagnosis }}"
