---

- name: Upgrade OpenCHAMI containers
  block:
    - name: Pull new OpenCHAMI container images
      ansible.builtin.command: podman pull {{ item.image }}
      loop: "{{ openchami_target_images }}"
      register: pull_result
      retries: 3
      delay: 10
      until: pull_result.rc == 0
      changed_when: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Update systemd quadlet files
      ansible.builtin.include_tasks: update_systemd_quadlets.yml

    - name: Stop OpenCHAMI services
      ansible.builtin.systemd:
        name: openchami.target
        state: stopped
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Wait for containers to stop
      ansible.builtin.pause:
        seconds: 10

    - name: Handle coresmd transition
      ansible.builtin.include_tasks: handle_coresmd_transition.yml

    - name: Remove old OpenCHAMI containers (preserve volumes)
      ansible.builtin.command: podman rm -f {{ item.container }}
      loop: "{{ openchami_containers }}"
      register: remove_result
      changed_when: true
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Start OpenCHAMI services with new images
      ansible.builtin.systemd:
        name: openchami.target
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Wait for services to stabilize
      ansible.builtin.pause:
        seconds: 30

    - name: Verify all containers are running
      ansible.builtin.command: podman ps --filter "name={{ item }}" --format '{% raw %}{{.Names}}{% endraw %}'
      loop: "{{ openchami_critical_containers }}"
      register: verify_running
      changed_when: false
      failed_when: verify_running.stdout | length == 0
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display container upgrade success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.container_upgrade.success }}"

  rescue:
    - name: Container upgrade failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.container_upgrade.failure }} {{ upgrade_messages.troubleshooting.container_upgrade_diagnosis }}"
