# ===========================================================================
# Upgrade OpenCHAMI containers
#
# Mirrors the prepare_oim/roles/deploy_containers/openchami pattern:
#   - The openchami RPM is the single source of truth for quadlet files
#     (coresmd-coredns.container, coresmd-coredhcp.container, etc.)
#   - Ansible only deploys configuration files (Corefile, coredhcp.yaml)
#     using prepare_oim templates
#
# Flow:
#   1. Pull all target images
#   2. Back up existing configs, download and install updated RPMs
#   3. Update image tags in all quadlet files
#   4. Load cluster config and deploy CoreDNS/CoreDHCP configs
#   5. Remove legacy coresmd quadlet and update openchami.target
#   6. Reload systemd daemon (apply all quadlet/target changes BEFORE restart)
#   7. Stop openchami.target, minio.service, and registry.service
#   8. Remove old containers (volumes preserved)
#   9. Start services and recover any failed services
#
# Verification (container status, postgres, image versions, node counts) is
# performed by post_upgrade_health_check.yml
# ===========================================================================

- name: Upgrade OpenCHAMI containers
  block:
    # --- 1. Pull all target images (only if not already present) ---
    - name: Check which target images are already present
      ansible.builtin.shell: |
        podman image exists {{ item }} 2>/dev/null && echo "present" || echo "missing"
      loop: "{{ openchami_target_images }}"
      register: image_presence
      changed_when: false
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Pull missing OpenCHAMI container images
      ansible.builtin.command: podman pull {{ item.item }}
      loop: "{{ image_presence.results | default([]) }}"
      loop_control:
        label: "{{ item.item | default('unknown') }}"
      register: pull_result
      retries: "{{ pull_image_retries }}"
      delay: "{{ pull_image_delay }}"
      until: pull_result.rc == 0
      changed_when: pull_result.rc == 0
      when:
        - item.stdout | default('missing') | trim == 'missing'
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # --- 2. Install updated RPMs ---
    # The openchami RPM ships all quadlet files (coresmd-coredns.container,
    # coresmd-coredhcp.container, etc.) - no Ansible templates needed.
    # NOTE: Config files (Corefile, coredhcp.yaml) are backed up as part of
    # the full /etc/openchami directory backup in backup_openchami.yml.
    # If RPM overwrites configs, they are restored from the backup dir
    # or regenerated from templates below.

    - name: Create work directory for RPM downloads
      ansible.builtin.file:
        path: "{{ openchami_work_dir }}"
        state: directory
        mode: "{{ dir_permissions_755 }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Download updated OpenCHAMI RPM
      ansible.builtin.command: curl -L -o {{ openchami_work_dir }}/{{ openchami_rpm_name }} {{ openchami_rpm_url }}  # noqa: command-instead-of-module
      register: download_openchami
      retries: "{{ max_retries }}"
      delay: "{{ max_delay }}"
      until: download_openchami.rc == 0
      changed_when: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Set permissions on downloaded OpenCHAMI RPM
      ansible.builtin.file:
        path: "{{ openchami_work_dir }}/{{ openchami_rpm_name }}"
        mode: "{{ dir_permissions_755 }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Install updated OpenCHAMI RPM
      ansible.builtin.dnf:
        name: "{{ openchami_work_dir }}/{{ openchami_rpm_name }}"
        state: present
        disable_gpg_check: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Download updated ochami CLI RPM
      ansible.builtin.command: curl -L -o {{ openchami_work_dir }}/{{ ochami_client_rpm_name }} {{ ochami_client_rpm_url }}  # noqa: command-instead-of-module
      register: download_ochami
      retries: "{{ max_retries }}"
      delay: "{{ max_delay }}"
      until: download_ochami.rc == 0
      changed_when: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Set permissions on downloaded ochami CLI RPM
      ansible.builtin.file:
        path: "{{ openchami_work_dir }}/{{ ochami_client_rpm_name }}"
        mode: "{{ dir_permissions_755 }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Install updated ochami CLI RPM
      ansible.builtin.dnf:
        name: "{{ openchami_work_dir }}/{{ ochami_client_rpm_name }}"
        state: present
        disable_gpg_check: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # --- 3. Update image tags in all quadlet files (override RPM defaults) ---
    # lineinfile is idempotent: no change if line already matches.
    - name: Update image tags in systemd quadlet files
      ansible.builtin.lineinfile:
        path: "/etc/containers/systemd/{{ item.file }}"
        regexp: '^Image=.*'
        line: "Image={{ item.image }}"
        state: present
      loop: "{{ openchami_quadlet_updates }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    # --- 4. Load cluster config and deploy service configs ---
    # Config deployment is idempotent (templates overwrite with same content)
    # but we only run it during an actual upgrade to avoid unnecessary work.
    # Follows prepare_oim pattern: only deploy configuration files,
    # reusing templates from prepare_oim/roles/deploy_containers/openchami/templates
    #
    # configs_vars.yaml was created by prepare_oim on LOCALHOST (the control node),
    # NOT on the OIM. So we check localhost first, then OIM as fallback.
    # If missing everywhere, regenerate from oim_metadata.yml + network_spec.yml.
    - name: Ensure OpenCHAMI config directory exists
      ansible.builtin.file:
        path: "{{ openchami_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "{{ dir_permissions_755 }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # --- Check configs_vars.yaml on localhost (where prepare_oim creates it) ---
    - name: Check if configs_vars.yaml exists on localhost
      ansible.builtin.stat:
        path: "{{ openchami_config_vars_path }}"
      register: config_vars_stat_local

    # --- Check configs_vars.yaml on OIM (in case it was copied there) ---
    - name: Check if configs_vars.yaml exists on OIM
      ansible.builtin.stat:
        path: "{{ openchami_config_vars_path }}"
      register: config_vars_stat_oim
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Set config source location
      ansible.builtin.set_fact:
        config_vars_available: "{{ config_vars_stat_local.stat.exists | default(false) or config_vars_stat_oim.stat.exists | default(false) }}"
        config_vars_source: >-
          {{ 'localhost' if config_vars_stat_local.stat.exists | default(false)
             else ('oim' if config_vars_stat_oim.stat.exists | default(false)
             else 'none') }}

    # --- Load configs_vars.yaml from wherever it exists ---
    # IMPORTANT: Use separate register names to avoid Ansible's skipped-task
    # overwrite behavior (a skipped task replaces the register with {skipped:true}).
    - name: Load configs_vars.yaml from localhost
      ansible.builtin.slurp:
        src: "{{ openchami_config_vars_path }}"
      register: config_vars_raw_local
      when:
        - config_vars_stat_local.stat.exists | default(false)

    - name: Load configs_vars.yaml from OIM
      ansible.builtin.slurp:
        src: "{{ openchami_config_vars_path }}"
      register: config_vars_raw_oim
      when:
        - not (config_vars_stat_local.stat.exists | default(false))
        - config_vars_stat_oim.stat.exists | default(false)
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Set unified config vars content
      ansible.builtin.set_fact:
        config_vars_content: >-
          {{ config_vars_raw_local.content
             if (config_vars_raw_local.content is defined)
             else (config_vars_raw_oim.content | default('')) }}
      when:
        - config_vars_available | default(false) | bool

    # --- Regenerate configs_vars.yaml from source-of-truth files if missing everywhere ---
    - name: Regenerate configs_vars.yaml from authoritative sources
      when:
        - not (config_vars_available | default(false) | bool)
      block:
        - name: Check if oim_metadata.yml exists
          ansible.builtin.stat:
            path: "{{ oim_metadata_path }}"
          register: oim_metadata_stat

        - name: Load oim_metadata.yml
          ansible.builtin.include_vars:
            file: "{{ oim_metadata_path }}"
          when: oim_metadata_stat.stat.exists

        - name: Check if network_spec.yml exists
          ansible.builtin.stat:
            path: "{{ network_spec_path }}"
          register: network_spec_stat

        - name: Load network_spec.yml
          ansible.builtin.include_vars:
            file: "{{ network_spec_path }}"
          when: network_spec_stat.stat.exists

        - name: Parse network_spec data
          ansible.builtin.set_fact:
            network_data: "{{ network_data | default({}) | combine({item.key: item.value}) }}"
          with_dict: "{{ Networks }}"
          when: network_spec_stat.stat.exists and Networks is defined

        - name: Check if provision_config.yml exists
          ansible.builtin.stat:
            path: "{{ provision_config_path }}"
          register: provision_config_stat

        - name: Load provision_config.yml
          ansible.builtin.include_vars:
            file: "{{ provision_config_path }}"
          when: provision_config_stat.stat.exists

        - name: Generate configs_vars.yaml from source-of-truth files
          ansible.builtin.copy:
            content: |
              cluster_name: "{{ oim_node_name | default(ansible_hostname) }}"
              cluster_domain: "{{ domain_name | default(ansible_domain) }}"
              cluster_boot_ip: "{{ network_data.admin_network.primary_oim_admin_ip | default(ansible_default_ipv4.address) }}"
              cluster_boot_interface: "{{ network_data.admin_network.oim_nic_name | default(ansible_default_ipv4.interface) }}"
              coredhcp_dhcp_pool: "{{ network_data.admin_network.dynamic_range | default('') | regex_replace('-', ' ') }}"
              coredhcp_netmask: >-
                {{ (network_data.admin_network.primary_oim_admin_ip | default('0.0.0.0')
                + '/' + (network_data.admin_network.netmask_bits | default('24') | string))
                | ansible.utils.ipaddr('netmask') }}
              coredhcp_lease_duration: "{{ default_lease_time | default('86400') }}s"
              cluster_shortname: "nid"
              cluster_nidlength: 3
            dest: "{{ openchami_config_vars_path }}"
            mode: "{{ file_permissions_644 }}"
          when: oim_metadata_stat.stat.exists or network_spec_stat.stat.exists

        - name: Load freshly generated configs_vars.yaml
          ansible.builtin.slurp:
            src: "{{ openchami_config_vars_path }}"
          register: config_vars_raw_regen

        - name: Set unified config vars content from regenerated file
          ansible.builtin.set_fact:
            config_vars_content: "{{ config_vars_raw_regen.content }}"

        - name: Display configs_vars.yaml regeneration status
          ansible.builtin.debug:
            verbosity: 1
            msg: >-
              Regenerated configs_vars.yaml from source files:
              oim_metadata={{ oim_metadata_stat.stat.exists }},
              network_spec={{ network_spec_stat.stat.exists }}

    # --- Parse and set cluster variables ---
    - name: Parse cluster config variables
      ansible.builtin.set_fact:
        cluster_config: "{{ config_vars_content | b64decode | from_yaml }}"
      when:
        - config_vars_content is defined and config_vars_content | length > 0

    - name: Set cluster variables from config
      ansible.builtin.set_fact:
        cluster_name: "{{ cluster_config.cluster_name | default('') }}"
        cluster_domain: "{{ cluster_config.cluster_domain | default('') }}"
        cluster_boot_ip: "{{ cluster_config.cluster_boot_ip | default('') }}"
        cluster_boot_interface: "{{ cluster_config.cluster_boot_interface | default('') }}"
        cluster_shortname: "{{ cluster_config.cluster_shortname | default('nid') }}"
        cluster_nidlength: "{{ cluster_config.cluster_nidlength | default('3') }}"
        ochami_base_url: "https://{{ cluster_config.cluster_name }}.{{ cluster_config.cluster_domain }}:8443"
        coredhcp_netmask: "{{ cluster_config.coredhcp_netmask | default('255.255.255.0') }}"
        coredhcp_lease_duration: "{{ cluster_config.coredhcp_lease_duration | default('86400s') }}"
        coredhcp_dhcp_pool: "{{ cluster_config.coredhcp_dhcp_pool | default('') }}"
      when:
        - config_vars_content is defined and config_vars_content | length > 0

    - name: Determine if cluster config is available for template rendering
      ansible.builtin.set_fact:
        cluster_config_available: >-
          {{
            (config_vars_content is defined and config_vars_content | length > 0) and
            (cluster_name | default('') | length > 0) and
            (cluster_domain | default('') | length > 0) and
            (cluster_boot_ip | default('') | length > 0)
          }}

    - name: Display cluster config status
      ansible.builtin.debug:
        verbosity: 1
        msg: >-
          Cluster config: available={{ cluster_config_available | default(false) }},
          source={{ config_vars_source | default('regenerated') }},
          cluster={{ cluster_name | default('N/A') }}.{{ cluster_domain | default('N/A') }},
          boot_ip={{ cluster_boot_ip | default('N/A') }},
          ochami_url={{ ochami_base_url | default('N/A') }}

    # --- Deploy configs if we have cluster info ---
    - name: Deploy updated CoreDNS Corefile
      ansible.builtin.template:
        src: "{{ prepare_oim_templates_path }}/coredns/Corefile.j2"
        dest: "{{ openchami_config_dir }}/Corefile"
        owner: root
        group: root
        mode: "{{ file_permissions_644 }}"
      when:
        - cluster_config_available | default(false) | bool
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Deploy updated CoreDHCP config
      ansible.builtin.template:
        src: "{{ prepare_oim_templates_path }}/coredhcp/coredhcp.yaml.j2"
        dest: "{{ openchami_config_dir }}/coredhcp.yaml"
        owner: root
        group: root
        mode: "{{ file_permissions_644 }}"
      when:
        - cluster_config_available | default(false) | bool
        - cluster_boot_interface | default('') | length > 0
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # --- Restore configs from /etc/openchami backup if template deployment was not possible ---
    # Uses the full /etc/openchami backup created by backup_openchami.yml
    - name: Compute OIM host-side /etc/openchami backup path
      ansible.builtin.set_fact:
        upgrade_etc_openchami_backup: >-
          {{ oim_host_backup_dir | default(openchami_backup_dir_default | regex_replace('^/opt/omnia', oim_shared_path ~ '/omnia')) }}/{{ backup_etc_openchami_subpath }}
      when:
        - not (cluster_config_available | default(false) | bool)

    - name: Restore Corefile from /etc/openchami backup (cluster config not available)
      ansible.builtin.copy:
        src: "{{ upgrade_etc_openchami_backup }}/configs/Corefile"
        dest: "{{ openchami_config_dir }}/Corefile"
        remote_src: true
        owner: root
        group: root
        mode: "{{ file_permissions_644 }}"
      when:
        - not (cluster_config_available | default(false) | bool)
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Restore coredhcp.yaml from /etc/openchami backup (cluster config not available)
      ansible.builtin.copy:
        src: "{{ upgrade_etc_openchami_backup }}/configs/coredhcp.yaml"
        dest: "{{ openchami_config_dir }}/coredhcp.yaml"
        remote_src: true
        owner: root
        group: root
        mode: "{{ file_permissions_644 }}"
      when:
        - not (cluster_config_available | default(false) | bool)
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Fail if cluster config could not be determined
      ansible.builtin.fail:
        msg: |
          Cannot deploy CoreDNS/CoreDHCP configs - cluster configuration not available.
          Checked: configs_vars.yaml (localhost + OIM), oim_metadata.yml, network_spec.yml.
          Restored configs from /etc/openchami backup as fallback.
      when:
        - not (cluster_config_available | default(false) | bool)

    # =================================================================
    # Steps 5-9: DESTRUCTIVE operations — always executed.
    # Idempotency checks have been removed; upgrade always runs
    # regardless of current container state.
    # =================================================================

    # --- 5. Remove legacy coresmd quadlet and update openchami.target ---
    # Done BEFORE daemon-reload so systemd picks up the target changes.
    - name: Remove legacy coresmd quadlet file from omnia-2.1
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ openchami_legacy_quadlet_files }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Update openchami.target to replace coresmd.service with split services
      ansible.builtin.replace:
        path: /etc/systemd/system/openchami.target
        regexp: 'coresmd\.service'
        replace: 'coresmd-coredhcp.service coresmd-coredns.service'
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    # --- 6. Reload systemd daemon ---
    - name: Reload systemd daemon to apply all quadlet and target changes
      ansible.builtin.systemd:
        daemon_reload: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # --- 7. Stop services ---
    - name: Stop OpenCHAMI services
      ansible.builtin.systemd:
        name: openchami.target
        state: stopped
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Stop MinIO service for image upgrade
      ansible.builtin.systemd:
        name: minio.service
        state: stopped
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Stop registry service for image upgrade
      ansible.builtin.systemd:
        name: registry.service
        state: stopped
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Wait for containers to stop
      ansible.builtin.pause:
        seconds: 10

    # --- 8. Remove old containers (preserve volumes) ---
    - name: Remove current OpenCHAMI containers (preserve volumes)
      ansible.builtin.command: podman rm -f {{ item.container }}
      loop: "{{ openchami_containers }}"
      register: remove_result
      changed_when: remove_result.rc == 0
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Remove MinIO container for image upgrade
      ansible.builtin.command: podman rm -f minio-server
      changed_when: true
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Remove legacy coresmd container from omnia-2.1
      ansible.builtin.command: podman rm -f {{ item }}
      loop: "{{ openchami_legacy_containers }}"
      register: remove_legacy
      changed_when: remove_legacy.rc == 0
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # --- 9. Start services and recover any failed services ---
    - name: Start OpenCHAMI services with new images
      ansible.builtin.systemd:
        name: openchami.target
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Start MinIO service with new image
      ansible.builtin.systemd:
        name: minio.service
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Start registry service with new image
      ansible.builtin.systemd:
        name: registry.service
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Wait for services to stabilize
      ansible.builtin.pause:
        seconds: "{{ wait_time }}"

    # Recover any openchami services that failed initial startup
    - name: Reset any failed openchami services
      ansible.builtin.command: systemctl reset-failed
      changed_when: true
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Restart openchami.target to recover failed services
      ansible.builtin.systemd:
        name: openchami.target
        state: restarted
        enabled: true
        daemon_reload: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Wait for restarted services to stabilize
      ansible.builtin.pause:
        seconds: "{{ wait_time }}"

    - name: Display container upgrade success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.container_upgrade.success }}"

  rescue:
    - name: Container upgrade failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.container_upgrade.failure }} {{ upgrade_messages.troubleshooting.container_upgrade_diagnosis }}"
