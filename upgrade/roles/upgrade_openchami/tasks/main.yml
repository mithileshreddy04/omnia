---

- name: Load network configuration for OIM node IP
  block:
    - name: Check if network_spec.yml file exists
      ansible.builtin.stat:
        path: "/opt/omnia/input/project_default/network_spec.yml"
      register: network_spec_stat

    - name: Include network_spec.yml file
      ansible.builtin.include_vars:
        file: "/opt/omnia/input/project_default/network_spec.yml"
      register: include_network_spec
      failed_when: false

    - name: Parse network_spec data
      ansible.builtin.set_fact:
        network_data: "{{ network_data | default({}) | combine({item.key: item.value}) }}"
      with_dict: "{{ Networks }}"
      when: Networks is defined

    - name: Set admin_nic_ip from network_spec
      ansible.builtin.set_fact:
        admin_nic_ip: "{{ network_data.admin_network.primary_oim_admin_ip }}"
      when:
        - network_data is defined
        - network_data.admin_network is defined
        - network_data.admin_network.primary_oim_admin_ip is defined

    - name: Fail if admin_nic_ip cannot be determined
      ansible.builtin.fail:
        msg: "Could not determine admin_nic_ip from network_spec.yml. This is required for SNI hostname resolution."
      when: admin_nic_ip is not defined
  rescue:
    - name: Failed to load network configuration
      ansible.builtin.fail:
        msg: "Could not load network_spec.yml or determine admin_nic_ip. This is required for SNI hostname resolution."

- name: Detect if OpenCHAMI was previously deployed
  ansible.builtin.include_tasks: detect_openchami_deployment.yml

- name: OpenCHAMI upgrade workflow
  when: openchami_deployed | default(false) | bool
  block:
    - name: Acquire OpenCHAMI upgrade lock
      ansible.builtin.include_tasks: manage_upgrade_lock.yml
      vars:
        lock_action: acquire

    - name: Check if OpenCHAMI upgrade needed (idempotency)
      ansible.builtin.include_tasks: check_upgrade_state.yml

    - name: Execute OpenCHAMI upgrade
      when: upgrade_needed | default(true) | bool
      block:
        - name: Pre-upgrade health check
          ansible.builtin.include_tasks: pre_upgrade_health_check.yml

        - name: Preserve OpenCHAMI data
          ansible.builtin.include_tasks: preserve_openchami_data.yml

        - name: Upgrade OpenCHAMI containers
          ansible.builtin.include_tasks: upgrade_openchami_containers.yml

        - name: Post-upgrade health check
          ansible.builtin.include_tasks: post_upgrade_health_check.yml

    - name: Display upgrade skip message
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.idempotency.skip_message }}"
      when: not (upgrade_needed | default(true) | bool)

  always:
    - name: Release OpenCHAMI upgrade lock
      ansible.builtin.include_tasks: manage_upgrade_lock.yml
      vars:
        lock_action: cleanup

- name: Display OpenCHAMI not deployed message
  ansible.builtin.debug:
    msg: "{{ upgrade_messages.deployment.not_deployed }}"
  when: not (openchami_deployed | default(false) | bool)
