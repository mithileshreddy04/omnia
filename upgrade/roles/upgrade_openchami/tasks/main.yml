---

- name: Resolve admin NIC IP for OpenCHAMI API endpoints
  ansible.builtin.include_tasks: resolve_admin_ip.yml

- name: OpenCHAMI upgrade workflow
  block:
    - name: Pre-upgrade health check
      ansible.builtin.include_tasks: pre_upgrade_health_check.yml

    - name: Execute OpenCHAMI upgrade
      when:
        - openchami_deployed | default(false) | bool
        - upgrade_needed | default(true) | bool
      block:
        - name: Pre-upgrade backup (pg_dump, configs, quadlets, metadata)
          ansible.builtin.include_tasks: backup_openchami.yml

        - name: Upgrade OpenCHAMI containers
          ansible.builtin.include_tasks: upgrade_openchami_containers.yml

        # Database migration uses podman exec postgres (direct container
        # access) and does NOT need resolved HTTP endpoints. Running it
        # before cert renewal avoids an extra resolve_admin_ip call.
        - name: Post-upgrade database migration and integrity check
          ansible.builtin.include_tasks: migrate_database.yml

        # Renew certificates after container upgrade. The upgraded v2.2
        # containers may have expired certificates. This restarts the
        # entire openchami.target so ALL services pick up new certs.
        - name: Renew OpenCHAMI certificates
          ansible.builtin.include_tasks: renew_certificates.yml

        # Container IPs change after openchami.target restart in cert
        # renewal. Resolve once here — all downstream tasks (cloud-init
        # reload, post-upgrade health check) use these endpoints.
        - name: Resolve SMD/BSS endpoints after certificate renewal
          ansible.builtin.include_tasks: resolve_admin_ip.yml

        - name: Reload cloud-init data into cloud-init-server
          ansible.builtin.include_tasks: reload_cloud_init_data.yml

        - name: Post-upgrade health check
          ansible.builtin.include_tasks: post_upgrade_health_check.yml

  rescue:
    - name: Set upgrade failure flag
      ansible.builtin.set_fact:
        openchami_upgrade_failed: true

  always:
    - name: Upgrade status and cleanup
      ansible.builtin.include_tasks: upgrade_status.yml
