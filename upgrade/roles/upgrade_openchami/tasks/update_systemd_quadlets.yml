---

- name: Update systemd quadlet files with new image versions
  block:
    - name: Update image tags in systemd quadlet files
      ansible.builtin.lineinfile:
        path: "/etc/containers/systemd/{{ item.container }}.container"
        regexp: '^Image=.*'
        line: "Image={{ item.image }}"
        state: present
      loop: "{{ openchami_target_images }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Update smd-init quadlet image
      ansible.builtin.lineinfile:
        path: "/etc/containers/systemd/smd-init.container"
        regexp: '^Image=.*'
        line: "Image=ghcr.io/openchami/smd:{{ openchami_smd_tag }}"
        state: present
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Update bss-init quadlet image
      ansible.builtin.lineinfile:
        path: "/etc/containers/systemd/bss-init.container"
        regexp: '^Image=.*'
        line: "Image=ghcr.io/openchami/bss:{{ openchami_bss_tag }}"
        state: present
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Update minio quadlet image
      ansible.builtin.lineinfile:
        path: "/etc/containers/systemd/minio.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/pgsty/minio:{{ minio_release_tag }}"
        state: present
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Update registry quadlet image
      ansible.builtin.lineinfile:
        path: "/etc/containers/systemd/registry.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/library/registry:{{ registry_tag }}"
        state: present
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Update acme-register quadlet image
      ansible.builtin.lineinfile:
        path: "/etc/containers/systemd/acme-register.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/neilpang/acme.sh:{{ acme_tag }}"
        state: present
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Update acme-deploy quadlet image
      ansible.builtin.lineinfile:
        path: "/etc/containers/systemd/acme-deploy.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/neilpang/acme.sh:{{ acme_tag }}"
        state: present
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Display quadlet update success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.quadlet_update.success }}"

  rescue:
    - name: Quadlet update failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.quadlet_update.failure }}"
