---

- name: Update systemd quadlet files with new image versions
  tags: [openchami, upgrade, quadlets]
  block:

    # ---- OpenCHAMI core service quadlets ---------------------------------
    - name: Update step-ca quadlet image
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/step-ca.container"
        regexp: '^Image=.*'
        line: "Image=ghcr.io/openchami/local-ca:{{ openchami_local_ca_tag }}"
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false

    - name: Update opaal quadlet image
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/{{ item }}.container"
        regexp: '^Image=.*'
        line: "Image=ghcr.io/openchami/opaal:{{ openchami_opaal_tag }}"
        state: present
      loop:
        - opaal
        - opaal-idp
      delegate_to: oim
      connection: ssh
      failed_when: false

    - name: Update smd and smd-init quadlet images
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/{{ item }}.container"
        regexp: '^Image=.*'
        line: "Image=ghcr.io/openchami/smd:{{ openchami_smd_tag }}"
        state: present
      loop:
        - smd
        - smd-init
      delegate_to: oim
      connection: ssh
      failed_when: false

    - name: Update bss and bss-init quadlet images
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/{{ item }}.container"
        regexp: '^Image=.*'
        line: "Image=ghcr.io/openchami/bss:{{ openchami_bss_tag }}"
        state: present
      loop:
        - bss
        - bss-init
      delegate_to: oim
      connection: ssh
      failed_when: false

    - name: Update cloud-init-server quadlet image
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/cloud-init-server.container"
        regexp: '^Image=.*'
        line: "Image=ghcr.io/openchami/cloud-init:{{ openchami_cloud_init_tag }}"
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false

    # WHY: cloud-init v1.3.0 requires -cluster-name on startup or exits with error.
    # The openchami RPM installs the quadlet without this flag (was optional in v1.2.x).
    # Without it the container starts then immediately exits, causing openchami.target
    # to cycle in a restart loop every ~15 seconds.
    # APPROACH: Read cluster FQDN from /etc/ochami/config.yaml (written by prepare_oim)
    # instead of requiring it as an Ansible variable in the upgrade context.
    # ochami config.yaml structure (from deployment-recipes template):
    #   clusters:
    #     - cluster:
    #         uri: https://<fqdn>:8443
    #       name: <cluster_name>
    #   default-cluster: <cluster_name>
    - name: Read cluster name from ochami CLI config
      ansible.builtin.shell: |
        set -o pipefail
        python3 << 'EOF'
        import yaml, sys
        try:
            with open('/etc/ochami/config.yaml') as f:
                cfg = yaml.safe_load(f)
            default_name = cfg.get('default-cluster', '')
            clusters = cfg.get('clusters', [])
            if default_name:
                match = next((c for c in clusters if c.get('name') == default_name), None)
                if match:
                    uri = match.get('cluster', {}).get('uri', '')
                    import re
                    m = re.search(r'https?://([^:/]+)', uri)
                    if m:
                        print(m.group(1))
                        sys.exit(0)
            if clusters:
                uri = clusters[0].get('cluster', {}).get('uri', '')
                import re
                m = re.search(r'https?://([^:/]+)', uri)
                if m:
                    print(m.group(1))
                    sys.exit(0)
            sys.exit(1)
        except Exception:
            sys.exit(1)
        EOF
      register: ochami_cluster_fqdn
      changed_when: false
      failed_when: false
      delegate_to: oim
      connection: ssh

    - name: Patch cloud-init-server quadlet Exec line (add required --cluster-name flag)
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/cloud-init-server.container"
        regexp: '^Exec=.*'
        line: "Exec=/usr/local/bin/cloud-init-server --cluster-name {{ ochami_cluster_fqdn.stdout | trim }}"
        insertafter: '^Image=.*'
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false
      when: ochami_cluster_fqdn.rc == 0 and (ochami_cluster_fqdn.stdout | trim | length) > 0

    # ---- Third-party service quadlets ------------------------------------

    - name: Update postgres quadlet image
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/postgres.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/library/postgres:{{ postgres_tag }}"
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false

    - name: Update hydra and hydra-migrate quadlet images
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/{{ item }}.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/oryd/hydra:{{ hydra_tag }}"
        state: present
      loop:
        - hydra
        - hydra-migrate
      delegate_to: oim
      connection: ssh
      failed_when: false

    # WHY: hydra-gen-jwks uses the curl image — must be pinned.
    - name: Update hydra-gen-jwks quadlet image (curl container)
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/hydra-gen-jwks.container"
        regexp: '^Image=.*'
        line: "Image=cgr.dev/chainguard/curl:{{ curl_tag }}"
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false

    # WHY: haproxy was :latest in v2.1 — remains :latest but without tag per G-008.
    - name: Update haproxy quadlet image (remove :latest tag)
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/haproxy.container"
        regexp: '^Image=.*'
        line: "Image=cgr.dev/chainguard/haproxy"
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false

    # WHY: minio changed registries: minio/minio:latest → pgsty/minio:pinned.
    - name: Update minio quadlet image (registry + pin change)
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/minio.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/pgsty/minio:{{ minio_release_tag }}"
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false

    - name: Update registry quadlet image
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/registry.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/library/registry:{{ registry_tag }}"
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false

    - name: Update acme-register quadlet image
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/acme-register.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/neilpang/acme.sh:{{ acme_tag }}"
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false

    - name: Update acme-deploy quadlet image
      ansible.builtin.lineinfile:
        path: "{{ openchami_quadlet_dir }}/acme-deploy.container"
        regexp: '^Image=.*'
        line: "Image=docker.io/neilpang/acme.sh:{{ acme_tag }}"
        state: present
      delegate_to: oim
      connection: ssh
      failed_when: false

    - name: Display quadlet update success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.quadlet_update.success }}"

  rescue:
    - name: Quadlet update failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.quadlet_update.failure }}"
