---

- name: Handle coresmd transition to coresmd-coredhcp and coresmd-coredns
  block:
    - name: Check if coresmd service exists
      ansible.builtin.shell: |
        systemctl list-unit-files | grep -q "coresmd.service"
      register: coresmd_service_check
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Stop and disable old coresmd service if it exists
      ansible.builtin.systemd:
        name: coresmd
        state: stopped
        enabled: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      when: coresmd_service_check.rc == 0

    - name: Remove old coresmd container if it exists
      ansible.builtin.command: podman rm -f coresmd
      register: remove_coresmd
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Enable and start coresmd-coredhcp service
      ansible.builtin.systemd:
        name: coresmd-coredhcp
        state: started
        enabled: true
        daemon_reload: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Enable and start coresmd-coredns service
      ansible.builtin.systemd:
        name: coresmd-coredns
        state: started
        enabled: true
        daemon_reload: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Display coresmd transition success
      ansible.builtin.debug:
        msg: "Successfully transitioned from coresmd to coresmd-coredhcp and coresmd-coredns"

  rescue:
    - name: Coresmd transition failed
      ansible.builtin.debug:
        msg: "Warning: Coresmd transition encountered issues. Manual intervention may be required."
