---

- name: Preserve OpenCHAMI data
  block:
    - name: Create snapshot directory
      ansible.builtin.file:
        path: "{{ openchami_snapshot_dir }}"
        state: directory
        mode: "{{ dir_permissions_755 }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Dump PostgreSQL database
      ansible.builtin.shell: |
        set -o pipefail
        podman exec postgres pg_dump -U hmsdsuser hmsds > {{ openchami_snapshot_dir }}/postgres_dump.sql
      register: pg_dump
      changed_when: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Capture SMD inventory snapshot from database
      ansible.builtin.shell: |
        set -o pipefail
        podman exec postgres psql -U hmsdsuser -d hmsds -t -c "SELECT * FROM smd.xname;" > {{ openchami_snapshot_dir }}/smd_inventory.txt 2>/dev/null || echo "No data"
      register: smd_snapshot
      changed_when: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: List MinIO buckets
      ansible.builtin.shell: |
        set -o pipefail
        podman exec minio-server mc ls local/ > {{ openchami_snapshot_dir }}/minio_buckets.txt
      register: minio_list
      changed_when: true
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display data preservation success
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.data_preservation.success }}"

  rescue:
    - name: Data preservation failed
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.data_preservation.failure }}"
