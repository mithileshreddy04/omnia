---

- name: Acquire OpenCHAMI upgrade lock
  when: lock_action == 'acquire'
  block:
    - name: Check if upgrade lock exists
      ansible.builtin.stat:
        path: "{{ openchami_upgrade_lock_path }}"
      register: lock_status

    - name: Fail if lock exists and force_unlock not set
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.lock.exists }}"
      when:
        - lock_status.stat.exists
        - not (force_unlock | default(false) | bool)

    - name: Create upgrade lock directory
      ansible.builtin.file:
        path: "{{ openchami_upgrade_lock_path | dirname }}"
        state: directory
        mode: "{{ dir_permissions_755 }}"

    - name: Create upgrade lock file
      ansible.builtin.copy:
        content: |
          {
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "user": "{{ ansible_user_id }}",
            "pid": "{{ ansible_pid }}",
            "hostname": "{{ ansible_hostname }}",
            "component": "openchami"
          }
        dest: "{{ openchami_upgrade_lock_path }}"
        mode: "{{ file_permissions_644 }}"

    - name: Display lock acquisition message
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.lock.acquired }}"

- name: Release OpenCHAMI upgrade lock
  when: lock_action == 'cleanup'
  block:
    - name: Remove upgrade lock file
      ansible.builtin.file:
        path: "{{ openchami_upgrade_lock_path }}"
        state: absent

    - name: Display lock release message
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.lock.released }}"
