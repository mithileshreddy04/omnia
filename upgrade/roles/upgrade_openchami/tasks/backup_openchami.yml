# ============================================================================
# backup_openchami.yml — Pre-Upgrade Backup for OpenCHAMI Components
# ============================================================================
# Creates a point-in-time snapshot of all OpenCHAMI state on the OIM BEFORE
# the container upgrade begins. Used for rollback recovery if upgrade fails.
#
# Backup structure on OIM:
#   {{ openchami_backup_dir }}/openchami/
#     postgresql_backup/openchami.sql   - pg_dump of hmsds database
#     quadlets/                         - all .container quadlet unit files
#     workdir/                          - full copy of /opt/omnia/openchami/
#     openchami.target                  - systemd target unit
#   {{ openchami_backup_dir }}/openchami_backup_manifest.yml
#
# Note: configs_vars.yaml is preserved inside workdir/ since it lives at
#       /opt/omnia/openchami/configs_vars.yaml in the source tree.
#
# All operations delegate to the OIM host via SSH since that is where
# podman containers, PostgreSQL, quadlet files, and configs reside.
# ============================================================================

- name: Pre-upgrade OpenCHAMI backup
  block:
    # ── Resolve backup directory from upgrade manifest ─────────────────
    - name: Read upgrade_manifest.yml for backup_dir
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: backup_raw_manifest

    - name: Parse manifest and set backup directory
      ansible.builtin.set_fact:
        backup_manifest: "{{ backup_raw_manifest.content | b64decode | from_yaml }}"

    - name: Set backup base directory
      ansible.builtin.set_fact:
        openchami_backup_dir: "{{ backup_manifest.backup_dir | default(openchami_backup_dir_default) }}"

    # ── Retrieve PostgreSQL credentials if not already set ─────────────
    - name: Retrieve PostgreSQL credentials
      ansible.builtin.include_tasks: retrieve_postgres_credentials.yml

    # ── Verify disk space for pg_dump (df on backup target) ────────────
    - name: Check available disk space on backup target
      ansible.builtin.shell: |
        set -o pipefail
        df -BG "/opt/omnia" | tail -1 | awk '{print $4}' | sed 's/G//'
      register: backup_disk_space_gb
      changed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Get current PostgreSQL database size
      ansible.builtin.shell: |
        set -o pipefail
        podman exec postgres psql -U {{ postgres_db_user }} -d {{ postgres_db_name }} -t -c \
          "SELECT pg_size_pretty(pg_database_size('{{ postgres_db_name }}'));" 2>/dev/null || echo "unknown"
      register: postgres_db_size
      changed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display disk space status
      ansible.builtin.debug:
        msg:
          - "Backup target: {{ openchami_backup_dir }}"
          - "Available space: {{ backup_disk_space_gb.stdout | default('unknown') | trim }}GB"
          - "PostgreSQL database size: {{ postgres_db_size.stdout | default('unknown') | trim }}"

    - name: Verify sufficient disk space for backup
      ansible.builtin.assert:
        that:
          - (backup_disk_space_gb.stdout | default('0') | trim | int) >= 5
        fail_msg: |
          Insufficient disk space for backup!
          Available: {{ backup_disk_space_gb.stdout | default('0') | trim }}GB
          Minimum required: 5GB
          Please free up space on /opt/omnia before proceeding.
        success_msg: "Sufficient disk space available for backup ({{ backup_disk_space_gb.stdout | default('0') | trim }}GB)"

    # ── Create backup directory tree on OIM ────────────────────────────
    - name: Create backup directory structure on OIM
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "{{ dir_permissions_755 }}"
      loop:
        - "{{ openchami_backup_dir }}/openchami/postgresql_backup"
        - "{{ openchami_backup_dir }}/openchami/quadlets"
        - "{{ openchami_backup_dir }}/openchami/workdir"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # ── PostgreSQL pg_dump ─────────────────────────────────────────────
    # Dump the hmsds database inside the postgres container, then copy
    # the SQL file out to the backup directory on OIM.
    - name: Dump PostgreSQL hmsds database inside container
      ansible.builtin.shell: |
        set -o pipefail
        podman exec postgres pg_dump -U {{ postgres_db_user }} -d {{ postgres_db_name }} --clean --if-exists \
          -f /tmp/openchami_pre_upgrade.sql 2>&1
      register: pgdump_result
      changed_when: pgdump_result.rc == 0
      failed_when: pgdump_result.rc != 0
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Copy pg_dump from postgres container to OIM filesystem
      ansible.builtin.shell: |
        set -o pipefail
        podman cp postgres:/tmp/openchami_pre_upgrade.sql \
          "{{ openchami_backup_dir }}/openchami/postgresql_backup/openchami.sql"
      register: pgdump_copy_result
      changed_when: pgdump_copy_result.rc == 0
      failed_when: pgdump_copy_result.rc != 0
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Clean up temporary pg_dump file inside container
      ansible.builtin.shell: |
        set -o pipefail
        podman exec postgres rm -f /tmp/openchami_pre_upgrade.sql
      changed_when: true
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Verify pg_dump output exists on OIM
      ansible.builtin.stat:
        path: "{{ openchami_backup_dir }}/openchami/postgresql_backup/openchami.sql"
      register: pgdump_stat
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Fail if pg_dump backup is missing or empty
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.backup.pgdump_failure }}"
      when: not pgdump_stat.stat.exists or pgdump_stat.stat.size == 0

    # ── Backup quadlet .container files ────────────────────────────────
    - name: Find all quadlet .container files on OIM
      ansible.builtin.find:
        paths: "/etc/containers/systemd"
        patterns: "*.container"
        file_type: file
      register: quadlet_files_found
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Backup each quadlet file to backup directory
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ openchami_backup_dir }}/openchami/quadlets/{{ item.path | basename }}"
        remote_src: true
        mode: "{{ file_permissions_644 }}"
      loop: "{{ quadlet_files_found.files | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # ── Backup entire /opt/omnia/openchami/ directory ─────────────────
    # This preserves configs_vars.yaml, workdir RPMs, s3 config, and all
    # other OpenCHAMI state files under a single 'workdir/' backup.
    - name: Check if /opt/omnia/openchami/ exists on OIM
      ansible.builtin.stat:
        path: "/opt/omnia/openchami"
      register: openchami_dir_stat
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Backup entire /opt/omnia/openchami/ to workdir
      ansible.builtin.shell: |
        set -o pipefail
        cp -a /opt/omnia/openchami/. "{{ openchami_backup_dir }}/openchami/workdir/" 2>&1
      register: workdir_backup_result
      changed_when: workdir_backup_result.rc == 0
      failed_when: workdir_backup_result.rc != 0
      when: openchami_dir_stat.stat.exists | default(false)
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Verify configs_vars.yaml is present in workdir backup
      ansible.builtin.stat:
        path: "{{ openchami_backup_dir }}/openchami/workdir/configs_vars.yaml"
      register: config_vars_stat_backup
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # ── Backup openchami.target unit ───────────────────────────────────
    - name: Check if openchami.target exists on OIM
      ansible.builtin.stat:
        path: "/etc/systemd/system/openchami.target"
      register: openchami_target_stat
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Backup openchami.target
      ansible.builtin.copy:
        src: "/etc/systemd/system/openchami.target"
        dest: "{{ openchami_backup_dir }}/openchami/openchami.target"
        remote_src: true
        mode: "{{ file_permissions_644 }}"
      when: openchami_target_stat.stat.exists
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # ── Create backup manifest with inventory ──────────────────────────
    - name: Create backup inventory manifest
      ansible.builtin.copy:
        content: |
          # OpenCHAMI Pre-Upgrade Backup Manifest
          backup_timestamp: "{{ ansible_date_time.iso8601 }}"
          source_version: "{{ backup_manifest.source_version | default('unknown') }}"
          target_version: "{{ backup_manifest.target_version | default('unknown') }}"
          upgrade_id: "{{ backup_manifest.upgrade_id | default('unknown') }}"
          backup_dir: "{{ openchami_backup_dir }}"

          postgresql_backup:
            file: "openchami/postgresql_backup/openchami.sql"
            database: "{{ postgres_db_name }}"
            user: "{{ postgres_db_user }}"
            size_bytes: {{ pgdump_stat.stat.size | default(0) }}
            pre_upgrade_node_count: {{ pre_upgrade_node_count | default('0') | trim }}

          quadlet_files_count: {{ quadlet_files_found.matched | default(0) }}
          quadlet_files:
          {% for f in quadlet_files_found.files | default([]) %}
            - "{{ f.path | basename }}"
          {% endfor %}

          workdir:
            source: "/opt/omnia/openchami"
            backed_up: {{ openchami_dir_stat.stat.exists | default(false) }}
            configs_vars_present: {{ config_vars_stat_backup.stat.exists | default(false) }}

          openchami_target_backed_up: {{ openchami_target_stat.stat.exists | default(false) }}
        dest: "{{ openchami_backup_dir }}/openchami_backup_manifest.yml"
        mode: "{{ file_permissions_644 }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display backup completion summary
      ansible.builtin.debug:
        msg:
          - "Pre-upgrade backup completed successfully."
          - "Backup location: {{ openchami_backup_dir }}/openchami/"
          - "PostgreSQL dump: {{ pgdump_stat.stat.size | default(0) }} bytes (db={{ postgres_db_name }}, user={{ postgres_db_user }})"
          - "Quadlet files: {{ quadlet_files_found.matched | default(0) }}"
          - "Workdir (/opt/omnia/openchami/): {{ 'backed up' if openchami_dir_stat.stat.exists | default(false) else 'not found' }}"
          - "configs_vars.yaml: {{ 'present in workdir backup' if config_vars_stat_backup.stat.exists | default(false) else 'not found' }}"
          - "openchami.target: {{ openchami_target_stat.stat.exists | default(false) }}"

  rescue:
    - name: Backup failed — abort upgrade to prevent data loss
      ansible.builtin.fail:
        msg: "{{ upgrade_messages.backup.failure }}"
