---

- name: Update openchami.target for coresmd transition
  block:
    - name: Check if openchami.target exists
      ansible.builtin.stat:
        path: /etc/systemd/system/openchami.target
      register: openchami_target_stat
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Read current openchami.target content
      ansible.builtin.slurp:
        src: /etc/systemd/system/openchami.target
      register: openchami_target_content
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      when: openchami_target_stat.stat.exists

    - name: Parse openchami.target content
      ansible.builtin.set_fact:
        openchami_target_decoded: "{{ openchami_target_content.content | b64decode }}"
      when: openchami_target_stat.stat.exists

    - name: Check if coresmd.service is in openchami.target
      ansible.builtin.set_fact:
        coresmd_in_target: "{{ 'coresmd.service' in openchami_target_decoded }}"
      when: openchami_target_stat.stat.exists

    - name: Update openchami.target to replace coresmd with coresmd-coredhcp and coresmd-coredns
      ansible.builtin.replace:
        path: /etc/systemd/system/openchami.target
        regexp: 'coresmd\.service'
        replace: 'coresmd-coredhcp.service coresmd-coredns.service'
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      when: 
        - openchami_target_stat.stat.exists
        - coresmd_in_target

    - name: Reload systemd daemon after target update
      ansible.builtin.systemd:
        daemon_reload: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      when:
        - openchami_target_stat.stat.exists
        - coresmd_in_target

    - name: Display openchami.target update success
      ansible.builtin.debug:
        msg: "Successfully updated openchami.target to include coresmd-coredhcp and coresmd-coredns services"
      when:
        - openchami_target_stat.stat.exists
        - coresmd_in_target

  rescue:
    - name: Failed to update openchami.target
      ansible.builtin.debug:
        msg: "Warning: Could not update openchami.target. Manual intervention may be required."
