# ===========================================================================
# Ensure the CoreDNS Corefile config exists on OIM for the new coredns split.
# v2.1 did not have a Corefile; v2.2 requires one for coresmd-coredns.
# The openchami.target replacement is handled in upgrade_openchami_containers.yml.
# ===========================================================================

- name: Ensure CoreDNS Corefile exists for v2.2 coresmd-coredns
  tags: [openchami, upgrade]
  block:

    - name: Check if Corefile already exists
      ansible.builtin.stat:
        path: /etc/openchami/configs/Corefile
      register: corefile_stat
      delegate_to: oim
      connection: ssh

    - name: Deploy default Corefile if missing
      ansible.builtin.copy:
        content: |
          . {
            coresmd {
              endpoint https://localhost:8443
              ca_cert /root_ca/root_ca.crt
            }
            forward . 8.8.8.8 1.1.1.1
            log
            errors
          }
        dest: /etc/openchami/configs/Corefile
        owner: root
        group: root
        mode: "{{ file_permissions_644 }}"
      delegate_to: oim
      connection: ssh
      when: not corefile_stat.stat.exists
      # WHY localhost: CoreDNS runs on same host as HAProxy, so it can reach
      # the gateway via localhost:8443 without needing admin_nic_ip variable.

    - name: Log Corefile status
      ansible.builtin.debug:
        msg: "Corefile {{ 'already exists' if corefile_stat.stat.exists else 'deployed for coresmd-coredns' }}"

  rescue:
    - name: Failed to ensure Corefile
      ansible.builtin.debug:
        msg: "Warning: Could not deploy Corefile for CoreDNS. coresmd-coredns may fail to start."
