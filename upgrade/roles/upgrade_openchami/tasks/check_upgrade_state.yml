---

- name: Check current OpenCHAMI container versions
  block:
    # WHY: Compare each container's current image against the expected v2.2 image.
    #      If ANY mismatch is found, upgrade_needed=true.
    - name: Get current container image names
      ansible.builtin.shell: |
        set -o pipefail
        if podman ps -a --format '{% raw %}{{.Names}}{% endraw %}' | grep -qw "{{ item.container }}"; then
          podman inspect {{ item.container }} --format '{% raw %}{{.ImageName}}{% endraw %}' 2>/dev/null || echo "not_found"
        else
          echo "not_found"
        fi
      loop: "{{ openchami_containers }}"
      register: current_images
      changed_when: false
      failed_when: false
      delegate_to: oim
      connection: ssh

    # WHY: Jinja2 zip+selectattr on tuples is fragile across Ansible versions.
    #      A single shell script reliably compares all containers.
    - name: Determine upgrade-needed state via comparison script
      ansible.builtin.shell: |
        set -o pipefail
        NEEDS_UPGRADE=""
        {% for item in openchami_containers %}
        CURRENT=$(podman inspect {{ item.container }} --format '{% raw %}{{.ImageName}}{% endraw %}' 2>/dev/null || echo "not_found")
        if [ "$CURRENT" != "{{ item.expected_image }}" ]; then
          NEEDS_UPGRADE="${NEEDS_UPGRADE}{{ item.container }}(current=$CURRENT,expected={{ item.expected_image }}) "
        fi
        {% endfor %}
        if [ -n "$NEEDS_UPGRADE" ]; then
          echo "UPGRADE_NEEDED: $NEEDS_UPGRADE"
          exit 0
        else
          echo "UP_TO_DATE"
          exit 0
        fi
      register: upgrade_check_result
      changed_when: false
      delegate_to: oim
      connection: ssh

    - name: Set upgrade_needed fact
      ansible.builtin.set_fact:
        upgrade_needed: "{{ 'UPGRADE_NEEDED' in upgrade_check_result.stdout }}"

    # WHY: Even if containers are at v2.2, the recipes at core path may
    # still be v2.1 (if a previous run failed during persistence).
    # Also check RPM versions for completeness.
    - name: Check deployment-recipes version at core path
      ansible.builtin.command: git -C "{{ openchami_clone_path }}" rev-parse HEAD
      register: recipes_version_check
      changed_when: false
      failed_when: false
      delegate_to: oim
      connection: ssh

    - name: Check openchami RPM version
      ansible.builtin.command: rpm -q openchami
      register: openchami_rpm_check
      changed_when: false
      failed_when: false
      delegate_to: oim
      connection: ssh

    - name: Extend upgrade_needed if recipes or RPMs need updating
      ansible.builtin.set_fact:
        upgrade_needed: true
      when:
        - not (upgrade_needed | bool)
        - >-
          (recipes_version_check.stdout | default('') | trim != openchami_v22_git_version)
          or ('0.1.2' not in (openchami_rpm_check.stdout | default('')))

    - name: Display upgrade status
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.idempotency.skip_message }}"
      when: not (upgrade_needed | bool)

    - name: Display containers requiring upgrade
      ansible.builtin.debug:
        msg:
          - "{{ upgrade_messages.idempotency.upgrade_needed }}"
          - "{{ upgrade_check_result.stdout }}"
      when: upgrade_needed | bool

  rescue:
    - name: Upgrade state check failed — proceeding with upgrade to be safe
      ansible.builtin.debug:
        msg: "{{ upgrade_messages.idempotency.check_failure }}"

    - name: Default to upgrade_needed=true on check failure
      ansible.builtin.set_fact:
        upgrade_needed: true
