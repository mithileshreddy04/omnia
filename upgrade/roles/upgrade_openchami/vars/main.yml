---

# OpenCHAMI upgrade lock configuration
openchami_upgrade_lock_path: "/opt/omnia/.data/openchami_upgrade_in_progress.lock"
dir_permissions_755: "0755"
file_permissions_644: "0644"

# OpenCHAMI snapshot configuration
openchami_snapshot_base_dir: "/opt/omnia/openchami/upgrade_snapshots"
openchami_snapshot_dir: "{{ openchami_snapshot_base_dir }}/{{ ansible_date_time.date }}_{{ ansible_date_time.time | replace(':', '') }}"

# OpenCHAMI API endpoints
openchami_bss_endpoint: "https://{{ admin_nic_ip }}:8443/boot/v1/bootscript"
openchami_smd_endpoint: "https://{{ admin_nic_ip }}:8443/hsm/v2/State/Components"

# OpenCHAMI critical containers (must be running for health checks)
openchami_critical_containers:
  - smd
  - bss
  - cloud-init-server
  - postgres
  - minio-server
  - haproxy

# OpenCHAMI target image versions (Omnia 2.2.0.0)
openchami_target_images:
  - image: "ghcr.io/openchami/local-ca:v0.2.2"
    container: "step-ca"
  - image: "ghcr.io/openchami/opaal:v0.3.10"
    container: "opaal"
  - image: "ghcr.io/openchami/smd:v2.19.0"
    container: "smd"
  - image: "ghcr.io/openchami/bss:v1.32.1"
    container: "bss"
  - image: "ghcr.io/openchami/cloud-init:v1.3.0"
    container: "cloud-init-server"
  - image: "ghcr.io/openchami/coresmd:v0.4.0"
    container: "coresmd"
  - image: "docker.io/library/postgres:11.5-alpine"
    container: "postgres"
  - image: "docker.io/oryd/hydra:v2.3"
    container: "hydra"
  - image: "cgr.dev/chainguard/haproxy:latest"
    container: "haproxy"
  - image: "docker.io/pgsty/minio:RELEASE.2026-04-17T00-00-00Z"
    container: "minio-server"
  - image: "docker.io/library/registry:3.1.0"
    container: "registry"
  - image: "cgr.dev/chainguard/curl:latest"
    container: "curl"
  - image: "docker.io/neilpang/acme.sh:3.1.1"
    container: "acme"

# OpenCHAMI containers list (for iteration)
openchami_containers:
  - container: "step-ca"
    expected_image: "ghcr.io/openchami/local-ca:v0.2.2"
  - container: "opaal"
    expected_image: "ghcr.io/openchami/opaal:v0.3.10"
  - container: "opaal-idp"
    expected_image: "ghcr.io/openchami/opaal:v0.3.10"
  - container: "smd"
    expected_image: "ghcr.io/openchami/smd:v2.19.0"
  - container: "bss"
    expected_image: "ghcr.io/openchami/bss:v1.32.1"
  - container: "cloud-init-server"
    expected_image: "ghcr.io/openchami/cloud-init:v1.3.0"
  - container: "coresmd"
    expected_image: "ghcr.io/openchami/coresmd:v0.4.0"
  - container: "coresmd-coredhcp"
    expected_image: "ghcr.io/openchami/coresmd:v0.4.0"
  - container: "coresmd-coredns"
    expected_image: "ghcr.io/openchami/coresmd:v0.4.0"
  - container: "postgres"
    expected_image: "docker.io/library/postgres:11.5-alpine"
  - container: "hydra"
    expected_image: "docker.io/oryd/hydra:v2.3"
  - container: "haproxy"
    expected_image: "cgr.dev/chainguard/haproxy:latest"
  - container: "minio-server"
    expected_image: "docker.io/pgsty/minio:RELEASE.2026-04-17T00-00-00Z"
  - container: "registry"
    expected_image: "docker.io/library/registry:3.1.0"

# OpenCHAMI volumes (for cleanup)
openchami_volumes:
  - postgres-data
  - minio-data
  - registry-data
  - step-ca-data

# Upgrade messages
upgrade_messages:
  lock:
    acquired: "OpenCHAMI upgrade lock acquired successfully"
    released: "OpenCHAMI upgrade lock released successfully"
    exists: |
      OpenCHAMI upgrade lock already exists at {{ openchami_upgrade_lock_path }}.
      Another upgrade may be in progress.
      To force unlock, run with: -e force_unlock=true
  idempotency:
    skip_message: "OpenCHAMI containers are already at target versions. Skipping upgrade."
    upgrade_needed: "OpenCHAMI upgrade required. The following containers need updating:"
    check_failure: |
      Failed to check current OpenCHAMI upgrade state.
      Ensure containers are running: podman ps -a
      Proceeding with upgrade to be safe.
  health_check:
    pre_check_success: "Pre-upgrade health check passed. All OpenCHAMI services are healthy."
    pre_check_failure: "Pre-upgrade health check failed. OpenCHAMI services are not healthy."
    post_check_success: "Post-upgrade health check passed. All OpenCHAMI services are healthy after upgrade."
    post_check_failure: "Post-upgrade health check failed. OpenCHAMI services may not be fully operational."
    node_count_match: "Node count verification passed. SMD inventory intact after upgrade."
    node_count_mismatch: |
      Node count mismatch detected!
      Pre-upgrade: {{ pre_upgrade_node_count.stdout }}
      Post-upgrade: {{ post_upgrade_node_count.stdout }}
      SMD inventory may be corrupted. Check logs and consider rollback.
  data_preservation:
    success: "OpenCHAMI data preserved successfully in {{ openchami_snapshot_dir }}"
    failure: |
      Failed to preserve OpenCHAMI data.
      Snapshot directory: {{ openchami_snapshot_dir }}
      Upgrade aborted to prevent data loss.
  container_upgrade:
    success: "OpenCHAMI containers upgraded successfully to target versions"
    failure: "OpenCHAMI container upgrade failed."
  troubleshooting:
    pre_check_diagnosis: |
      Please resolve issues before retrying upgrade:
      - Check container status: podman ps -a
      - Check container logs: podman logs <container_name>
      - Verify network connectivity: curl -k https://{{ admin_nic_ip }}:8443/hsm/v2/State/Components
      - Check systemd status: systemctl status openchami.target
    container_upgrade_diagnosis: |
      Check container logs for errors:
      - podman logs smd
      - podman logs bss
      - podman logs cloud-init-server
      - systemctl status openchami.target
      Rollback documentation: upgrade/docs/OPENCHAMI_ROLLBACK.md
    post_check_diagnosis: |
      Review the following:
      - Container logs: podman logs <container_name>
      - Service status: systemctl status openchami.target
      - API endpoints: curl -k https://{{ admin_nic_ip }}:8443/hsm/v2/State/Components
      - Rollback documentation: upgrade/docs/OPENCHAMI_ROLLBACK.md
