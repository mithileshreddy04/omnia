---
# Variables for upgrade_build_stream role
# Postgres/BuildStream deploy roles inherit their own vars from:
#   deploy_containers/postgres/vars/main.yml
#   deploy_containers/build_stream/vars/main.yml
# Those roles read credentials from hostvars['localhost'] (set by credential utility)

# Component identification
component_name: "build_stream"

# OIM metadata (loaded in main.yml to get oim_shared_path, selinux settings)
oim_metadata_file: "/opt/omnia/.data/oim_metadata.yml"

# Quadlet directory (used by backup tasks in upgrade_existing.yml)
quadlet_dir: "/etc/containers/systemd"

# Database name (used by backup pg_dump in upgrade_existing.yml)
postgres_db_name: "build_stream_db"
