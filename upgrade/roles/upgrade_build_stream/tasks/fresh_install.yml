---
# Fresh install BuildStream (was not enabled in 2.1)
# Reuses prepare_oim/roles/deploy_containers/{postgres,build_stream} for full deployment

- name: Display fresh install start banner
  ansible.builtin.debug:
    msg:
      - "============================================================"
      - "  Fresh Install — BuildStream"
      - "============================================================"
      - "BuildStream was NOT enabled in 2.1 — performing fresh installation"
      - "This will deploy Postgres, BuildStream, watcher service, and automation"

- name: Prompt for NFS cleanup confirmation
  ansible.builtin.pause:
    prompt: "Have you cleaned/backed up the NFS share? Press Enter to continue or Ctrl+C to abort"
  when: hostvars['localhost']['skip_approval'] is not defined or not hostvars['localhost']['skip_approval'] | bool
  delegate_to: localhost
  connection: local

# ══════════════════════════════════════════════════════════════════
# Step 1: Deploy Postgres via prepare_oim role
# (handles: stop existing, image pull, quadlet, start, DB init)
# ══════════════════════════════════════════════════════════════════

- name: Deploy Postgres container (reuse prepare_oim)  # noqa:role-name[path]
  ansible.builtin.include_role:
    name: "{{ playbook_dir }}/../../prepare_oim/roles/deploy_containers/postgres"

# ══════════════════════════════════════════════════════════════════
# Step 2: Deploy BuildStream via prepare_oim role
# (handles: stop existing, rsync source, watcher service, SSL certs,
#  JWT keys, quadlet, Alembic migrations, firewall, health check)
# ══════════════════════════════════════════════════════════════════

- name: Deploy BuildStream container (reuse prepare_oim)  # noqa:role-name[path]
  ansible.builtin.include_role:
    name: "{{ playbook_dir }}/../../prepare_oim/roles/deploy_containers/build_stream"
