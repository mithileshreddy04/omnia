---
# Main task file for BuildStream upgrade
# Runs on OIM host (hosts: oim, connection: ssh)
# Credentials available via hostvars['localhost'] from credential utility

# ══════════════════════════════════════════════════════════════════
# Load OIM metadata and set variables needed by deploy roles
# (replaces deploy_containers/common for upgrade context)
# ══════════════════════════════════════════════════════════════════

- name: Load OIM metadata
  ansible.builtin.include_vars: "{{ oim_metadata_file }}"
  no_log: true

- name: Initialize SELinux volume option
  ansible.builtin.set_fact:
    selinux_option: ":z"

- name: Clear SELinux option for external NFS
  ansible.builtin.set_fact:
    selinux_option: ""
  when:
    - omnia_share_option | default('') == 'NFS'
    - nfs_type | default('') == 'external'

# ── Route to upgrade or fresh install ──
- name: Include upgrade tasks (existing BuildStream installation)
  ansible.builtin.include_tasks: upgrade_existing.yml
  when: hostvars['localhost']['upgrade_path'] == 'upgrade_existing'

- name: Include fresh install tasks (BuildStream not previously enabled)
  ansible.builtin.include_tasks: fresh_install.yml
  when: hostvars['localhost']['upgrade_path'] == 'fresh_install'

# ── Post-upgrade validation ──
- name: Include post-upgrade validation
  ansible.builtin.include_tasks: validate.yml
