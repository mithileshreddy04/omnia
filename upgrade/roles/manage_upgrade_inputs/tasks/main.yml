# ============================================================================
# manage_upgrade_inputs Role
# ============================================================================
# Manages input configuration for upgrade:
# 1. Loads upgrade_manifest.yml (source of truth for components)
# 2. Reads oim_metadata.yml (source of truth for version metadata)
# 3. Validates current deployment versions
# 4. Updates software_config.json with target versions
# 5. Backs up current configurations
#
# Key: Reads JSON from actual input directory (versioned files)
#      No JSON artifacts - only repos.yml for upgrade repos
# ============================================================================

- name: Load upgrade configuration
  ansible.builtin.include_tasks: load_upgrade_manifest.yml

- name: Validate current deployment
  ansible.builtin.include_tasks: validate_current_deployment.yml

- name: Calculate hop chain from upgrade paths
  ansible.builtin.include_tasks: calculate_hop_chain.yml

- name: Backup current configurations
  ansible.builtin.include_tasks: backup_configs.yml

- name: Update software_config.json with target versions
  ansible.builtin.include_tasks: update_software_config.yml

- name: Update component JSON files with version-specific repo names
  ansible.builtin.include_tasks: update_component_json_repos.yml

- name: Display upgrade input summary
  ansible.builtin.include_tasks: display_summary.yml
