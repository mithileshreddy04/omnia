# ============================================================================
# transform_software_config.yml — Transform software_config.json (2.1 → 2.2)
# ============================================================================
# Reads the backup (2.1) software_config.json and transforms it:
#   - Copies ALL content from backup (preserves user's configuration exactly)
#   - Updates version fields using hardcoded version map
#     (e.g., service_k8s 1.34.1 → 1.35.1)
#   - If additional_packages exists in backup, appends "os" entry if not present
#   - Uses compact JSON formatting (no extra whitespace in arrays)
# ============================================================================

- name: Check if backup software_config.json exists
  ansible.builtin.stat:
    path: "{{ backup_location }}/software_config.json"
  register: backup_software_config_stat

- name: Fail if backup software_config.json is not present
  ansible.builtin.fail:
    msg: "{{ msg_backup_software_config_missing }}"
  when: not backup_software_config_stat.stat.exists

- name: Check if target software_config.json exists
  ansible.builtin.stat:
    path: "{{ input_project_dir }}/software_config.json"
  register: software_config_stat

- name: Fail if target software_config.json is not present
  ansible.builtin.fail:
    msg: "{{ msg_software_config_missing }}"
  when: not software_config_stat.stat.exists

- name: Transform software_config.json from 2.1 to 2.2 format
  ansible.builtin.script:
    cmd: ../scripts/transform_software_config.py "{{ backup_location }}/software_config.json" "{{ input_project_dir }}/software_config.json"
  register: software_config_transform_result
  changed_when: software_config_transform_result.rc == 0

- name: Display transformation stderr (version changes)
  ansible.builtin.debug:
    msg: "{{ software_config_transform_result.stderr_lines | default([]) }}"
  when: software_config_transform_result.stderr_lines | default([]) | length > 0

- name: Validate transformed software_config.json (JSON syntax)
  ansible.builtin.command:
    cmd: "python3 -m json.tool '{{ input_project_dir }}/software_config.json'"
  register: software_config_validate
  changed_when: false

- name: Fail if transformed software_config.json is invalid JSON
  ansible.builtin.fail:
    msg: "{{ msg_json_validation_failed }}: software_config.json"
  when: software_config_validate.rc != 0

- name: Display software_config.json transformation summary
  ansible.builtin.debug:
    msg: "{{ msg_software_config_transform_summary }}"
