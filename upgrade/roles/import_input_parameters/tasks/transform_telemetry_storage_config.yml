# ============================================================================
# transform_telemetry_storage_config.yml — Generate telemetry_storage_config.yml
# ============================================================================
# This file is NEW in Omnia 2.2 and does not exist in Omnia 2.1.
# The task writes the default 2.2 template to the target input directory.
# If the file already exists in target (e.g., from a previous run), it is
# overwritten with the default template to ensure a clean state.
# ============================================================================

- name: Check if telemetry_storage_config.yml already exists in target
  ansible.builtin.stat:
    path: "{{ input_project_dir }}/telemetry_storage_config.yml"
  register: telemetry_storage_config_stat

- name: Write telemetry_storage_config.yml with Omnia 2.2 defaults
  ansible.builtin.template:
    src: telemetry_storage_config.j2
    dest: "{{ input_project_dir }}/telemetry_storage_config.yml"
    mode: "{{ default_file_mode }}"

- name: Validate YAML syntax of telemetry_storage_config.yml
  ansible.builtin.command:
    cmd: python3 -c "import yaml; yaml.safe_load(open('{{ input_project_dir }}/telemetry_storage_config.yml','r'))"
  register: telemetry_storage_yaml_validation
  changed_when: false

- name: Fail if YAML validation fails
  ansible.builtin.fail:
    msg: "{{ msg_yaml_validation_failed }}"
  when:
    - telemetry_storage_yaml_validation.rc != 0

- name: Display telemetry_storage_config transformation summary
  ansible.builtin.debug:
    msg: |
      {{ msg_telemetry_storage_config_transform_summary }}
