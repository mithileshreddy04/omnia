# ============================================================================
# manage_localrepo_inputs Role
# ============================================================================
# Manages input configuration for local_repo upgrade:
# 1. Loads upgrade_manifest.yml + upgrade_vars.yml
# 2. Validates current deployment (shared validate_software_config)
# 3. Calculates and validates hop chains
# ============================================================================

- name: Load configuration and validate deployment
  ansible.builtin.include_tasks: load_and_validate.yml

- name: Calculate and validate hop chains
  ansible.builtin.include_tasks: process_hop_chains.yml

# --- Summary (inlined from former display_summary.yml) ---

- name: "Summary — Display upgrade input summary"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "UPGRADE INPUT MANAGEMENT COMPLETE"
      - "=========================================="
      - "Upgrade ID: {{ upgrade_id }}"
      - "Mode: {{ upgrade_mode | default('single_hop') }}"
      - "Omnia: {{ upgrade_source_version }} -> {{ upgrade_target_version }}"
      - "Total Hops: {{ total_upgrade_hops }}"
      - "=========================================="

- name: "Summary — Set upgrade facts for downstream roles"
  ansible.builtin.set_fact:
    upgrade_inputs_complete: true
    upgrade_backup_location: "{{ upgrade_manifest.backup_dir }}"
