# ============================================================================
# prepare_upgrade.yml — User-Facing Playbook #1
# ============================================================================
# Run AFTER omnia.sh --upgrade completes. Transforms 2.1 inputs to 2.2 format,
# restores credentials from backup, loads upgrade manifest, validates current
# deployment, calculates hop chain, updates software_config, and displays
# upgrade summary for user review.
#
# Usage:
#   ansible-playbook upgrade/prepare_upgrade.yml
#
# After this playbook completes, the user should:
#   1. Review /opt/omnia/input/project_default/ for new/changed fields
#   2. Review the upgrade summary (hop chain, component versions)
#   3. Run: ansible-playbook upgrade/upgrade.yml [--tags ...]
# ============================================================================

- name: Prepare upgrade — transform inputs, manage upgrade configuration, prepare local repo
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    oim_metadata_path: "/opt/omnia/.data/oim_metadata.yml"
  roles:
    - role: ../utils/roles/include_input_dir
    - role: import_input_parameters

- name: Display post-upgrade preparation banner
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read provision_config.yml to get pxe_mapping_file_path
      ansible.builtin.slurp:
        src: "{{ input_project_dir }}/provision_config.yml"
      register: provision_config_slurp

    - name: Extract pxe_mapping_filename from provision_config.yml
      ansible.builtin.set_fact:
        pxe_mapping_filename: >-
          {{ (provision_config_slurp.content | b64decode | from_yaml).pxe_mapping_file_path
             | default('pxe_mapping_file.csv')
             | regex_replace('^.*/', '') }}

    - name: Display upgrade preparation completion banner
      ansible.builtin.debug:
        msg: "{{ banner_lines }}"
      vars:
        banner_lines:
          - "========================================================================"
          - "          OMNIA 2.1 to 2.2 INPUT PREPARATION COMPLETE"
          - "========================================================================"
          - ""
          - "All input files have been successfully migrated to:"
          - "    {{ input_project_dir }}"
          - ""
          - "  WARNING: If you make manual changes to the input files and"
          - "           re-run this playbook, your changes will be OVERWRITTEN."
          - "           This playbook re-transforms inputs from the 2.1 backup."
          - "           Make all manual changes AFTER the final run of this playbook."
          - ""
          - "------------------------------------------------------------------------"
          - "SECTION 1: FILES MIGRATED AUTOMATICALLY (no action required)"
          - "------------------------------------------------------------------------"
          - ""
          - "    ✓  provision_config.yml          - Migrated successfully"
          - "    ✓  high_availability_config.yml  - Migrated successfully"
          - "    ✓  omnia_config.yml              - Migrated successfully"
          - "    ✓  build_stream_config.yml       - Migrated successfully"
          - "    ✓  gitlab_config.yml             - Migrated successfully"
          - "    ✓  local_repo_config.yml         - Migrated successfully"
          - "    ✓  security_config.yml           - Restored from backup"
          - "    ✓  software_config.json          - Migrated successfully"
          - "    ✓  Credentials                   - Restored and re-encrypted"
          - ""
          - "------------------------------------------------------------------------"
          - "SECTION 2: FILES REQUIRING REVIEW (new features in Omnia 2.2)"
          - "------------------------------------------------------------------------"
          - ""
          - "File 1: network_spec.yml"
          - "    1.  admin_network.subnet              (auto-computed)"
          - "    2.  admin_network.additional_subnets  (multi-RAC PXE)"
          - "    3.  ib_network.dns                    (InfiniBand DNS)"
          - ""
          - "File 2: storage_config.yml"
          - "    1.  nfs_client_params  is replaced by 'mounts' format"
          - "    2.  mount_params profiles  (nfs_default, vast_nfs, vast_rdma)"
          - "    3.  powervault_config  (now a list with mount_point)"
          - "    4.  swap  (new swap configuration)"
          - "    5.  s3_configurations  (new S3 storage configuration)"
          - ""
          - "File 3: telemetry_config.yml"
          - "    1.  Restructured to: sources, bridges, sinks architecture"
          - "    2.  telemetry_sources.dcgm           (GPU metrics)"
          - "    3.  telemetry_sources.powerscale     (storage metrics)"
          - "    4.  telemetry_sources.ufm            (InfiniBand fabric metrics)"
          - "    5.  telemetry_bridges                (vector_ldms, vector_ome)"
          - "    6.  telemetry_sinks.victoria_logs    (centralized logging)"
          - "    7.  additional_metric_remote_write_endpoints"
          - "    8.  additional_log_write_endpoints"
          - "    9.  ufm_configuration                 (UFM Prometheus settings)"
          - "    10. idrac_telemetry_configurations.mysqldb_storage  (iDRAC MySQL storage)"
          - "    Note: All new features are DISABLED by default."
          - ""
          - "File 4: telemetry_storage_config.yml  (NEW in 2.2)"
          - "    This is a new input file for telemetry resource and replica settings."
          - "    1.  victoria_cluster       (VictoriaMetrics replicas and resource limits)"
          - "    2.  victoria_logs_cluster  (VictoriaLogs replicas and resource limits)"
          - "    3.  vector                 (Vector component replicas and resource limits)"
          - "    4.  csi_volume_exporter    (CSI Volume Exporter resource limits)"
          - "    5.  csm_metrics_powerscale_resources  (CSM Metrics PowerScale limits)"
          - "    Note: Created with sensible defaults. Adjust if needed."
          - ""
          - "File 5: {{ pxe_mapping_filename }}"
          - "    1.  ib_nic_name column  (InfiniBand NIC name)"
          - "    2.  ib_ip column   (InfiniBand IP addresses)"
          - "    Note: IB fields are empty. Populate manually if using"
          - "          InfiniBand network for compute nodes."
          - ""
          - "========================================================================"
          - "NEXT STEPS"
          - "========================================================================"
          - ""
          - "    1.  Review the files listed in Section 2 above in:"
          - "        {{ input_project_dir }}"
          - ""
          - "    2.  Enable any new features you want"
          - "        (telemetry, storage profiles, IB network, etc.)"
          - ""
          - "    3.  Verify the upgrade summary shown above"
          - ""
          - "    4.  Run the upgrade playbook:"
          - "        ansible-playbook upgrade/upgrade.yml"
          - ""
          - "For more information, refer to the Omnia upgrade section documentation."
          - ""
          - "========================================================================"
