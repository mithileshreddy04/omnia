# ============================================================================
# prepare_upgrade.yml — User-Facing Playbook #1
# ============================================================================
# Run AFTER omnia.sh --upgrade completes. Transforms 2.1 inputs to 2.2 format,
# restores credentials from backup, loads upgrade manifest, validates current
# deployment, calculates hop chain, updates software_config, and displays
# upgrade summary for user review.
#
# Usage:
#   ansible-playbook upgrade/prepare_upgrade.yml
#
# After this playbook completes, the user should:
#   1. Review /opt/omnia/input/project_default/ for new/changed fields
#   2. Review the upgrade summary (hop chain, component versions)
#   3. Run: ansible-playbook upgrade/upgrade.yml [--tags ...]
# ============================================================================

- name: Prepare upgrade — transform inputs, manage upgrade configuration, prepare local repo
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    input_project_dir: "/opt/omnia/input/project_default"
    oim_metadata_path: "/opt/omnia/.data/oim_metadata.yml"
  roles:
    - role: ../utils/roles/include_input_dir
    - role: import_input_parameters
    - role: manage_upgrade_inputs
