---
# Discovery Playbook
# Usage:
#   ansible-playbook discovery/discovery.yml -e "discovery_mechanism=ome"
#   ansible-playbook discovery/discovery.yml -e "discovery_mechanism=magellan"

- name: Include input project directory
  when: not project_dir_status | default(false) | bool
  ansible.builtin.import_playbook: ../utils/include_input_dir.yml

- name: Load discovery configuration
  hosts: localhost
  connection: local
  tasks:
    - name: Include discovery config file
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/discovery_config.yml"
      failed_when: false

- name: BMC Discovery Playbook
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    discovery_mechanism: ""
    supported_mechanisms:
      - ome
      - magellan

  pre_tasks:
    - name: Display usage information when no discovery_mechanism is specified
      when: discovery_mechanism == ""
      block:
        - name: Show usage prompt
          ansible.builtin.debug:
            msg:
              - "============================================================"
              - "Usage: ansible-playbook discovery.yml"
              - "       -e discovery_mechanism=<mechanism>"
              - ""
              - "Please specify a discovery_mechanism parameter."
              - ""
              - "Supported discovery mechanisms:"
              - "  - ome      : Dell OpenManage Enterprise (OME)"
              - "  - magellan : Magellan (upcoming, not yet supported)"
              - ""
              - "Examples:"
              - "  ansible-playbook discovery.yml -e discovery_mechanism=ome"
              - "  ansible-playbook discovery.yml -e discovery_mechanism=magellan"
              - "============================================================"

        - name: End play when no discovery_mechanism specified
          ansible.builtin.meta: end_play

    - name: Validate discovery_mechanism parameter
      ansible.builtin.fail:
        msg: |
          Invalid discovery_mechanism '{{ discovery_mechanism }}' specified.
          Supported mechanisms are: {{ supported_mechanisms | join(', ') }}.
          Usage: ansible-playbook discovery.yml -e discovery_mechanism=ome
      when: discovery_mechanism not in supported_mechanisms

  tasks:
    - name: Handle Magellan discovery mechanism
      when: discovery_mechanism == 'magellan'
      block:
        - name: Display Magellan not supported message
          ansible.builtin.debug:
            msg:
              - "============================================================"
              - "NOTICE: Magellan Discovery"
              - "============================================================"
              - "This is an upcoming functionality and is not yet supported."
              - "Please use 'ome' as the discovery_mechanism for now."
              - "============================================================"
        - name: End play for magellan
          ansible.builtin.meta: end_play

    - name: Handle OME discovery mechanism
      when: discovery_mechanism == 'ome'
      block:
        - name: Include OME discovery role
          ansible.builtin.include_role:
            name: ome_discovery
