---

- name: Verify OME is reachable
  ansible.builtin.wait_for:
    host: "{{ ome_ip }}"
    port: 443
    timeout: 30
  register: ome_reachability

- name: Collect OME server inventory
  ome_server_inventory:
    ome_ip: "{{ ome_ip }}"
    ome_username: "{{ ome_username }}"
    ome_password: "{{ ome_password }}"
    device_type: "{{ ome_server_device_type }}"
  register: ome_inventory_result

- name: Display connection status
  ansible.builtin.debug:
    msg: "{{ ome_connection_success_msg }}"
  when: ome_inventory_result.devices | length > 0

- name: Fail if no servers found
  ansible.builtin.fail:
    msg: "{{ no_servers_found_msg }}"
  when: ome_inventory_result.devices | length == 0

- name: Set discovered servers fact
  ansible.builtin.set_fact:
    discovered_servers: "{{ ome_inventory_result.devices }}"

- name: Display discovered server count
  ansible.builtin.debug:
    msg: "Discovered {{ discovered_servers | length }} servers from OME"
