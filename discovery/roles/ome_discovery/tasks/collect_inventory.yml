---

- name: Verify OME is reachable
  block:
    - name: Wait for OME HTTPS port
      ansible.builtin.wait_for:
        host: "{{ ome_ip }}"
        port: 443
        timeout: 30
      register: ome_reachability
  rescue:
    - name: Fail with actionable message when OME is unreachable
      ansible.builtin.fail:
        msg: >-
          Unable to reach OME at {{ ome_ip }}:443 within 30 seconds.
          Please verify that ome_ip in {{ input_project_dir | default('input') }}/discovery_config.yml
          is correct and that the OME appliance is powered on and network-accessible.

- name: Collect OME server inventory
  ome_server_inventory:
    ome_ip: "{{ ome_ip }}"
    ome_username: "{{ ome_username }}"
    ome_password: "{{ ome_password }}"
    device_type: "{{ ome_server_device_type }}"
    page_size: "{{ ome_page_size }}"
  register: ome_inventory_result

- name: Display OME pagination summary
  ansible.builtin.debug:
    msg:
      - "OME Pagination Summary:"
      - "  Total devices in OME:    {{ ome_inventory_result.pagination.total_devices_in_ome }}"
      - "  Page size:               {{ ome_inventory_result.pagination.page_size }}"
      - "  Total pages:             {{ ome_inventory_result.pagination.total_pages }}"
      - "  Pages fetched:           {{ ome_inventory_result.pagination.pages_fetched }}"
      - "  Devices retrieved:       {{ ome_inventory_result.pagination.devices_retrieved }}"
      - >-
        Devices after filtering:
        {{ ome_inventory_result.pagination.devices_after_type_filter
        | default(ome_inventory_result.pagination.devices_retrieved) }}

- name: Display connection status
  ansible.builtin.debug:
    msg: "{{ ome_connection_success_msg }}"
  when: ome_inventory_result.devices | length > 0

- name: Fail if no servers found
  ansible.builtin.fail:
    msg: "{{ no_servers_found_msg }}"
  when: ome_inventory_result.devices | length == 0

- name: Set discovered servers fact
  ansible.builtin.set_fact:
    discovered_servers: "{{ ome_inventory_result.devices }}"

- name: Display discovered server count
  ansible.builtin.debug:
    msg: "Discovered {{ discovered_servers | length }} servers from OME"
