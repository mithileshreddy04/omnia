---

- name: Load network spec
  ansible.builtin.include_vars:
    file: "{{ input_project_dir | default(playbook_dir + '/../input') }}/network_spec.yml"
    name: network_spec_data

- name: Set admin_subnet from network spec
  ansible.builtin.set_fact:
    admin_subnet: "{{ (network_spec_data.Networks | selectattr('admin_network', 'defined') | first).admin_network.subnet | default('') }}"

- name: Set ib_subnet from network spec
  ansible.builtin.set_fact:
    ib_subnet: "{{ (network_spec_data.Networks | selectattr('ib_network', 'defined') | first).ib_network.subnet | default('') }}"

- name: Ensure input directory exists
  ansible.builtin.file:
    path: "{{ pxe_mapping_output_file | dirname }}"
    state: directory
    mode: '0755'

- name: Generate PXE mapping file
  generate_pxe_mapping:
    servers: "{{ discovered_servers }}"
    output_file: "{{ pxe_mapping_output_file }}"
    functional_group: "{{ default_functional_group }}"
    group_name: "{{ default_group_name }}"
    hostname_prefix: "{{ hostname_prefix }}"
    hostname_start: "{{ hostname_start_number }}"
    hostname_padding: "{{ hostname_padding }}"
    ib_subnet: "{{ ib_subnet }}"
    admin_subnet: "{{ admin_subnet }}"
  register: pxe_mapping_result

- name: Display discovery completion message
  ansible.builtin.debug:
    msg: "{{ discovery_complete_msg }}"

- name: Display generated BMC PXE mapping file path
  ansible.builtin.debug:
    msg: "BMC PXE mapping file saved to: {{ pxe_mapping_output_file }}"
