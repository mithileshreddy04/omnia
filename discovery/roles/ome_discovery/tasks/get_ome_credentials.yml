---

- name: Check if OME credential file exists
  ansible.builtin.stat:
    path: "{{ omnia_config_credentials_file }}"
  register: ome_cred_file_stat

- name: Check if vault key file exists
  ansible.builtin.stat:
    path: "{{ omnia_config_credentials_vault_key }}"
  register: ome_vault_key_stat

- name: Load OME credentials
  when: ome_cred_file_stat.stat.exists
  block:
    - name: Check if credential file is vault-encrypted
      ansible.builtin.command: cat {{ omnia_config_credentials_file }}
      changed_when: false
      register: ome_cred_file_content
      no_log: true

    - name: Decrypt credential file
      ansible.builtin.command: >-
        ansible-vault decrypt {{ omnia_config_credentials_file }}
        --vault-password-file {{ omnia_config_credentials_vault_key }}
      changed_when: false
      when:
        - ome_vault_key_stat.stat.exists
        - "'$ANSIBLE_VAULT' in ome_cred_file_content.stdout"

    - name: Include OME credentials
      ansible.builtin.include_vars:
        file: "{{ omnia_config_credentials_file }}"
      no_log: true

    - name: Re-encrypt credential file
      ansible.builtin.command: >-
        ansible-vault encrypt {{ omnia_config_credentials_file }}
        --vault-password-file {{ omnia_config_credentials_vault_key }}
      changed_when: false
      when:
        - ome_vault_key_stat.stat.exists
        - "'$ANSIBLE_VAULT' in ome_cred_file_content.stdout"

- name: Validate OME IP is set
  ansible.builtin.fail:
    msg: "ome_ip must be provided in discovery_config.yml."
  when: ome_ip is not defined or ome_ip == ''

- name: Validate OME credentials are set
  ansible.builtin.fail:
    msg: "OME credentials (ome_username, ome_password) must be provided. Run prepare_oim or get_config_credentials first."
  when: >
    ome_username is not defined or ome_username == '' or
    ome_password is not defined or ome_password == ''
