---

# OME API endpoints
ome_session_url: "https://{{ ome_ip }}/api/SessionService/Sessions"
ome_devices_url: "https://{{ ome_ip }}/api/DeviceService/Devices"
ome_device_inventory_url: "https://{{ ome_ip }}/api/DeviceService/Devices({{ device_id }})/InventoryDetails"

# Unified credential file (populated by get_config_credentials / prepare_oim)
omnia_config_credentials_file: "{{ input_project_dir | default(playbook_dir + '/../input') }}/omnia_config_credentials.yml"
omnia_config_credentials_vault_key: "{{ input_project_dir | default(playbook_dir + '/../input') }}/.omnia_config_credentials_key"

# Output file configuration
pxe_mapping_output_file: "{{ input_project_dir | default(playbook_dir + '/../input') }}/bmc_pxe_mapping_file.csv"
pxe_mapping_headers:  # yamllint disable-line rule:line-length
  "FUNCTIONAL_GROUP_NAME,GROUP_NAME,SERVICE_TAG,PARENT_SERVICE_TAG,HOSTNAME,ADMIN_MAC,ADMIN_IP,BMC_MAC,BMC_IP,BMC_HOSTNAME,IB_MAC,IB_IP,GPU_VENDOR,GPU_TYPE"

# Messages
ome_credentials_prompt_msg: |
  OME credentials are required for discovery.
  Please provide the OME IP address, username, and password.

ome_connection_success_msg: "Successfully connected to OME at {{ ome_ip }}"
ome_connection_fail_msg: "Failed to connect to OME at {{ ome_ip }}. Please verify credentials and network connectivity."

discovery_complete_msg:
  - "============================================================"
  - "OME Discovery Complete"
  - "============================================================"
  - "BMC PXE mapping file generated: {{ pxe_mapping_output_file }}"
  - "Total servers discovered: {{ discovered_servers | length }}"
  - ""
  - "Next Steps:"
  - "1. Review and edit the generated PXE mapping file:"
  - "     {{ pxe_mapping_output_file }}"
  - ""
  - "2. Update HOSTNAME, FUNCTIONAL_GROUP_NAME, GROUP_NAME as needed."
  - ""
  - "3. Update the following parameter in provision_config.yml:"
  - "     pxe_mapping_file_path: {{ pxe_mapping_output_file }}"
  - ""
  - "4. Run:"
  - "     ansible-playbook provision/provision.yml"
  - "============================================================"

no_servers_found_msg: |
  No servers found in OME inventory.
  Please verify that servers are discovered and managed by OME.
