---
# Process each mount from storage_config.yml and add to cloud_init_groups_dict
# Mounts are converted to cloud-init format: [source, mount_point, fs_type, mnt_opts, dump_freq, fsck_pass]

- name: Build host-specific mount map from PXE mapping
  ansible.builtin.include_tasks: build_host_mount_map.yml
  when: pxe_mapping_file_path is defined and pxe_mapping_file_path | length > 0

- name: Process mounts and add to cloud_init_groups_dict
  ansible.builtin.include_tasks: process_single_mount.yml
  loop: "{{ mounts | default([]) }}"
  loop_control:
    loop_var: mount_item
    label: "{{ mount_item.name | default('unnamed') }}"

- name: Debug cloud_init_groups_dict
  ansible.builtin.debug:
    var: cloud_init_groups_dict
  # debugger: always

- name: Process PowerVault iSCSI entries and add to cloud_init_groups_dict
  ansible.builtin.include_tasks: process_single_powervault.yml
  loop: "{{ powervault_config | default([]) }}"
  loop_control:
    loop_var: pv_item
    label: "{{ pv_item.name | default('unnamed') }}"
  vars:
    pv_script_template_path: "setup_iscsi_storage.sh.j2"

- name: Debug host_mount_map
  ansible.builtin.debug:
    var: host_mount_map
  when: host_mount_map | length > 0
