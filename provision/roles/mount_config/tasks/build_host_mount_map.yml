---
# Build host-specific mount map from PXE mapping file
# Creates group_host_map (group -> hostnames) and host_mount_map (hostname -> mounts/runcmd)

- name: Initialize group_host_map and host_mount_map
  ansible.builtin.set_fact:
    group_host_map: {}
    host_mount_map: {}

- name: Read PXE mapping file
  community.general.read_csv:
    path: "{{ pxe_mapping_file_path }}"
  register: pxe_mapping_data
  when: pxe_mapping_file_path is defined and pxe_mapping_file_path | length > 0

- name: Build group_host_map from PXE mapping
  ansible.builtin.set_fact:
    group_host_map: >-
      {{
        group_host_map | combine({
          item.GROUP_NAME: (group_host_map[item.GROUP_NAME] | default([])) + [item.HOSTNAME]
        })
      }}
  loop: "{{ pxe_mapping_data.list | default([]) }}"
  loop_control:
    label: "{{ item.HOSTNAME | default('unknown') }}"
  when: pxe_mapping_data.list is defined

- name: Debug group_host_map
  ansible.builtin.debug:
    var: group_host_map
  when: group_host_map | length > 0
