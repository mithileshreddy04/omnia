---
# Process a single swap entry and add to cloud_init_groups_dict
# Validates swap configuration and determines target functional groups

- name: Process swap entry
  block:
    - name: Validate swap configuration
      ansible.builtin.assert:
        that:
          - swap_item.filename is defined
          - swap_item.size is defined
          - swap_item.filename | regex_search('^/[a-zA-Z0-9/_.-]+$')
          - swap_item.size | regex_search('^(auto|[0-9]+[BKMGT]?)$')
        fail_msg: "Invalid swap configuration for {{ swap_item.filename | default('unnamed') }}"

    - name: Determine target functional groups for swap
      ansible.builtin.include_tasks: determine_target_groups.yml
      vars:
        config_item: "{{ swap_item }}"

    - name: Build swap configuration entry
      ansible.builtin.set_fact:
        swap_config_entry:
          filename: "{{ swap_item.filename }}"
          size: "{{ swap_item.size }}"

    - name: Add maxsize if specified
      ansible.builtin.set_fact:
        swap_config_entry: "{{ swap_config_entry | combine({'maxsize': swap_item.maxsize}) }}"
      when: swap_item.maxsize is defined

    - name: Add swap entry to each target functional group
      ansible.builtin.set_fact:
        cloud_init_groups_dict: >-
          {{
            cloud_init_groups_dict | combine({
              item: (cloud_init_groups_dict[item] | default({}) | combine({
                'swap': swap_config_entry
              }, recursive=True))
            }, recursive=True)
          }}
      loop: "{{ target_functional_groups }}"
      loop_control:
        label: "{{ item }}"
