---

- name: Validate CSI driver PowerScale is configured
  ansible.builtin.assert:
    that:
      - hostvars['localhost']['csi_driver_powerscale_support'] | default(false) | bool
    fail_msg: "{{ ps_csi_driver_not_configured_msg }}"

- name: Set PowerScale configuration facts
  ansible.builtin.set_fact:
    ps_csi_secret_path: "{{ hostvars['localhost']['service_cluster_info'].csi_powerscale_driver_secret_file_path | default('') }}"
    ps_helm_values_file: "{{ telemetry_config.powerscale_configurations.csm_observability_values_file_path }}"
    csm_observability_namespace: "{{ csm_namespace }}"

- name: Validate user-provided Helm values file path
  ansible.builtin.assert:
    that:
      - ps_helm_values_file | length > 0
    fail_msg: "{{ ps_helm_values_path_missing_msg }}"

- name: Verify user-provided Helm values file exists
  ansible.builtin.stat:
    path: "{{ ps_helm_values_file }}"
  register: helm_values_stat
  delegate_to: localhost

- name: Fail if user-provided Helm values file does not exist
  ansible.builtin.fail:
    msg: "{{ ps_helm_values_file_not_found_msg }}"
  when: not helm_values_stat.stat.exists

# --- Read user values file to detect auth mode for secret copying ---

- name: Load user-provided Helm values to detect auth mode
  block:
    - name: Read user Helm values file
      ansible.builtin.include_vars:
        file: "{{ ps_helm_values_file }}"
        name: user_helm_values
      no_log: true
  rescue:
    - name: Failed to read user Helm values file
      ansible.builtin.fail:
        msg: "{{ ps_helm_values_parse_fail_msg }}"

- name: Detect authentication mode from CSM Observability values
  ansible.builtin.set_fact:
    karavi_enabled: >-
      {{ user_helm_values.karaviMetricsPowerscale.authorization.enabled | default(false) | bool }}

- name: Display authentication mode
  ansible.builtin.debug:
    msg: "{% if karavi_enabled | bool %}{{ ps_auth_mode_karavi_msg }}{% else %}{{ ps_auth_mode_direct_msg }}{% endif %}"
    verbosity: 2

# --- Validate cert-manager is enabled (required for TLS) ---

- name: Validate cert-manager is enabled in Helm values
  ansible.builtin.assert:
    that:
      - user_helm_values['cert-manager']['enabled'] | default(false) | bool
    fail_msg: "{{ ps_cert_manager_disabled_msg }}"

# --- Load CSI PowerScale credentials from vault ---

- name: Load CSI PowerScale credentials from vault
  block:
    - name: Read CSI driver secret.yaml
      ansible.builtin.include_vars:
        file: "{{ ps_csi_secret_path }}"
        name: csi_powerscale_secret
      no_log: true

    - name: Extract isilon clusters from secret
      ansible.builtin.set_fact:
        ps_clusters: "{{ csi_powerscale_secret.isilonClusters | default([]) }}"
      no_log: true
  rescue:
    - name: Failed to load CSI PowerScale credentials
      ansible.builtin.fail:
        msg: "{{ ps_csi_secret_read_fail_msg }}"

- name: Fail if no PowerScale clusters defined
  ansible.builtin.fail:
    msg: "{{ ps_no_clusters_found_msg }}"
  when: ps_clusters | length == 0

- name: Display PowerScale clusters found
  ansible.builtin.debug:
    msg: "{{ ps_clusters_found_msg }}"
    verbosity: 2

# --- Air-gapped: Download and extract karavi-observability dependencies from Pulp to NFS ---

- name: Get PowerScale telemetry offline dependencies
  ansible.builtin.include_tasks: get_powerscale_telemetry_dependencies.yml

# --- Copy user-provided values file to NFS share ---
# Actual helm install happens in cloud-init during PXE boot.

- name: Copy user-provided Helm values file to NFS share
  ansible.builtin.copy:
    src: "{{ ps_helm_values_file }}"
    dest: "{{ k8s_client_mount_path }}/karavi-observability/csm_metrics_values.yaml"
    mode: '0600'

- name: Display PowerScale telemetry preparation status
  ansible.builtin.debug:
    msg: "{{ ps_telemetry_prepared_msg }}"
    verbosity: 2
