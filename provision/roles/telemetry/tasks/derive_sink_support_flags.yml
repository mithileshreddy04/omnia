---
# =============================================================================
# DERIVE SINK SUPPORT FLAGS AND LEGACY VARIABLE MAPPINGS
# =============================================================================
# This task analyzes all telemetry sources and their collection_targets to
# determine which sinks (victoria_metrics, victoria_logs, Kafka) are in use.
# Also maps new telemetry_config structure to legacy variables for backward compatibility.
#
# LEGACY VARIABLE MAPPINGS:
#   ldms_support = telemetry_config.telemetry_sources.ldms.metrics_enabled
#   idrac_telemetry_support = telemetry_config.telemetry_sources.idrac.metrics_enabled
#   dcgm_support = telemetry_config.telemetry_sources.dcgm.metrics_enabled
#   powerscale_configurations = merged dict of powerscale source flags + detailed config
#
# SINK SUPPORT FLAGS:
#   victoria_metrics_support = true if ANY source has 'victoria_metrics' in collection_targets
#   victoria_logs_support = true if ANY source has 'victoria_logs' in collection_targets
#   kafka_support = true if ANY source has 'kafka' in collection_targets
# =============================================================================

- name: Initialize sink support flags
  ansible.builtin.set_fact:
    victoria_metrics_support: false
    victoria_logs_support: false
    kafka_support: false
    telemetry_enabled: false

- name: Set ldms_support based on telemetry_config.yml
  ansible.builtin.set_fact:
    ldms_support: "{{ telemetry_config.telemetry_sources.ldms.metrics_enabled | default(false) | bool }}"

- name: Map telemetry_sources to legacy feature flags
  ansible.builtin.set_fact:
    idrac_telemetry_support: "{{ telemetry_config.telemetry_sources.idrac.metrics_enabled | default(false) | bool }}"
    powerscale_metrics_enabled: "{{ telemetry_config.telemetry_sources.powerscale.metrics_enabled | default(false) | bool }}"
    powerscale_log_enabled: "{{ telemetry_config.telemetry_sources.powerscale.logs_enabled | default(false) | bool }}"
    dcgm_support: "{{ telemetry_config.telemetry_sources.dcgm.metrics_enabled | default(true) | bool }}"

- name: Map powerscale source + configurations to legacy powerscale_configurations
  ansible.builtin.set_fact:
    powerscale_configurations:
      powerscale_telemetry_support: "{{ telemetry_config.telemetry_sources.powerscale.metrics_enabled | default(true) | bool }}"
      powerscale_log_enabled: "{{ telemetry_config.telemetry_sources.powerscale.logs_enabled | default(false) | bool }}"
      syslog_source_ips: "{{ telemetry_config.powerscale_configurations.syslog_source_ips | default([]) }}"
      otel_collector_storage_size: "{{ telemetry_config.powerscale_configurations.otel_collector_storage_size | default('5Gi') }}"
      csm_observability_values_file_path: "{{ telemetry_config.powerscale_configurations.csm_observability_values_file_path | default('') }}"
      additional_remote_write_endpoints: "{{ telemetry_config.powerscale_configurations.additional_remote_write_endpoints | default([]) }}"
  when: telemetry_config.powerscale_configurations is defined

- name: Check if any source targets victoria_metrics
  ansible.builtin.set_fact:
    victoria_metrics_support: true
  when: >-
    'victoria_metrics' in (telemetry_config.telemetry_sources.idrac.collection_targets | default([])) or
    'victoria_metrics' in (telemetry_config.telemetry_sources.powerscale.collection_targets | default([]))

- name: Check if any source targets victoria_logs
  ansible.builtin.set_fact:
    victoria_logs_support: true
  when: >-
    'victoria_logs' in (telemetry_config.telemetry_sources.powerscale.collection_targets | default([])) or
    'victoria_logs' in (telemetry_config.telemetry_sources.idrac.collection_targets | default([]))

- name: Check if any source targets Kafka
  ansible.builtin.set_fact:
    kafka_support: true
  when: >-
    'kafka' in (telemetry_config.telemetry_sources.idrac.collection_targets | default([])) or
    'kafka' in (telemetry_config.telemetry_sources.ldms.collection_targets | default([]))

- name: Log derived sink support flags
  ansible.builtin.debug:
    msg: >
      Sink support flags derived —
      victoria_metrics_support={{ victoria_metrics_support }},
      victoria_logs_support={{ victoria_logs_support }},
      kafka_support={{ kafka_support }}
    verbosity: 1

- name: Set global variable for telemetry_enabled
  ansible.builtin.set_fact:
    telemetry_enabled: true
  when: >
    idrac_telemetry_support or
    powerscale_metrics_enabled or
    powerscale_log_enabled or
    victoria_metrics_support or
    victoria_logs_support or
    ldms_support or
    kafka_support
