---

# get_powerscale_telemetry_dependencies.yml
# Downloads and extracts karavi-observability git repository, Helm chart,
# and cert-manager Helm chart dependency from Pulp local mirror for
# air-gapped deployment.
# All files are downloaded to the NFS share at {{ k8s_client_mount_path }}/karavi-observability/
#
# cert-manager CRDs are included inside the karavi-observability repo
# (installer/cert-manager.crds.yaml) -- no separate download needed.
#
# cert-manager Helm chart (from Jetstack) is pre-downloaded to Pulp via
# service_k8s.json tarball entry. The package name and version are read
# dynamically from service_k8s.json -- not hardcoded.

- name: Extract cert-manager package name from service_k8s.json
  ansible.builtin.set_fact:
    cert_manager_package: >-
      {{ telemetry_packages['service_k8s']['cluster']
        | selectattr('type', 'equalto', 'tarball')
        | selectattr('package', 'search', 'cert-manager')
        | map(attribute='package')
        | first }}

- name: Set cert-manager chart tarball filename (Pulp stores tarballs as .tar.gz)
  ansible.builtin.set_fact:
    cert_manager_chart_tgz: "{{ cert_manager_package }}.tar.gz"

- name: Display cert-manager package read from service_k8s.json
  ansible.builtin.debug:
    msg: "{{ ps_cert_manager_pkg_msg }}"
    verbosity: 2

- name: Get karavi-observability offline dependencies from Pulp to NFS share
  block:
    - name: Create karavi-observability directory on NFS share
      ansible.builtin.file:
        path: "{{ k8s_client_mount_path }}/karavi-observability"
        state: directory
        mode: '0755'

    - name: Get karavi-observability git tar from Pulp
      ansible.builtin.get_url:
        url: "{{ offline_git_path }}/karavi-observability/{{ karavi_observability_git }}"
        dest: "{{ k8s_client_mount_path }}/karavi-observability/{{ karavi_observability_git }}"
        mode: "{{ permission_644 }}"

    - name: Extract karavi-observability tar file on NFS share
      ansible.builtin.unarchive:
        src: "{{ k8s_client_mount_path }}/karavi-observability/{{ karavi_observability_git }}"
        dest: "{{ k8s_client_mount_path }}/karavi-observability/"
        remote_src: true

    - name: Get dell/helm-charts git tar from Pulp
      ansible.builtin.get_url:
        url: "{{ offline_git_path }}/helm-charts/{{ karavi_helm_charts_git }}"
        dest: "{{ k8s_client_mount_path }}/karavi-observability/{{ karavi_helm_charts_git }}"
        mode: "{{ permission_644 }}"

    - name: Extract dell/helm-charts tar file on NFS share
      ansible.builtin.unarchive:
        src: "{{ k8s_client_mount_path }}/karavi-observability/{{ karavi_helm_charts_git }}"
        dest: "{{ k8s_client_mount_path }}/karavi-observability/"
        remote_src: true

    - name: Set karavi-observability Helm chart path on NFS share
      ansible.builtin.set_fact:
        karavi_helm_chart_path: "{{ k8s_client_mount_path }}/karavi-observability/helm-charts/charts/karavi-observability"

    - name: Create charts/ directory for Helm dependencies
      ansible.builtin.file:
        path: "{{ karavi_helm_chart_path }}/charts"
        state: directory
        mode: '0755'

    - name: Check if cert-manager is disabled in values file
      ansible.builtin.set_fact:
        cert_manager_disabled: >-
          {%- if csm_observability_values_file_path | default('') != '' -%}
          {%- set values_content = lookup('file', csm_observability_values_file_path, errors='ignore') -%}
          {%- if values_content is not none and 'cert-manager:' in values_content and 'enabled: false' in values_content -%}
          true{%- else -%}
          false{%- endif -%}
          {%- else -%}
          false{%- endif -%}

    - name: Display cert-manager dependency status
      ansible.builtin.debug:
        msg: "{% if cert_manager_disabled %}{{ ps_cert_manager_skipped_msg }}{% else %}{{ ps_cert_manager_required_msg }}{% endif %}"
        verbosity: 2

    - name: Download cert-manager Helm chart from Pulp (Jetstack repo pre-staged offline)
      ansible.builtin.get_url:
        url: "{{ offline_tarball_path }}/{{ cert_manager_package }}/{{ cert_manager_chart_tgz }}"
        dest: "{{ karavi_helm_chart_path }}/charts/{{ cert_manager_chart_tgz }}"
        mode: "{{ permission_644 }}"
      when: not cert_manager_disabled

    - name: Verify cert-manager chart archive was downloaded
      ansible.builtin.stat:
        path: "{{ karavi_helm_chart_path }}/charts/{{ cert_manager_chart_tgz }}"
      register: cert_manager_chart_stat
      when: not cert_manager_disabled

    - name: Fail if cert-manager chart archive is missing
      ansible.builtin.fail:
        msg: "{{ ps_cert_manager_missing_msg }}"
      when: not cert_manager_disabled and not cert_manager_chart_stat.stat.exists

    - name: Extract cert-manager chart as directory for Helm compatibility
      ansible.builtin.unarchive:
        src: "{{ karavi_helm_chart_path }}/charts/{{ cert_manager_chart_tgz }}"
        dest: "{{ karavi_helm_chart_path }}/charts/"
        remote_src: true
      when: not cert_manager_disabled and cert_manager_chart_stat.stat.exists

    - name: Remove cert-manager archive after extraction
      ansible.builtin.file:
        path: "{{ karavi_helm_chart_path }}/charts/{{ cert_manager_chart_tgz }}"
        state: absent
      when: not cert_manager_disabled and cert_manager_chart_stat.stat.exists

    - name: Verify cert-manager chart directory was extracted
      ansible.builtin.stat:
        path: "{{ karavi_helm_chart_path }}/charts/cert-manager/Chart.yaml"
      register: cert_manager_dir_stat
      when: not cert_manager_disabled

    - name: Fail if cert-manager chart directory extraction failed
      ansible.builtin.fail:
        msg: "{{ ps_cert_manager_extract_fail_msg }}"
      when: not cert_manager_disabled and not cert_manager_dir_stat.stat.exists

    - name: Display cert-manager dependency staged successfully
      ansible.builtin.debug:
        msg: "{{ ps_cert_manager_staged_msg }}"
        verbosity: 2
      when: not cert_manager_disabled and cert_manager_dir_stat.stat.exists

    - name: Display cert-manager dependency skipped
      ansible.builtin.debug:
        msg: "{{ ps_cert_manager_skipped_detail_msg }}"
        verbosity: 2
      when: cert_manager_disabled

  rescue:
    - name: Handle dependency download failure
      ansible.builtin.fail:
        msg: "{{ ps_dependency_fail_msg }}"
