# Deploy Vector-OME Pipeline
# Purpose: Kafka-to-Victoria ingestion pipeline for OME telemetry (metrics + logs)
# Spec Reference: Vector HLD Engineering Spec (ESPEC-VECTOR-2026-001) §4.1.3.6
# Deployment Flow: U1 (Fresh deployment) and U7 (Configuration change)
#
# Gate Logic:
#   - Feature flag: telemetry_bridges.vector_ome.metrics_enabled OR logs_enabled
#   - Requires: kafka_support=true
#   - Metrics path requires: victoria_metrics_support=true
#   - Logs path requires: victoria_logs_support=true
#   - KafkaUser: Dedicated vector-ome-user (NOT shared kafkapump)

# ============================================================================
# Generate OME KafkaTopic manifests (5 topics for OME telemetry)
# ============================================================================
- name: Build OME topic list for Vector-OME bridge
  ansible.builtin.set_fact:
    ome_identifier: "{{ telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome') }}"
    ome_kafka_topics_to_create:
      - name: "{{ telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome') }}.events"
        partitions: 3
        filename: "kafka.topic_{{ (telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome')) | replace('.', '_') }}_events.yaml"
      - name: "{{ telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome') }}.alerts"
        partitions: 2
        filename: "kafka.topic_{{ (telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome')) | replace('.', '_') }}_alerts.yaml"
      - name: "{{ telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome') }}.inventory"
        partitions: 2
        filename: "kafka.topic_{{ (telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome')) | replace('.', '_') }}_inventory.yaml"
      - name: "{{ telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome') }}.logs"
        partitions: 2
        filename: "kafka.topic_{{ (telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome')) | replace('.', '_') }}_logs.yaml"
      - name: "{{ telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome') }}.telemetry"
        partitions: 3
        filename: "kafka.topic_{{ (telemetry_config.telemetry_bridges.vector_ome.ome_identifier | default('ome')) | replace('.', '_') }}_telemetry.yaml"

- name: Generate OME KafkaTopic manifests
  ansible.builtin.template:
    src: 'telemetry/kafka/kafka.topic.yaml.j2'
    dest: "{{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/{{ item.filename }}"
    mode: "{{ hostvars['localhost']['file_permissions_644'] }}"
  loop: "{{ ome_kafka_topics_to_create }}"
  vars:
    topic_name: "{{ item.name }}"
    topic_partitions: "{{ item.partitions }}"
  tags: telemetry_deployment

# ============================================================================
# NOTE: Kubernetes verification and deployment removed from this task
# Rationale: This task runs during provision.yml (template generation phase)
# Actual Kafka cluster and Vector deployment happens later via telemetry.sh
# during cloud-init execution on control plane nodes
# ============================================================================

# ============================================================================
# Render Vector-OME KafkaUser CR
# ============================================================================
- name: Render Vector-OME KafkaUser CR
  ansible.builtin.template:
    src: "telemetry/vector/vector-ome-kafkauser.yaml.j2"
    dest: "{{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/vector/vector-ome-kafkauser.yaml"
    mode: "{{ hostvars['localhost']['file_permissions_644'] }}"
  register: vector_ome_kafkauser_rendered

- name: Display KafkaUser render result
  ansible.builtin.debug:
    msg: "Vector-OME KafkaUser rendered to {{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/vector/vector-ome-kafkauser.yaml"

# ============================================================================
# Render Vector-OME ConfigMap (TOML Configuration)
# ============================================================================
- name: Render Vector-OME ConfigMap
  ansible.builtin.template:
    src: "telemetry/vector/vector-ome-configmap.yaml.j2"
    dest: "{{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/vector/vector-ome-configmap.yaml"
    mode: "{{ hostvars['localhost']['file_permissions_644'] }}"
  register: vector_ome_configmap_rendered

- name: Display ConfigMap render result
  ansible.builtin.debug:
    msg: "Vector-OME ConfigMap rendered to {{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/vector/vector-ome-configmap.yaml"

# ============================================================================
# Render Vector-OME Deployment
# ============================================================================
- name: Render Vector-OME Deployment
  ansible.builtin.template:
    src: "telemetry/vector/vector-ome-deployment.yaml.j2"
    dest: "{{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/vector/vector-ome-deployment.yaml"
    mode: "{{ hostvars['localhost']['file_permissions_644'] }}"
  register: vector_ome_deployment_rendered

- name: Display Deployment render result
  ansible.builtin.debug:
    msg: "Vector-OME Deployment rendered to {{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/vector/vector-ome-deployment.yaml"

# ============================================================================
# Render Vector-OME Service
# ============================================================================
- name: Render Vector-OME Service
  ansible.builtin.template:
    src: "telemetry/vector/vector-ome-service.yaml.j2"
    dest: "{{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/vector/vector-ome-service.yaml"
    mode: "{{ hostvars['localhost']['file_permissions_644'] }}"
  register: vector_ome_service_rendered

- name: Display Service render result
  ansible.builtin.debug:
    msg: "Vector-OME Service rendered to {{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/vector/vector-ome-service.yaml"

# ============================================================================
# Summary: All Vector-OME templates rendered successfully
# ============================================================================
- name: Display Vector-OME template generation summary
  ansible.builtin.debug:
    msg: >
      Vector-OME templates generated successfully.
      KafkaTopic CRs: {{ ome_kafka_topics_to_create | length }} topics.
      ConfigMap: {{ vector_ome_configmap_rendered.dest }}.
      KafkaUser: {{ vector_ome_kafkauser_rendered.dest }}.
      Deployment: {{ vector_ome_deployment_rendered.dest }}.
      Service: {{ vector_ome_service_rendered.dest }}.
      Deployment will occur later via telemetry.sh during cloud-init.
