# Configure PowerScale syslog collection via direct VLAgent LoadBalancer
# Gated by: telemetry_sources.powerscale.logs_enabled
#
# DATA PIPELINE:
#   PowerScale (UDP/TCP:514) → VLAgent LoadBalancer IP:514 → VictoriaLogs
#
# What Omnia does:
#   - Deploys VLAgent with LoadBalancer service (MetalLB assigns external IP)
#   - VLAgent listens on UDP:514 and TCP:514 for syslog messages
#   - Automatically configures PowerScale syslog forwarding via SSH (if CSI credentials available)
#   - Falls back to manual configuration instructions if credentials unavailable
#
# What Omnia does NOT do:
#   - Omnia does NOT configure PowerScale directly if CSI credentials are unavailable
#   - User must manually configure PowerScale to send syslog to VLAgent LoadBalancer IP

- name: Configure PowerScale syslog collection
  when: powerscale_log_enabled | default(false) | bool
  block:
    - name: Validate VictoriaLogs is in collection_targets
      ansible.builtin.assert:
        that:
          - "'victoria_logs' in telemetry_config.telemetry_sources.powerscale.collection_targets | default([])"
        fail_msg: "{{ powerscale_victoria_logs_validation_fail_msg }}"

    - name: Read CSI PowerScale secret for cluster information
      ansible.builtin.slurp:
        src: "{{ hostvars['localhost']['k8s_client_share_path'] }}/csi-driver-powerscale/secret.yaml"
      register: csi_powerscale_secret_content
      ignore_errors: true

    - name: Parse CSI PowerScale secret
      ansible.builtin.set_fact:
        csi_powerscale_secret: "{{ csi_powerscale_secret_content.content | b64decode | from_yaml }}"
      when: csi_powerscale_secret_content.skipped is not defined

    - name: Extract PowerScale clusters
      ansible.builtin.set_fact:
        ps_clusters: "{{ csi_powerscale_secret.isilonClusters | default([]) }}"
      when: csi_powerscale_secret.skipped is not defined

    - name: Set empty ps_clusters if secret not available
      ansible.builtin.set_fact:
        ps_clusters: []
      when: csi_powerscale_secret.skipped is defined
