---

- name: Check kube_vip reachability
  when:
    - kube_vip is defined
    - kube_vip | length > 0
  tags: telemetry_deployment
  block:
    - name: Set kube_vip reachability fact to false initially
      ansible.builtin.set_fact:
        kube_vip_reachable: false

    - name: Test SSH connectivity to kube_vip
      ansible.builtin.wait_for:
        host: "{{ kube_vip }}"
        port: 22
        timeout: 5
        state: started
      register: kube_vip_ssh_check
      ignore_errors: true
      changed_when: false

    - name: Set kube_vip reachable fact if SSH successful
      ansible.builtin.set_fact:
        kube_vip_reachable: true
      when:
        - kube_vip_ssh_check is defined
        - kube_vip_ssh_check.state is defined
        - kube_vip_ssh_check.state == 'started'

    - name: Log kube_vip reachability status
      ansible.builtin.debug:
        msg: |
          kube_vip Reachability Check:
          - Host: {{ kube_vip }}
          - Port: 22
          - Reachable: {{ kube_vip_reachable }}
          - Status: {% if kube_vip_reachable %}✅ REACHABLE{% else %}❌ NOT REACHABLE{% endif %}
      tags: telemetry_deployment
