---

- name: Warning for iDRAC telemetry is currently disabled
  ansible.builtin.pause:
    seconds: "{{ pause_time_15 }}"
    prompt: "{{ warning_idrac_telemetry_support_false }}"
  when: not (telemetry_sources.idrac.metrics_enabled | default(false) | bool)

- name: Warning for iDRAC telemetry is currently enabled
  ansible.builtin.pause:
    seconds: "{{ pause_time_15 }}"
    prompt: "{{ warning_idrac_telemetry_support_true }}"
  when: telemetry_sources.idrac.metrics_enabled | default(false) | bool

- name: Get k8s cluster details
  ansible.builtin.set_fact:
    service_cluster_info: >-
      {{ vars[k8s_cluster_name]
          | selectattr('deployment', 'equalto', true)
          | list
          | first }}
  vars:
    k8s_cluster_name: "service_k8s_cluster"

- name: Set cluster configuration facts
  ansible.builtin.set_fact:
    k8s_nfs_storage_name: "{{ service_cluster_info.nfs_storage_name }}"
    cacheable: true

- name: Load storage_config.yml
  ansible.builtin.include_vars:
    file: "{{ hostvars['localhost']['input_project_dir'] }}/storage_config.yml"
    name: storage_config

- name: Find matching NFS mount
  ansible.builtin.set_fact:
    k8s_nfs_storage_details: "{{ (storage_config.mounts | selectattr('name', 'equalto', k8s_nfs_storage_name) | list | first) | default({}) }}"
    cacheable: true

- name: Parse NFS source to extract server and path
  ansible.builtin.set_fact:
    k8s_nfs_source_parts: "{{ k8s_nfs_storage_details.source.split(':') }}"
  when: k8s_nfs_storage_details.source is defined

- name: Set share_path from service_k8s_cluster mount configuration
  ansible.builtin.set_fact:
    k8s_client_share_path: "{{ k8s_nfs_storage_details.mount_point }}"
    k8s_server_share_path: "{{ k8s_nfs_source_parts[1] if k8s_nfs_source_parts | length > 1 else '' }}"
    k8s_server_ip: "{{ k8s_nfs_source_parts[0] if k8s_nfs_source_parts | length > 0 else '' }}"
    k8s_mount_options: "{{ k8s_nfs_storage_details.mnt_opts }}"
    k8s_nfs_server_path: "{{ k8s_nfs_storage_details.source }}"
    cacheable: true
  when: k8s_nfs_storage_details.source is defined
