---

- name: Warning for iDRAC telemetry is currently disabled
  ansible.builtin.pause:
    seconds: "{{ pause_time_15 }}"
    prompt: "{{ warning_idrac_telemetry_support_false }}"
  when: not (telemetry_sources.idrac.metrics_enabled | default(false) | bool)

- name: Warning for iDRAC telemetry is currently enabled
  ansible.builtin.pause:
    seconds: "{{ pause_time_15 }}"
    prompt: "{{ warning_idrac_telemetry_support_true }}"
  when: telemetry_sources.idrac.metrics_enabled | default(false) | bool

- name: Get k8s cluster details
  ansible.builtin.set_fact:
    service_cluster_info: >-
      {{ vars[k8s_cluster_name]
          | selectattr('deployment', 'equalto', true)
          | list
          | first }}
  vars:
    k8s_cluster_name: "service_k8s_cluster"

- name: Set cluster configuration facts
  ansible.builtin.set_fact:
    k8s_nfs_storage_name: "{{ service_cluster_info.nfs_storage_name }}"
    cacheable: true

- name: Load storage_config.yml
  ansible.builtin.include_vars:
    file: "{{ hostvars['localhost']['input_project_dir'] }}/storage_config.yml"
    name: storage_config

- name: Find matching NFS mount
  ansible.builtin.set_fact:
    k8s_nfs_storage_details: "{{ (storage_config.mounts | selectattr('name', 'equalto', k8s_nfs_storage_name) | list | first) | default({}) }}"
    cacheable: true

- name: Parse NFS source to extract server and path
  ansible.builtin.set_fact:
    k8s_nfs_source_parts: "{{ k8s_nfs_storage_details.source.split(':') }}"
  when: k8s_nfs_storage_details.source is defined

- name: Set share_path from service_k8s_cluster mount configuration
  ansible.builtin.set_fact:
    k8s_client_share_path: "{{ k8s_nfs_storage_details.mount_point }}"
    k8s_server_share_path: "{{ k8s_nfs_source_parts[1] if k8s_nfs_source_parts | length > 1 else '' }}"
    k8s_server_ip: "{{ k8s_nfs_source_parts[0] if k8s_nfs_source_parts | length > 0 else '' }}"
    k8s_mount_options: "{{ k8s_nfs_storage_details.mnt_opts }}"
    k8s_nfs_server_path: "{{ k8s_nfs_storage_details.source }}"
    cacheable: true
  when: k8s_nfs_storage_details.source is defined

- name: Read CSI PowerScale driver values.yaml to detect Volume Health Monitoring
  when: hostvars['localhost']['csi_driver_powerscale_support'] | default(false) | bool
  block:
    - name: Check if CSI PowerScale values file exists
      ansible.builtin.stat:
        path: "{{ service_cluster_info.csi_powerscale_driver_values_file_path }}"
      register: csi_values_file_stat
      when: service_cluster_info.csi_powerscale_driver_values_file_path is defined

    - name: Load CSI PowerScale values.yaml
      ansible.builtin.include_vars:
        file: "{{ service_cluster_info.csi_powerscale_driver_values_file_path }}"
        name: csi_powerscale_values
      when:
        - service_cluster_info.csi_powerscale_driver_values_file_path is defined
        - csi_values_file_stat.stat.exists | default(false)

    - name: Set Volume Health Monitoring status from CSI driver values
      ansible.builtin.set_fact:
        powerscale_volume_health_enabled: >-
          {{ (csi_powerscale_values.node.healthMonitor.enabled | default(false) | bool)
             or (csi_powerscale_values.controller.healthMonitor.enabled | default(false) | bool) }}
        cacheable: true
      when:
        - csi_powerscale_values is defined

    - name: Set Volume Health Monitoring to false if not configured
      ansible.builtin.set_fact:
        powerscale_volume_health_enabled: false
        cacheable: true
      when: powerscale_volume_health_enabled is not defined

    - name: Warn if PowerScale metrics enabled but Volume Health Monitoring is disabled
      when:
        - telemetry_config.telemetry_sources.powerscale.metrics_enabled | default(false) | bool
        - not powerscale_volume_health_enabled | default(false) | bool
      ansible.builtin.debug:
        msg: "{{ warning_powerscale_volume_health_disabled }}"
