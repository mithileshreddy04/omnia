#
# BuildStream API Client -- GitLab CI/CD CleanUp Pipeline
#
# Manual / API-triggered pipeline that hard-deletes a Job's S3 images
# and NFS artifacts via DELETE /api/v1/jobs/{job_id}.
#
# This pipeline:
#   1. Queries the Images API for cleanable image groups (non-CLEANED status)
#   2. Generates a dynamic child pipeline with one manual job per image group
#   3. Triggers the child pipeline via trigger:include:artifact
#   4. The child pipeline presents image groups as clickable buttons;
#      the operator selects one, then clicks the cleanup job to execute
#
# Prerequisites:
#   - BSM_API_URL, BSM_API_CERT, BSM_CLIENT_ID, BSM_CLIENT_SECRET
#     as CI/CD project variables.
# ---------------------------------------------------------------------------

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $PIPELINE_TYPE == "cleanup"'
    - if: '$CI_PIPELINE_SOURCE == "api" && $PIPELINE_TYPE == "cleanup"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

variables:
  BSM_CERT_FILE: "/tmp/bsm_api_ca.crt"
  CURL_CONNECT_TIMEOUT: "15"
  CURL_MAX_TIME: "45"

stages:
  - list_images
  - trigger_cleanup

# ============================= STAGE 1 ====================================
# List Images -- Query cleanable image groups and generate dynamic child
# pipeline with one manual selection button per image group.
# ==========================================================================
list_images:
  stage: list_images
  before_script:
    - apk add --no-cache curl jq coreutils openssl python3
    - |
      if [ -z "${BSM_API_CERT:-}" ]; then
        echo "ERROR: BSM_API_CERT variable is not set -- cannot verify TLS"
        exit 1
      fi
      if [ -f "${BSM_API_CERT}" ]; then
        cp "${BSM_API_CERT}" "${BSM_CERT_FILE}"
      else
        printf '%s\n' "${BSM_API_CERT}" | sed 's/\\n/\n/g' > "${BSM_CERT_FILE}"
      fi
      chmod 600 "${BSM_CERT_FILE}"
      sed -i 's/\r//g' "${BSM_CERT_FILE}"

      if ! grep -q "BEGIN CERTIFICATE" "${BSM_CERT_FILE}" \
           || ! grep -q "END CERTIFICATE" "${BSM_CERT_FILE}"; then
        echo "ERROR: BSM_API_CERT not a valid PEM certificate"
        exit 1
      fi

      if ! openssl x509 -in "${BSM_CERT_FILE}" -noout 2>/dev/null; then
        echo "ERROR: BSM_API_CERT is not a valid X.509 PEM certificate"
        exit 1
      fi
  script:
    - |
      echo "============================================================"
      echo "  CLEANUP PIPELINE: List Cleanable Image Groups"
      echo "============================================================"
      echo ""

      # --- Step 1: Authentication ---
      echo "  Step 1/3: Authentication"
      echo "  ------------------------------------------------------------"

      if [ -z "${BSM_CLIENT_ID:-}" ] || [ -z "${BSM_CLIENT_SECRET:-}" ]; then
        echo "  ERROR: BSM_CLIENT_ID or BSM_CLIENT_SECRET not set"
        echo "  The Build Pipeline must have run at least once to register credentials"
        exit 1
      fi

      echo "  Requesting access token..."
      HTTP_CODE=$(curl -s -o token_response.json -w "%{http_code}" \
        --connect-timeout "${CURL_CONNECT_TIMEOUT}" --max-time "${CURL_MAX_TIME}" \
        -X POST "${BSM_API_URL}/api/v1/auth/token" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "grant_type=client_credentials&client_id=${BSM_CLIENT_ID}&client_secret=${BSM_CLIENT_SECRET}" \
        --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")

      if [ "$HTTP_CODE" != "200" ]; then
        echo "  ERROR: Token request failed (HTTP ${HTTP_CODE})"
        cat token_response.json 2>/dev/null
        exit 1
      fi

      ACCESS_TOKEN=$(jq -r '.access_token' token_response.json)
      echo "  [OK] Access token obtained"
      echo ""

      # --- Step 2: Query Images API for cleanable image groups ---
      echo "  Step 2/3: Query Images API"
      echo "  ------------------------------------------------------------"
      echo "  Endpoint: GET ${BSM_API_URL}/api/v1/images?include_all=true"
      echo ""

      HTTP_CODE=$(curl -s -o images_response.json -w "%{http_code}" \
        --connect-timeout "${CURL_CONNECT_TIMEOUT}" --max-time "${CURL_MAX_TIME}" \
        -X GET "${BSM_API_URL}/api/v1/images?include_all=true" \
        -H "Authorization: Bearer ${ACCESS_TOKEN}" \
        --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")

      echo "  API Response Code: ${HTTP_CODE}"

      if [ "$HTTP_CODE" != "200" ]; then
        echo "  ERROR: Images API query failed (HTTP ${HTTP_CODE})"
        jq '.' images_response.json 2>/dev/null || cat images_response.json
        exit 1
      fi

      CLEANABLE_COUNT=$(jq '[.image_groups[] | select(.status != "CLEANED")] | length' images_response.json 2>/dev/null || echo "0")
      echo "  Found ${CLEANABLE_COUNT} cleanable image group(s)"
      echo ""

      if [ "${CLEANABLE_COUNT}" = "0" ]; then
        echo "  INFO: No cleanable image groups available"
        echo "  All image groups are either already CLEANED or do not exist"
        exit 0
      fi

      echo "  Cleanable Image Groups:"
      echo "  ------------------------------------------------------------"
      jq -r '.image_groups[] | select(.status != "CLEANED") |
        "  - Image Group: " + .image_group_id + "\n" +
        "    Job ID: " + .job_id + "\n" +
        "    Status: " + .status + "\n" +
        "    Created: " + .created_at + "\n" +
        "    Roles: " + ([.images[]?.role] | join(", ")) + "\n"' \
        images_response.json 2>/dev/null || true
      echo ""

      # --- Step 3: Generate Dynamic Child Pipeline ---
      echo "  Step 3/3: Generate Cleanup Child Pipeline"
      echo "  ------------------------------------------------------------"

      export TEMPLATE_FILE="${CI_PROJECT_DIR}/.gitlab-ci-cleanup-child-template.yml"
      if [ ! -f "${TEMPLATE_FILE}" ]; then
        echo "  ERROR: Template file not found: ${TEMPLATE_FILE}"
        echo "  Ensure .gitlab-ci-cleanup-child-template.yml is in the repository root"
        exit 1
      fi

      python3 << 'GENERATE_CHILD_PIPELINE'
      import json
      import sys
      import os

      with open('images_response.json', 'r') as f:
          data = json.JSONDecoder().decode(f.read())

      all_groups = data.get('image_groups', [])
      image_groups = [ig for ig in all_groups if ig.get('status') != 'CLEANED']

      if not image_groups:
          print("INFO: No cleanable image groups")
          sys.exit(0)

      curl_connect_timeout = os.environ.get('CURL_CONNECT_TIMEOUT', '15')
      curl_max_time = os.environ.get('CURL_MAX_TIME', '45')
      template_file = os.environ.get('TEMPLATE_FILE', '')

      lines = []

      # --- Header ---
      lines.append("# Auto-generated Cleanup Child Pipeline")
      lines.append("# Generated by BuildStream Cleanup Pipeline - list_images stage")
      lines.append(f"# Cleanable image groups: {len(image_groups)}")
      lines.append("")

      # --- Variables ---
      lines.append("variables:")
      lines.append('  BSM_CERT_FILE: "/tmp/bsm_api_ca.crt"')
      lines.append(f'  CURL_CONNECT_TIMEOUT: "{curl_connect_timeout}"')
      lines.append(f'  CURL_MAX_TIME: "{curl_max_time}"')
      lines.append("")

      # --- Stages ---
      lines.append("stages:")
      lines.append("  - select_image")
      lines.append("  - cleanup")
      lines.append("  - summary")
      lines.append("")

      # --- Selection jobs (one manual button per cleanable image group) ---
      for ig in image_groups:
          job_id = ig.get('job_id', 'unknown')
          ig_id = ig.get('image_group_id', 'unknown')
          images = ig.get('images', [])
          roles = ', '.join(img.get('role', 'unknown') for img in images)
          created = ig.get('created_at', 'unknown')
          status = ig.get('status', 'unknown')

          safe_id = ig_id.replace('/', '_').replace(' ', '_').replace('-', '_')

          lines.append(f"{ig_id}:")
          lines.append("  stage: select_image")
          lines.append("  when: manual")
          lines.append("  allow_failure: true")
          lines.append("  script: |")
          lines.append(f'    echo "============================================================"')
          lines.append(f'    echo "  IMAGE GROUP SELECTED FOR CLEANUP"')
          lines.append(f'    echo "============================================================"')
          lines.append(f'    echo "  Image Group ID: {ig_id}"')
          lines.append(f'    echo "  Job ID:         {job_id}"')
          lines.append(f'    echo "  Roles:          {roles}"')
          lines.append(f'    echo "  Status:         {status}"')
          lines.append(f'    echo "  Created:        {created}"')
          lines.append(f'    echo "============================================================"')
          lines.append(f'    echo "CLEANUP_JOB_ID={job_id}" > cleanup.env')
          lines.append(f'    echo "IMAGE_GROUP_ID={ig_id}" >> cleanup.env')
          lines.append("  artifacts:")
          lines.append("    reports:")
          lines.append("      dotenv: cleanup.env")
          lines.append("    expire_in: 2 hours")
          lines.append("")

      # --- Append static template (cleanup + summary stages) ---
      with open(template_file, 'r') as f:
          template_content = f.read()

      with open('cleanup_child.yml', 'w') as f:
          f.write('\n'.join(lines) + '\n')
          f.write(template_content)

      print(f"  Generated cleanup_child.yml with {len(image_groups)} selection job(s)")
      print(f"  Template: {template_file}")
      print(f"  Stages: select_image -> cleanup -> summary")
      print("")
      print("  Selection buttons created:")
      print("  " + "-" * 58)
      for ig in image_groups:
          ig_id = ig.get('image_group_id', 'unknown')
          job_id = ig.get('job_id', 'unknown')
          status = ig.get('status', 'unknown')
          print(f"    - {ig_id} (Job: {job_id}, Status: {status})")
      GENERATE_CHILD_PIPELINE

      echo ""
      echo "  [OK] Cleanup child pipeline generated successfully"
      echo ""
      echo "  User Action Required (2 clicks):"
      echo "  ------------------------------------------------------------"
      echo "  1. Click the image group button to clean up (e.g., 'image-build19')"
      echo "  2. After it completes, click the 'cleanup' button to delete"
      echo "  3. Summary stage runs automatically after cleanup"
      echo "  ============================================================"
  artifacts:
    paths:
      - cleanup_child.yml
    expire_in: 2 hours

# ============================= STAGE 2 ====================================
# Trigger Cleanup -- Launch the dynamically generated child pipeline.
# Uses trigger:include:artifact to create a child pipeline from the
# generated YAML artifact.
# ==========================================================================
trigger_cleanup:
  stage: trigger_cleanup
  trigger:
    include:
      - artifact: cleanup_child.yml
        job: list_images
    strategy: depend
