#
# BuildStream API Client -- GitLab CI/CD Deploy Pipeline
#
# Independent pipeline triggered when input/pxe_mapping_file.csv changes,
# via manual trigger, or via API trigger.
#
# This pipeline:
#   1. Queries the Images API for BUILT image groups (list_images stage)
#   2. Generates a dynamic child pipeline with one manual job per image group
#   3. Triggers the child pipeline via trigger:include:artifact
#   4. The child pipeline presents image groups for selection, then executes
#      deploy -> restart -> validate stages sequentially
#
# Prerequisites:
#   - At least one BUILT image group must exist (from a prior Build Pipeline run)
#   - BSM_API_URL, BSM_API_CERT, BSM_CLIENT_ID, BSM_CLIENT_SECRET set as
#     CI/CD project variables
#   - GITLAB_API_TOKEN stored as a masked CI/CD variable (PAT with api scope)
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Workflow rules -- pipeline runs on PXE mapping changes, manual, or API trigger
# ---------------------------------------------------------------------------
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'
    - changes:
        - input/pxe_mapping_file.csv
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $PIPELINE_TYPE == "deploy"'
    - if: '$CI_PIPELINE_SOURCE == "api" && $PIPELINE_TYPE == "deploy"'

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:
  POLL_INTERVAL: "30"
  MAX_POLL_ATTEMPTS: "300"
  BSM_CERT_FILE: "/tmp/bsm_api_ca.crt"
  CURL_CONNECT_TIMEOUT: "15"
  CURL_MAX_TIME: "45"

# ---------------------------------------------------------------------------
# Stages
# ---------------------------------------------------------------------------
stages:
  - list_images
  - trigger_deploy

# ============================= STAGE 1 ====================================
# List Images -- Query BUILT image groups and generate dynamic child pipeline
# ==========================================================================
list_images:
  stage: list_images
  before_script:
    - apk add --no-cache curl jq coreutils openssl python3
    - |
      if [ -z "${BSM_API_CERT:-}" ]; then
        echo "ERROR: BSM_API_CERT variable is not set -- cannot verify TLS"
        exit 1
      fi
      if [ -f "${BSM_API_CERT}" ]; then
        cp "${BSM_API_CERT}" "${BSM_CERT_FILE}"
      else
        printf '%s\n' "${BSM_API_CERT}" | sed 's/\\n/\n/g' > "${BSM_CERT_FILE}"
      fi
      chmod 600 "${BSM_CERT_FILE}"
      sed -i 's/\r//g' "${BSM_CERT_FILE}"

      if ! grep -q "BEGIN CERTIFICATE" "${BSM_CERT_FILE}"; then
        echo "ERROR: BSM_API_CERT missing BEGIN CERTIFICATE marker"
        exit 1
      fi
      if ! grep -q "END CERTIFICATE" "${BSM_CERT_FILE}"; then
        echo "ERROR: BSM_API_CERT missing END CERTIFICATE marker"
        exit 1
      fi
      if ! openssl x509 -in "${BSM_CERT_FILE}" -noout 2>/dev/null; then
        echo "ERROR: BSM_API_CERT is not a valid X.509 PEM certificate"
        exit 1
      fi
  script:
    - |
      echo "============================================================"
      echo "  DEPLOY PIPELINE: List Available Image Groups"
      echo "============================================================"
      echo ""

      # --- Authentication ---
      echo "  Step 1/3: Authentication"
      echo "  ------------------------------------------------------------"

      if [ -z "${BSM_CLIENT_ID:-}" ] || [ -z "${BSM_CLIENT_SECRET:-}" ]; then
        echo "  ERROR: BSM_CLIENT_ID or BSM_CLIENT_SECRET not set"
        echo "  The Build Pipeline must have run at least once to register credentials"
        exit 1
      fi

      CLIENT_ID="${BSM_CLIENT_ID}"
      CLIENT_SECRET="${BSM_CLIENT_SECRET}"

      echo "  Requesting access token..."
      HTTP_CODE=$(curl -s -o token_response.json -w "%{http_code}" \
        --connect-timeout "${CURL_CONNECT_TIMEOUT}" --max-time "${CURL_MAX_TIME}" \
        -X POST "${BSM_API_URL}/api/v1/auth/token" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "grant_type=client_credentials&client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}" \
        --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")

      if [ "$HTTP_CODE" != "200" ]; then
        echo "  ERROR: Token request failed (HTTP ${HTTP_CODE})"
        cat token_response.json 2>/dev/null
        exit 1
      fi

      ACCESS_TOKEN=$(jq -r '.access_token' token_response.json)
      echo "  [OK] Access token obtained"
      echo ""

      # --- Query Images API ---
      echo "  Step 2/3: Query Images API"
      echo "  ------------------------------------------------------------"
      echo "  Endpoint: GET ${BSM_API_URL}/api/v1/images?status=BUILT&limit=50"
      echo ""

      HTTP_CODE=$(curl -s -o images_response.json -w "%{http_code}" \
        --connect-timeout "${CURL_CONNECT_TIMEOUT}" --max-time "${CURL_MAX_TIME}" \
        -X GET "${BSM_API_URL}/api/v1/images?status=BUILT&limit=50" \
        -H "Authorization: Bearer ${ACCESS_TOKEN}" \
        --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")

      echo "  API Response Code: ${HTTP_CODE}"

      if [ "$HTTP_CODE" != "200" ]; then
        echo "  ERROR: Images API query failed (HTTP ${HTTP_CODE})"
        jq '.' images_response.json 2>/dev/null || cat images_response.json
        exit 1
      fi

      IMAGE_GROUP_COUNT=$(jq '.image_groups | length' images_response.json 2>/dev/null || echo "0")
      echo "  Found ${IMAGE_GROUP_COUNT} BUILT image group(s)"
      echo ""

      if [ "${IMAGE_GROUP_COUNT}" = "0" ]; then
        echo "  ERROR: No BUILT image groups available for deployment"
        echo "  Run the Build Pipeline first to build images"
        exit 1
      fi

      # Display available image groups
      echo "  Available Image Groups:"
      echo "  ------------------------------------------------------------"
      jq -r '.image_groups[] |
        "  - Image Group: " + .image_group_id + "\n" +
        "    Job ID: " + .job_id + "\n" +
        "    Status: " + .status + "\n" +
        "    Created: " + .created_at + "\n" +
        "    Roles: " + ([.images[]?.role] | join(", ")) + "\n"' \
        images_response.json 2>/dev/null || true
      echo ""

      # --- Generate Dynamic Child Pipeline ---
      echo "  Step 3/3: Generate Deploy Child Pipeline"
      echo "  ------------------------------------------------------------"

      # The template file (.gitlab-ci-deploy-child-template.yml) contains the
      # static stages (default:before_script, deploy, restart, validate, summary).
      # The Python script generates ONLY the dynamic parts:
      #   - Header (variables, stages)
      #   - Selection jobs (one per BUILT image group)
      #   - Deploy job's needs: block (references all selection jobs)
      # Then appends the static template, producing a complete deploy_child.yml.

      export TEMPLATE_FILE="${CI_PROJECT_DIR}/.gitlab-ci-deploy-child-template.yml"
      if [ ! -f "${TEMPLATE_FILE}" ]; then
        echo "  ERROR: Template file not found: ${TEMPLATE_FILE}"
        echo "  Ensure .gitlab-ci-deploy-child-template.yml is in the repository root"
        exit 1
      fi

      python3 << 'GENERATE_CHILD_PIPELINE'
      import json
      import sys
      import os

      # Read API response
      with open('images_response.json', 'r') as f:
          data = json.JSONDecoder().decode(f.read())

      image_groups = data.get('image_groups', [])
      if not image_groups:
          print("ERROR: No image groups in response")
          sys.exit(1)

      # Read environment variables
      poll_interval = os.environ.get('POLL_INTERVAL', '30')
      max_poll_attempts = os.environ.get('MAX_POLL_ATTEMPTS', '300')
      curl_connect_timeout = os.environ.get('CURL_CONNECT_TIMEOUT', '15')
      curl_max_time = os.environ.get('CURL_MAX_TIME', '45')
      template_file = os.environ.get('TEMPLATE_FILE', '')

      lines = []

      # --- Header ---
      lines.append("# Auto-generated Deploy Child Pipeline")
      lines.append("# Generated by BuildStream Deploy Pipeline - list_images stage")
      lines.append(f"# Image groups available: {len(image_groups)}")
      lines.append("")

      # --- Variables ---
      lines.append("variables:")
      lines.append(f'  POLL_INTERVAL: "{poll_interval}"')
      lines.append(f'  MAX_POLL_ATTEMPTS: "{max_poll_attempts}"')
      lines.append('  BSM_CERT_FILE: "/tmp/bsm_api_ca.crt"')
      lines.append(f'  CURL_CONNECT_TIMEOUT: "{curl_connect_timeout}"')
      lines.append(f'  CURL_MAX_TIME: "{curl_max_time}"')
      lines.append("")

      # --- Stages ---
      lines.append("stages:")
      lines.append("  - select_image")
      lines.append("  - deploy")
      lines.append("  - restart")
      lines.append("  - validate")
      lines.append("  - summary")
      lines.append("")

      # --- Selection jobs (one per image group, manual trigger) ---
      needs_entries = []
      for ig in image_groups:
          job_id = ig.get('job_id', 'unknown')
          ig_id = ig.get('image_group_id', 'unknown')
          images = ig.get('images', [])
          roles = ', '.join(img.get('role', 'unknown') for img in images)
          created = ig.get('created_at', 'unknown')
          status = ig.get('status', 'unknown')

          # Sanitize ig_id for use as a YAML job name (replace special chars)
          safe_id = ig_id.replace('/', '_').replace(' ', '_').replace('-', '_')
          needs_entries.append(f"{ig_id}")

          lines.append(f"{ig_id}:")
          lines.append("  stage: select_image")
          lines.append("  when: manual")
          lines.append("  allow_failure: true")
          lines.append("  script: |")
          lines.append(f'    echo "============================================================"')
          lines.append(f'    echo "  IMAGE GROUP SELECTED"')
          lines.append(f'    echo "============================================================"')
          lines.append(f'    echo "  Image Group ID: {ig_id}"')
          lines.append(f'    echo "  Job ID:         {job_id}"')
          lines.append(f'    echo "  Roles:          {roles}"')
          lines.append(f'    echo "  Status:         {status}"')
          lines.append(f'    echo "  Created:        {created}"')
          lines.append(f'    echo "============================================================"')
          lines.append(f'    echo "JOB_ID={job_id}" > deploy.env')
          lines.append(f'    echo "IMAGE_GROUP_ID={ig_id}" >> deploy.env')
          lines.append("  artifacts:")
          lines.append("    reports:")
          lines.append("      dotenv: deploy.env")
          lines.append("    expire_in: 2 hours")
          lines.append("")

      # --- Read static template ---
      # No needs: injection required. Deploy uses stage ordering (runs after
      # select_image stage). The dotenv artifacts from select_* jobs are
      # available pipeline-wide without explicit needs.
      with open(template_file, 'r') as f:
          template_content = f.read()

      # Combine dynamic header + selection jobs + processed template
      with open('deploy_child.yml', 'w') as f:
          f.write('\n'.join(lines) + '\n')
          f.write(template_content)

      print(f"  Generated deploy_child.yml with {len(image_groups)} selection job(s)")
      print(f"  Template: {template_file}")
      print(f"  Stages: select_image -> deploy -> restart -> validate -> summary")
      print("")
      print("  First 50 lines of generated YAML:")
      print("  " + "-" * 58)
      with open('deploy_child.yml', 'r') as f:
          for i, line in enumerate(f, 1):
              if i > 50:
                  print("  ... (truncated)")
                  break
              print(f"  {line.rstrip()}")
      print("  " + "-" * 58)
      print("")
      print("  Image groups available for selection:")
      for ig in image_groups:
          ig_id = ig.get('image_group_id', 'unknown')
          job_id = ig.get('job_id', 'unknown')
          roles = ', '.join(img.get('role', '') for img in ig.get('images', []))
          print(f"    - {ig_id} (Job: {job_id}, Roles: {roles})")
      GENERATE_CHILD_PIPELINE

      echo ""
      echo "  [OK] Deploy child pipeline generated successfully"
      echo ""
      echo "  User Action Required (2 clicks):"
      echo "  ------------------------------------------------------------"
      echo "  1. Click the image group job you want to deploy (e.g., 'image-build19')"
      echo "  2. After it completes, click the 'deploy' job to start deployment"
      echo "  3. Restart and validate stages will run automatically after deploy"
      echo "  ============================================================"
  artifacts:
    paths:
      - deploy_child.yml
    expire_in: 2 hours

# ============================= STAGE 2 ====================================
# Trigger Deploy -- Launch the dynamically generated child pipeline
# Uses trigger:include:artifact to create a child pipeline from the
# generated YAML artifact
# ==========================================================================
trigger_deploy:
  stage: trigger_deploy
  trigger:
    include:
      - artifact: deploy_child.yml
        job: list_images
    strategy: depend
