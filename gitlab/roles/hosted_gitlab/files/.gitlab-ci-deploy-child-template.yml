# BuildStream Deploy Child Pipeline -- Static Template
#
# This file is a TEMPLATE used by the deploy pipeline's list_images stage.
# The Python generator prepends dynamic selection jobs and a variables/stages
# header, then appends this file's contents to produce deploy_child.yml.
#
# The generated child pipeline is triggered via trigger:include:artifact.
#
# Dynamic content injected by Python generator:
#   - variables: block (POLL_INTERVAL, MAX_POLL_ATTEMPTS, etc.)
#   - stages: block (select_image, deploy, restart, validate, summary)
#   - select_<image_group_id> jobs (one per BUILT image group)
#
# This file provides:
#   - default:before_script with cert setup and auth/API helpers
#   - deploy stage (manual confirm, upload + deploy API + poll)
#   - restart stage (restart API + poll)
#   - validate stage (stub — Molecule integration planned for Sprint 3)
#   - summary stage (always runs, displays final status)
#
# Prerequisites:
#   - JOB_ID and IMAGE_GROUP_ID set via dotenv from a select_* job
#   - BSM_API_URL, BSM_API_CERT, BSM_CLIENT_ID, BSM_CLIENT_SECRET
#     inherited as CI/CD project variables
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Default before_script -- certificate setup + auth/API helper functions
# Applied to all jobs except those that override with before_script: []
# ---------------------------------------------------------------------------
default:
  before_script:
    - apk add --no-cache curl jq coreutils openssl
    - |
      if [ -z "${BSM_API_CERT:-}" ]; then
        echo "ERROR: BSM_API_CERT variable is not set"
        exit 1
      fi
      if [ -f "${BSM_API_CERT}" ]; then
        cp "${BSM_API_CERT}" "${BSM_CERT_FILE}"
      else
        printf '%s\n' "${BSM_API_CERT}" | sed 's/\\n/\n/g' > "${BSM_CERT_FILE}"
      fi
      chmod 600 "${BSM_CERT_FILE}"
      sed -i 's/\r//g' "${BSM_CERT_FILE}"
      if ! grep -q "BEGIN CERTIFICATE" "${BSM_CERT_FILE}"; then
        echo "ERROR: BSM_API_CERT missing BEGIN CERTIFICATE marker"
        exit 1
      fi
      if ! grep -q "END CERTIFICATE" "${BSM_CERT_FILE}"; then
        echo "ERROR: BSM_API_CERT missing END CERTIFICATE marker"
        exit 1
      fi
      if ! openssl x509 -in "${BSM_CERT_FILE}" -noout 2>/dev/null; then
        echo "ERROR: BSM_API_CERT is not a valid X.509 PEM certificate"
        exit 1
      fi

      # Token refresh helper
      refresh_token() {
        if [ -z "${BSM_CLIENT_ID:-}" ] || [ -z "${BSM_CLIENT_SECRET:-}" ]; then
          echo "  [TOKEN] ERROR: BSM_CLIENT_ID or BSM_CLIENT_SECRET not available" >&2
          return 1
        fi
        TOKEN_HTTP_CODE=$(curl -s -o token_refresh_response.json -w "%{http_code}" \
          --connect-timeout "${CURL_CONNECT_TIMEOUT}" --max-time "${CURL_MAX_TIME}" \
          -X POST "${BSM_API_URL}/api/v1/auth/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=client_credentials&client_id=${BSM_CLIENT_ID}&client_secret=${BSM_CLIENT_SECRET}" \
          --retry 2 --retry-delay 1 --cacert "${BSM_CERT_FILE}")
        if [ "$TOKEN_HTTP_CODE" != "200" ]; then
          echo "  [TOKEN] ERROR: Token refresh failed (HTTP ${TOKEN_HTTP_CODE})" >&2
          return 1
        fi
        ACCESS_TOKEN=$(jq -r '.access_token' token_refresh_response.json)
        if [ -z "${ACCESS_TOKEN}" ] || [ "${ACCESS_TOKEN}" = "null" ]; then
          echo "  [TOKEN] ERROR: No access_token in response" >&2
          return 1
        fi
        export ACCESS_TOKEN
        echo "${ACCESS_TOKEN}" > /tmp/bsm_access_token
        return 0
      }

      # API call wrapper with auto token refresh
      api_call_with_retry() {
        _RETRY_OUTPUT_FILE="$1"
        shift
        _RETRY_HTTP_CODE=$(curl -s -o "${_RETRY_OUTPUT_FILE}" -w "%{http_code}" \
          --connect-timeout "${CURL_CONNECT_TIMEOUT}" --max-time "${CURL_MAX_TIME}" \
          -H "Authorization: Bearer ${ACCESS_TOKEN}" "$@") || {
          _CURL_EXIT=$?
          case "$_CURL_EXIT" in
            7) echo "  ERROR: Connection refused" >&2 ;;
            28) echo "  ERROR: Request timeout" >&2 ;;
            6) echo "  ERROR: DNS resolution failed" >&2 ;;
            60) echo "  ERROR: SSL certificate validation failed" >&2 ;;
            *) echo "  ERROR: Curl failed with exit code ${_CURL_EXIT}" >&2 ;;
          esac
          echo "000"
          return
        }
        if [ "$_RETRY_HTTP_CODE" = "401" ]; then
          _RETRY_ERROR=$(jq -r '.detail.error // .error // ""' "${_RETRY_OUTPUT_FILE}" 2>/dev/null || echo "")
          case "${_RETRY_ERROR}" in
            token_expired|invalid_token|missing_token)
              if refresh_token; then
                _RETRY_HTTP_CODE=$(curl -s -o "${_RETRY_OUTPUT_FILE}" -w "%{http_code}" \
                  --connect-timeout "${CURL_CONNECT_TIMEOUT}" --max-time "${CURL_MAX_TIME}" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" "$@")
              fi
              ;;
          esac
        fi
        echo "${_RETRY_HTTP_CODE}"
      }

      # Refresh input files from latest commit (retry support)
      # Copied from build pipeline (.gitlab-ci-build.yml) - proven to work
      refresh_input_files() {
        if [ -z "${GITLAB_API_TOKEN:-}" ]; then
          echo "  [REFRESH] GITLAB_API_TOKEN not set -- skipping file refresh" >&2
          return 0
        fi

        echo "  [REFRESH] Fetching latest config files from branch ${CI_COMMIT_REF_NAME}..."

        _REFRESH_COUNT=0
        _REFRESH_FAILED=0
        for _RF_FNAME in local_repo_config.yml network_spec.yml provision_config.yml \
               pxe_mapping_file.csv storage_config.yml telemetry_config.yml \
               security_config.yml high_availability_config.yml omnia_config.yml \
               build_stream_config.yml; do

          # URL-encode the file path (input/<filename>)
          _RF_ENCODED_PATH=$(printf '%s' "input/${_RF_FNAME}" | sed 's|/|%2F|g')

          _RF_HTTP_CODE=$(curl -s -o "/tmp/_rf_${_RF_FNAME}" -w "%{http_code}" \
            --connect-timeout "${CURL_CONNECT_TIMEOUT}" --max-time "${CURL_MAX_TIME}" \
            -H "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/files/${_RF_ENCODED_PATH}/raw?ref=${CI_COMMIT_REF_NAME}" \
            --cacert "${CI_SERVER_TLS_CA_FILE}" 2>/dev/null)

          if [ "$_RF_HTTP_CODE" = "200" ]; then
            mkdir -p "${CI_PROJECT_DIR}/input"
            cp "/tmp/_rf_${_RF_FNAME}" "${CI_PROJECT_DIR}/input/${_RF_FNAME}"
            _REFRESH_COUNT=$((_REFRESH_COUNT + 1))
          else
            # File may not exist in repo (optional config), not an error
            _REFRESH_FAILED=$((_REFRESH_FAILED + 1))
          fi
          rm -f "/tmp/_rf_${_RF_FNAME}"
        done

        echo "  [REFRESH] Updated ${_REFRESH_COUNT} files from latest commit (${_REFRESH_FAILED} not found/skipped)"
      }

# ---------------------------------------------------------------------------
# Deploy stage -- upload config files, call deploy API, poll for completion
# Manual trigger: user clicks deploy after selecting an image group
# The dotenv artifact from the selected image group provides JOB_ID and
# IMAGE_GROUP_ID variables.
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  when: manual
  allow_failure: false
  script:
    - |
      echo "============================================================"
      echo "  DEPLOY STAGE"
      echo "============================================================"
      echo ""

      # Option to skip deploy stage (e.g., when reusing an existing job/image group)
      # Accept either skip_deploy or SKIP_DEPLOY as true
      if [ "${skip_deploy:-false}" = "true" ] || [ "${SKIP_DEPLOY:-false}" = "true" ]; then
        echo "  ⚠️  SKIP_DEPLOY detected - deploy stage will be skipped."
        echo ""
        echo "  IMPORTANT: To skip deploy, the following must be provided:"
        echo "    - JOB_ID (existing job to operate on)"
        echo "    - IMAGE_GROUP_ID (image group associated to the job)"
        echo ""
        # Validate required variables
        if [ -z "${JOB_ID:-}" ] || [ -z "${IMAGE_GROUP_ID:-}" ]; then
          echo "  ERROR: JOB_ID or IMAGE_GROUP_ID is not set."
          echo "  Provide these via CI/CD variables or the upstream select_* job, then retry."
          exit 1
        fi

        # Save variables for downstream stages using dotenv artifact
        echo "JOB_ID=${JOB_ID}" > deploy.env
        echo "IMAGE_GROUP_ID=${IMAGE_GROUP_ID}" >> deploy.env
        echo "  Variables saved to deploy.env for downstream stages (restart/validate)."
        echo ""
        echo "  NOTE: Restart stage requires image_groups.status to be DEPLOYED."
        echo "  If needed, run this on the OIM host to set status to DEPLOYED:"
        echo "    podman exec omnia_postgres psql -U admin -d build_stream_db -c \\"
        echo "    \"UPDATE image_groups SET status = 'DEPLOYED', updated_at = NOW() WHERE id = '${IMAGE_GROUP_ID}' AND job_id = '${JOB_ID}';\""
        echo ""
        echo "  Skipping further deploy actions."
        exit 0
      fi

      # Guard check: Ensure JOB_ID and IMAGE_GROUP_ID are available
      if [ -z "${JOB_ID:-}" ] || [ -z "${IMAGE_GROUP_ID:-}" ]; then
        echo "  ERROR: JOB_ID or IMAGE_GROUP_ID is not set."
        echo "  Please click one of the select_* jobs first, then re-run this job."
        echo "  These variables should be inherited from the select_* job via dotenv artifact."
        exit 1
      fi

      echo "  Job ID:         ${JOB_ID}"
      echo "  Image Group ID: ${IMAGE_GROUP_ID}"
      echo ""

      # Authenticate
      refresh_token

      # Step 1: Implicit Upload -- sync ALL whitelisted config files to NFS
      echo "  Step 1/3: Upload configuration files..."
      echo "  ------------------------------------------------------------"
      refresh_input_files

      UPLOAD_ARGS=""
      for FNAME in local_repo_config.yml network_spec.yml provision_config.yml pxe_mapping_file.csv \
             storage_config.yml telemetry_config.yml security_config.yml \
             high_availability_config.yml omnia_config.yml build_stream_config.yml; do
        FPATH="${CI_PROJECT_DIR}/input/${FNAME}"
        if [ -f "${FPATH}" ]; then
          UPLOAD_ARGS="${UPLOAD_ARGS} -F files=@${FPATH}"
          echo "    [+] ${FNAME}"
        else
          echo "    [-] ${FNAME} (not found, skipping)"
        fi
      done

      if [ -n "${UPLOAD_ARGS}" ]; then
        HTTP_CODE=$(eval api_call_with_retry upload_response.json \
          -X PUT "${BSM_API_URL}/api/v1/jobs/${JOB_ID}/upload" \
          ${UPLOAD_ARGS} \
          --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")
        [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

        if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
          echo "  ERROR: Upload failed (HTTP ${HTTP_CODE})"
          jq "." upload_response.json 2>/dev/null || cat upload_response.json
          exit 1
        fi
        echo "  [OK] Configuration files uploaded"
        jq '.upload_summary' upload_response.json 2>/dev/null || true
      else
        echo "  [SKIP] No configuration files found to upload"
      fi
      echo ""

      # Step 2: Call Deploy API
      echo "  Step 2/3: Trigger deployment..."
      echo "  ------------------------------------------------------------"
      echo "  Endpoint: POST ${BSM_API_URL}/api/v1/jobs/${JOB_ID}/stages/deploy"
      echo ""

      HTTP_CODE=$(api_call_with_retry deploy_response.json \
        -X POST "${BSM_API_URL}/api/v1/jobs/${JOB_ID}/stages/deploy" \
        -H "Content-Type: application/json" \
        -d "{\"image_group_id\": \"${IMAGE_GROUP_ID}\"}" \
        --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")
      [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

      echo "  API Response Code: ${HTTP_CODE}"

      if [ "$HTTP_CODE" != "202" ] && [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
        echo "  ERROR: Deploy request failed"
        jq "." deploy_response.json 2>/dev/null || cat deploy_response.json
        exit 1
      fi

      jq "." deploy_response.json 2>/dev/null || cat deploy_response.json
      echo ""
      echo "  [OK] Deploy request accepted"
      echo ""

      # Step 3: Poll for deploy completion
      echo "  Step 3/3: Waiting for deployment to complete..."
      echo "  ------------------------------------------------------------"
      echo "  Polling interval: ${POLL_INTERVAL}s"
      echo "  Max attempts: ${MAX_POLL_ATTEMPTS}"
      echo ""

      STAGE_COMPLETED=false
      ATTEMPT=1

      while [ "$ATTEMPT" -le "$MAX_POLL_ATTEMPTS" ]; do
        HTTP_CODE=$(api_call_with_retry status_response.json \
          -X GET "${BSM_API_URL}/api/v1/jobs/${JOB_ID}" \
          --cacert "${BSM_CERT_FILE}")
        [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

        if [ "$HTTP_CODE" != "200" ]; then
          echo "  [Poll ${ATTEMPT}/${MAX_POLL_ATTEMPTS}] HTTP ${HTTP_CODE} - retrying..."
          ATTEMPT=$((ATTEMPT + 1))
          sleep "${POLL_INTERVAL}"
          continue
        fi

        DEPLOY_STATE=$(jq -r '.stages[]? | select(.stage_name == "deploy") | .stage_state' status_response.json 2>/dev/null || echo "UNKNOWN")
        JOB_STATE=$(jq -r '.job_state // "UNKNOWN"' status_response.json)

        echo "  [Poll ${ATTEMPT}/${MAX_POLL_ATTEMPTS}] Job: ${JOB_STATE} | Deploy: ${DEPLOY_STATE}"

        case "${DEPLOY_STATE}" in
          COMPLETED|SUCCEEDED)
            STAGE_COMPLETED=true
            echo ""
            echo "  [OK] Deployment completed successfully"
            break
            ;;
          FAILED|CANCELLED)
            echo ""
            echo "  ERROR: Deploy stage reached ${DEPLOY_STATE}"
            DEPLOY_ERR_CODE=$(jq -r '.stages[]? | select(.stage_name == "deploy") | .error_code // "N/A"' status_response.json 2>/dev/null)
            DEPLOY_ERR_SUMMARY=$(jq -r '.stages[]? | select(.stage_name == "deploy") | .error_summary // "N/A"' status_response.json 2>/dev/null)
            DEPLOY_LOG_PATH=$(jq -r '.stages[]? | select(.stage_name == "deploy") | .log_file_path // "N/A"' status_response.json 2>/dev/null)
            echo "  ------------------------------------------------------------"
            printf "  %-22s %s\n" "Error Code:"    "${DEPLOY_ERR_CODE}"
            printf "  %-22s %s\n" "Error Summary:" "${DEPLOY_ERR_SUMMARY}"
            printf "  %-22s %s\n" "Log File Path:" "${DEPLOY_LOG_PATH}"
            echo "  ------------------------------------------------------------"
            exit 1
            ;;
        esac


        ATTEMPT=$((ATTEMPT + 1))
        sleep "${POLL_INTERVAL}"
      done

      if [ "$STAGE_COMPLETED" = "false" ]; then
        echo "  ERROR: Deploy polling timed out after ${MAX_POLL_ATTEMPTS} attempts"
        exit 1
      fi

      echo ""
      echo "  ============================================================"
      echo "  Deploy Stage Result:"
      echo "  ============================================================"
      DEPLOY_RESULT=$(jq -r \
        '(first(.stages[]? | select(.stage_name == "deploy") | .stage_state)) // "COMPLETED"' \
        status_response.json 2>/dev/null || echo "COMPLETED")
      JOB_STATE_DEPLOY=$(jq -r '.job_state // "UNKNOWN"' status_response.json)
      printf "  %-22s %s\n" "Job ID:"         "${JOB_ID}"
      printf "  %-22s %s\n" "Image Group ID:" "${IMAGE_GROUP_ID}"
      printf "  %-22s %s\n" "Deploy State:"   "${DEPLOY_RESULT}"
      printf "  %-22s %s\n" "Job State:"      "${JOB_STATE_DEPLOY}"
      echo "  ============================================================"

      # Save variables for downstream stages using dotenv artifact
      echo "JOB_ID=${JOB_ID}" > deploy.env
      echo "IMAGE_GROUP_ID=${IMAGE_GROUP_ID}" >> deploy.env
      echo "  Variables saved to deploy.env for downstream stages"

  artifacts:
    reports:
      dotenv: deploy.env
      junit: test-results.xml
    paths:
      - status_response.json

# ---------------------------------------------------------------------------
# Restart stage -- call restart API, poll for completion
# Runs automatically after deploy completes
# Can be skipped for VM deployments by setting SKIP_RESTART=true
# ---------------------------------------------------------------------------
restart:
  stage: restart
  needs:
    - job: deploy
      artifacts: true
  script:
    - |
      echo "============================================================"
      echo "  RESTART STAGE"
      echo "============================================================"
      echo ""
      echo "  Job ID:         ${JOB_ID}"
      echo "  Image Group ID: ${IMAGE_GROUP_ID}"
      echo ""

      # Check if restart should be skipped (for VM deployments)
      if [ "${SKIP_RESTART:-false}" = "true" ]; then
        echo "  ⚠️  SKIP_RESTART=true detected (VM deployment mode)"
        echo "  Restart stage will be skipped."
        echo ""
        echo "  IMPORTANT: You must manually mark the restart stage as COMPLETED"
        echo ""

        # Save variables for downstream stages using dotenv artifact
        if [ -n "${JOB_ID:-}" ] && [ -n "${IMAGE_GROUP_ID:-}" ]; then
          echo "JOB_ID=${JOB_ID}" > restart.env
          echo "IMAGE_GROUP_ID=${IMAGE_GROUP_ID}" >> restart.env
          echo "  Variables saved to restart.env for downstream stages."
        else
          echo "  ERROR: JOB_ID and IMAGE_GROUP_ID must be set for downstream stages."
          exit 1
        fi

        exit 0
      fi
      echo ""

      # Guard check: Ensure JOB_ID is available
      if [ -z "${JOB_ID:-}" ]; then
        echo "  ERROR: JOB_ID is not set. Cannot restart job."
        echo "  This variable should be inherited from the deploy stage via dotenv artifact."
        exit 1
      fi

      if [ -z "${IMAGE_GROUP_ID:-}" ]; then
        echo "  ERROR: IMAGE_GROUP_ID is not set. Cannot restart job."
        echo "  This variable should be inherited from the deploy stage via dotenv artifact."
        exit 1
      fi

      # Authenticate
      refresh_token

      # Step 0/3: Common Init -- Upload ALL whitelisted config files (retry support)
      echo "  Step 0/3: Common Init -- Upload configuration files..."
      echo "  ------------------------------------------------------------"

      refresh_input_files

      UPLOAD_ARGS=""
      for FNAME in local_repo_config.yml network_spec.yml provision_config.yml pxe_mapping_file.csv \
             storage_config.yml telemetry_config.yml security_config.yml \
             high_availability_config.yml omnia_config.yml build_stream_config.yml; do
        FPATH="${CI_PROJECT_DIR}/input/${FNAME}"
        if [ -f "${FPATH}" ]; then
          UPLOAD_ARGS="${UPLOAD_ARGS} -F files=@${FPATH}"
          echo "    [+] ${FNAME}"
        else
          echo "    [-] ${FNAME} (not found, skipping)"
        fi
      done

      if [ -n "${UPLOAD_ARGS}" ]; then
        HTTP_CODE=$(eval api_call_with_retry upload_init_response.json \
          -X PUT "${BSM_API_URL}/api/v1/jobs/${JOB_ID}/upload" \
          ${UPLOAD_ARGS} \
          --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")
        [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

        if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
          echo "  [WARN] Config upload returned HTTP ${HTTP_CODE}, continuing anyway"
        else
          echo "  [OK] Configuration files uploaded"
        fi
      else
        echo "  [SKIP] No configuration files found to upload"
      fi
      echo ""

      # Step 1/3: Upload failed_nodes.json from GitLab to OIM (if exists)
      echo "  Step 1/3: Upload failed_nodes.json to OIM for retry logic..."
      echo "  ------------------------------------------------------------"

      # Fetch latest failed_nodes.json from main branch using GitLab API (user may have edited it)
      echo "  [*] Fetching latest failed_nodes.json from main branch via API..."
      GITLAB_API_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/files/miscellaneous%2Ffailed_nodes.json/raw?ref=main"

      mkdir -p "${CI_PROJECT_DIR}/miscellaneous"

      curl -f -s -H "PRIVATE-TOKEN: ${GITLAB_ROOT_TOKEN}" \
        "${GITLAB_API_URL}" \
        -o "${CI_PROJECT_DIR}/miscellaneous/failed_nodes.json" 2>/dev/null || \
        echo "  [-] No failed_nodes.json in main branch (expected for first run)"

      if [ -f "${CI_PROJECT_DIR}/miscellaneous/failed_nodes.json" ]; then
        echo "  [+] failed_nodes.json found in GitLab repository"

        HTTP_CODE=$(api_call_with_retry upload_failed_response.json \
          -X PUT "${BSM_API_URL}/api/v1/jobs/${JOB_ID}/upload" \
          -F "files=@${CI_PROJECT_DIR}/miscellaneous/failed_nodes.json" \
          --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")
        [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

        if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
          echo "  [OK] failed_nodes.json uploaded to OIM for retry logic"
        else
          echo "  [WARN] Failed to upload failed_nodes.json (HTTP ${HTTP_CODE}), continuing anyway"
        fi
      else
        echo "  [-] No failed_nodes.json in repository (expected for first run)"
      fi
      echo ""

      # Step 2: Call Restart API
      echo "  Step 2/3: Trigger PXE boot restart..."
      echo "  ------------------------------------------------------------"
      echo "  Endpoint: POST ${BSM_API_URL}/api/v1/jobs/${JOB_ID}/stages/restart"
      echo ""

      HTTP_CODE=$(api_call_with_retry restart_response.json \
        -X POST "${BSM_API_URL}/api/v1/jobs/${JOB_ID}/stages/restart" \
        -H "Content-Type: application/json" \
        -d "{\"disable_pxe_boot\": false}" \
        --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")
      [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

      echo "  API Response Code: ${HTTP_CODE}"

      if [ "$HTTP_CODE" != "202" ] && [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
        echo "  ERROR: Restart request failed"
        jq "." restart_response.json 2>/dev/null || cat restart_response.json
        exit 1
      fi

      jq "." restart_response.json 2>/dev/null || cat restart_response.json
      echo ""
      echo "  [OK] Restart request accepted"
      echo ""

      # Step 3: Poll for restart completion
      echo "  Step 3/3: Waiting for restart to complete..."
      echo "  ------------------------------------------------------------"

      STAGE_COMPLETED=false
      ATTEMPT=1

      while [ "$ATTEMPT" -le "$MAX_POLL_ATTEMPTS" ]; do
        HTTP_CODE=$(api_call_with_retry status_response.json \
          -X GET "${BSM_API_URL}/api/v1/jobs/${JOB_ID}" \
          --cacert "${BSM_CERT_FILE}")
        [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

        if [ "$HTTP_CODE" != "200" ]; then
          echo "  [Poll ${ATTEMPT}/${MAX_POLL_ATTEMPTS}] HTTP ${HTTP_CODE} - retrying..."
          ATTEMPT=$((ATTEMPT + 1))
          sleep "${POLL_INTERVAL}"
          continue
        fi

        RESTART_STATE=$(jq -r '.stages[]? | select(.stage_name == "restart") | .stage_state' status_response.json 2>/dev/null || echo "UNKNOWN")
        JOB_STATE=$(jq -r '.job_state // "UNKNOWN"' status_response.json)

        echo "  [Poll ${ATTEMPT}/${MAX_POLL_ATTEMPTS}] Job: ${JOB_STATE} | Restart: ${RESTART_STATE}"

        case "${RESTART_STATE}" in
          COMPLETED|SUCCEEDED)
            STAGE_COMPLETED=true
            echo ""
            echo "  [OK] Restart completed successfully"
            break
            ;;
          FAILED|CANCELLED)
            echo ""
            echo "  ERROR: Restart stage reached ${RESTART_STATE}"
            RESTART_ERR_CODE=$(jq -r '.stages[]? | select(.stage_name == "restart") | .error_code // "N/A"' status_response.json 2>/dev/null)
            RESTART_ERR_SUMMARY=$(jq -r '.stages[]? | select(.stage_name == "restart") | .error_summary // "N/A"' status_response.json 2>/dev/null)
            RESTART_LOG_PATH=$(jq -r '.stages[]? | select(.stage_name == "restart") | .log_file_path // "N/A"' status_response.json 2>/dev/null)
            echo "  ------------------------------------------------------------"
            printf "  %-22s %s\n" "Error Code:"    "${RESTART_ERR_CODE}"
            printf "  %-22s %s\n" "Error Summary:" "${RESTART_ERR_SUMMARY}"
            printf "  %-22s %s\n" "Log File Path:" "${RESTART_LOG_PATH}"
            echo "  ------------------------------------------------------------"
            exit 1
            ;;
        esac


        ATTEMPT=$((ATTEMPT + 1))
        sleep "${POLL_INTERVAL}"
      done

      if [ "$STAGE_COMPLETED" = "false" ]; then
        echo "  ERROR: Restart polling timed out after ${MAX_POLL_ATTEMPTS} attempts"
        exit 1
      fi

      echo ""
      echo "  ============================================================"
      echo "  Restart Stage Result:"
      echo "  ============================================================"
      RESTART_RESULT=$(jq -r \
        '(first(.stages[]? | select(.stage_name == "restart") | .stage_state)) // "COMPLETED"' \
        status_response.json 2>/dev/null || echo "COMPLETED")
      JOB_STATE_RESTART=$(jq -r '.job_state // "UNKNOWN"' status_response.json)
      printf "  %-22s %s\n" "Job ID:"         "${JOB_ID}"
      printf "  %-22s %s\n" "Image Group ID:" "${IMAGE_GROUP_ID}"
      printf "  %-22s %s\n" "Restart State:"  "${RESTART_RESULT}"
      printf "  %-22s %s\n" "Job State:"      "${JOB_STATE_RESTART}"
      echo "  ============================================================"

      # Save variables for downstream stages using dotenv artifact
      echo "JOB_ID=${JOB_ID}" > restart.env
      echo "IMAGE_GROUP_ID=${IMAGE_GROUP_ID}" >> restart.env
      echo "  Variables saved to restart.env for downstream stages"

  artifacts:
    reports:
      dotenv: restart.env
    paths:
      - status_response.json

# ---------------------------------------------------------------------------
# Validate stage -- Trigger Molecule test automation and poll for completion
# Runs automatically after restart completes
# If SKIP_RESTART=true, waits 30s then verifies restart is COMPLETED before proceeding
# ---------------------------------------------------------------------------
validate:
  stage: validate
  needs:
    - job: restart
      artifacts: true
  script:
    - |
      echo "============================================================"
      echo "  VALIDATE STAGE"
      echo "============================================================"
      echo ""
      echo "  Job ID:         ${JOB_ID}"
      echo "  Image Group ID: ${IMAGE_GROUP_ID}"
      echo ""

      # Guard check: Ensure JOB_ID is available
      if [ -z "${JOB_ID:-}" ]; then
        echo "  ERROR: JOB_ID is not set. Cannot validate job."
        exit 1
      fi

      # Authenticate
      refresh_token

      # Common Init -- Upload ALL whitelisted config files (retry support)
      echo "  Common Init -- Upload configuration files..."
      echo "  ------------------------------------------------------------"
      refresh_input_files

      UPLOAD_ARGS=""
      for FNAME in local_repo_config.yml network_spec.yml provision_config.yml pxe_mapping_file.csv \
             storage_config.yml telemetry_config.yml security_config.yml \
             high_availability_config.yml omnia_config.yml build_stream_config.yml; do
        FPATH="${CI_PROJECT_DIR}/input/${FNAME}"
        if [ -f "${FPATH}" ]; then
          UPLOAD_ARGS="${UPLOAD_ARGS} -F files=@${FPATH}"
          echo "    [+] ${FNAME}"
        else
          echo "    [-] ${FNAME} (not found, skipping)"
        fi
      done

      if [ -n "${UPLOAD_ARGS}" ]; then
        HTTP_CODE=$(eval api_call_with_retry upload_init_response.json \
          -X PUT "${BSM_API_URL}/api/v1/jobs/${JOB_ID}/upload" \
          ${UPLOAD_ARGS} \
          --retry 3 --retry-delay 2 --cacert "${BSM_CERT_FILE}")
        [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

        if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
          echo "  [WARN] Config upload returned HTTP ${HTTP_CODE}, continuing anyway"
        else
          echo "  [OK] Configuration files uploaded"
        fi
      else
        echo "  [SKIP] No configuration files found to upload"
      fi
      echo ""

      # Trigger validate stage via API
      echo "  [1/3] Triggering validate stage..."
      VALIDATE_PAYLOAD=$(cat <<EOF
      {
        "scenario_names": ["discovery"],
        "test_suite": "build_stream",
        "timeout_minutes": 120
      }
      EOF
      )

      # Ensure access token is fresh before triggering validate
      refresh_token

      VALIDATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
        --cacert "${BSM_CERT_FILE}" \
        -H "Authorization: Bearer ${ACCESS_TOKEN}" \
        -H "Content-Type: application/json" \
        -X POST \
        -d "${VALIDATE_PAYLOAD}" \
        "${BSM_API_URL}/api/v1/jobs/${JOB_ID}/stages/validate")

      VALIDATE_HTTP_CODE=$(echo "${VALIDATE_RESPONSE}" | tail -n1)
      VALIDATE_BODY=$(echo "${VALIDATE_RESPONSE}" | sed '$d')

      if [ "${VALIDATE_HTTP_CODE}" != "202" ]; then
        echo "  ERROR: Failed to trigger validate stage (HTTP ${VALIDATE_HTTP_CODE})"
        echo "${VALIDATE_BODY}" | jq '.' 2>/dev/null || echo "${VALIDATE_BODY}"
        exit 1
      fi

      VALIDATE_ATTEMPT=$(echo "${VALIDATE_BODY}" | jq -r '.attempt // "1"')
      VALIDATE_CORRELATION_ID=$(echo "${VALIDATE_BODY}" | jq -r '.correlation_id // "N/A"')
      echo "  [OK] Validate stage triggered (attempt ${VALIDATE_ATTEMPT})"
      echo "       Correlation ID: ${VALIDATE_CORRELATION_ID}"
      echo ""

      # Poll for validate stage completion
      echo "  [2/3] Polling for validate stage completion..."
      echo "       Poll interval: ${POLL_INTERVAL}s"
      echo "       Max attempts:  ${MAX_POLL_ATTEMPTS}"
      echo ""

      ATTEMPT=1
      STAGE_COMPLETED=false

      while [ ${ATTEMPT} -le ${MAX_POLL_ATTEMPTS} ]; do
        HTTP_CODE=$(api_call_with_retry status_response.json \
          -X GET "${BSM_API_URL}/api/v1/jobs/${JOB_ID}" \
          --cacert "${BSM_CERT_FILE}")
        [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

        JOB_STATE=$(jq -r '.job_state // "UNKNOWN"' status_response.json)
        VALIDATE_STATE=$(jq -r '.stages[]? | select(.stage_name == "validate") | .stage_state // "UNKNOWN"' status_response.json)

        echo "  [Poll ${ATTEMPT}/${MAX_POLL_ATTEMPTS}] Job: ${JOB_STATE} | Validate: ${VALIDATE_STATE}"

        case "${VALIDATE_STATE}" in
          COMPLETED|SUCCEEDED)
            STAGE_COMPLETED=true
            echo ""
            echo "  [OK] Validate completed successfully"
            break
            ;;
          FAILED|CANCELLED)
            echo ""
            echo "  ERROR: Validate stage reached ${VALIDATE_STATE}"
            VALIDATE_ERR_CODE=$(jq -r '.stages[]? | select(.stage_name == "validate") | .error_code // "N/A"' status_response.json 2>/dev/null)
            VALIDATE_ERR_SUMMARY=$(jq -r '.stages[]? | select(.stage_name == "validate") | .error_summary // "N/A"' status_response.json 2>/dev/null)
            VALIDATE_LOG_PATH=$(jq -r '.stages[]? | select(.stage_name == "validate") | .log_file_path // "N/A"' status_response.json 2>/dev/null)
            echo "  ------------------------------------------------------------"
            printf "  %-22s %s\n" "Error Code:"    "${VALIDATE_ERR_CODE}"
            printf "  %-22s %s\n" "Error Summary:" "${VALIDATE_ERR_SUMMARY}"
            printf "  %-22s %s\n" "Log File Path:" "${VALIDATE_LOG_PATH}"
            echo "  ------------------------------------------------------------"

            # Extract test summary from result_detail if available
            TEST_SUMMARY=$(jq -r '.stages[]? | select(.stage_name == "validate") | .result_detail.test_summary // empty' status_response.json 2>/dev/null)
            if [ -n "${TEST_SUMMARY}" ]; then
              echo "  Test Summary:"
              echo "${TEST_SUMMARY}" | jq '.'
              echo "  ------------------------------------------------------------"
            fi
            exit 1
            ;;
        esac

        ATTEMPT=$((ATTEMPT + 1))
        sleep "${POLL_INTERVAL}"
      done

      if [ "$STAGE_COMPLETED" = "false" ]; then
        echo "  ERROR: Validate polling timed out after ${MAX_POLL_ATTEMPTS} attempts"
        exit 1
      fi

      # Display final results
      echo ""
      echo "  [3/3] Extracting test results..."
      echo ""
      echo "  ============================================================"
      echo "  Validate Stage Result:"
      echo "  ============================================================"
      VALIDATE_RESULT=$(jq -r \
        '(first(.stages[]? | select(.stage_name == "validate") | .stage_state)) // "COMPLETED"' \
        status_response.json 2>/dev/null || echo "COMPLETED")
      JOB_STATE_VALIDATE=$(jq -r '.job_state // "UNKNOWN"' status_response.json)

      printf "  %-22s %s\n" "Job ID:"         "${JOB_ID}"
      printf "  %-22s %s\n" "Image Group ID:" "${IMAGE_GROUP_ID}"
      printf "  %-22s %s\n" "Validate State:" "${VALIDATE_RESULT}"
      printf "  %-22s %s\n" "Job State:"      "${JOB_STATE_VALIDATE}"

      # Extract and display test summary
      TEST_SUMMARY=$(jq -r '.stages[]? | select(.stage_name == "validate") | .result_detail.test_summary // empty' status_response.json 2>/dev/null)
      if [ -n "${TEST_SUMMARY}" ]; then
        echo "  ------------------------------------------------------------"
        echo "  Test Summary:"
        TOTAL=$(echo "${TEST_SUMMARY}" | jq -r '.total // 0')
        PASSED=$(echo "${TEST_SUMMARY}" | jq -r '.passed // 0')
        FAILED=$(echo "${TEST_SUMMARY}" | jq -r '.failed // 0')
        SKIPPED=$(echo "${TEST_SUMMARY}" | jq -r '.skipped // 0')
        ERRORS=$(echo "${TEST_SUMMARY}" | jq -r '.errors // 0')
        printf "  %-22s %s\n" "Total Tests:"    "${TOTAL}"
        printf "  %-22s %s\n" "Passed:"         "${PASSED}"
        printf "  %-22s %s\n" "Failed:"         "${FAILED}"
        printf "  %-22s %s\n" "Skipped:"        "${SKIPPED}"
        printf "  %-22s %s\n" "Errors:"         "${ERRORS}"
      fi

      # Display artifact directory if available
      ARTIFACT_DIR=$(jq -r '.stages[]? | select(.stage_name == "validate") | .result_detail.artifact_dir // empty' status_response.json 2>/dev/null)
      if [ -n "${ARTIFACT_DIR}" ]; then
        echo "  ------------------------------------------------------------"
        printf "  %-22s %s\n" "Artifact Directory:" "${ARTIFACT_DIR}"
      fi

      echo "  ============================================================"

# ---------------------------------------------------------------------------
# Summary stage -- always runs, displays final pipeline status
# ---------------------------------------------------------------------------
summary:
  stage: summary
  when: always
  script:
    - |
      echo "============================================================"
      echo "  DEPLOY PIPELINE SUMMARY"
      echo "============================================================"
      echo ""

      if [ -z "${JOB_ID:-}" ]; then
        echo "  No image group was selected. Deploy pipeline did not run."
        echo "============================================================"
        exit 0
      fi

      echo "  Job ID:         ${JOB_ID}"
      echo "  Image Group ID: ${IMAGE_GROUP_ID:-NOT SET}"
      echo ""

      # Authenticate and query current job state from API
      refresh_token

      HTTP_CODE=$(api_call_with_retry summary_response.json \
        -X GET "${BSM_API_URL}/api/v1/jobs/${JOB_ID}" \
        --cacert "${BSM_CERT_FILE}")
      [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

      if [ "$HTTP_CODE" != "200" ]; then
        echo "  [WARN] Could not fetch job status from API (HTTP ${HTTP_CODE})"
        echo "  Check individual stage logs for results."
        echo "============================================================"
        exit 0
      fi

      JOB_STATE=$(jq -r '.job_state // "UNKNOWN"' summary_response.json)
      DEPLOY_STATE=$(jq -r '(first(.stages[]? | select(.stage_name == "deploy") | .stage_state)) // "NOT_RUN"' summary_response.json 2>/dev/null)
      RESTART_STATE=$(jq -r '(first(.stages[]? | select(.stage_name == "restart") | .stage_state)) // "NOT_RUN"' summary_response.json 2>/dev/null)
      VALIDATE_STATE=$(jq -r '(first(.stages[]? | select(.stage_name == "validate") | .stage_state)) // "NOT_RUN"' summary_response.json 2>/dev/null)

      [ -z "${DEPLOY_STATE}" ]   && DEPLOY_STATE="NOT_RUN"
      [ -z "${RESTART_STATE}" ]  && RESTART_STATE="NOT_RUN"
      [ -z "${VALIDATE_STATE}" ] && VALIDATE_STATE="NOT_RUN"

      echo "  Stage Results:"
      echo "  ------------------------------------------------------------"
      printf "  %-24s %s\n" "Stage" "Status"
      printf "  %-24s %s\n" "-----" "------"
      printf "  %-24s %s\n" "deploy"   "${DEPLOY_STATE}"
      printf "  %-24s %s\n" "restart"  "${RESTART_STATE}"
      printf "  %-24s %s\n" "validate" "${VALIDATE_STATE}"
      echo "  ------------------------------------------------------------"
      printf "  %-24s %s\n" "Job State:" "${JOB_STATE}"
      echo ""

      # Determine pipeline result — check each stage for failure
      PIPELINE_FAILED=false
      FAILED_STAGE=""
      FAILED_STATE=""

      if [ "${DEPLOY_STATE}" = "FAILED" ] || [ "${DEPLOY_STATE}" = "CANCELLED" ]; then
        PIPELINE_FAILED=true
        FAILED_STAGE="deploy"
        FAILED_STATE="${DEPLOY_STATE}"
      elif [ "${RESTART_STATE}" = "FAILED" ] || [ "${RESTART_STATE}" = "CANCELLED" ]; then
        PIPELINE_FAILED=true
        FAILED_STAGE="restart"
        FAILED_STATE="${RESTART_STATE}"
      elif [ "${VALIDATE_STATE}" = "FAILED" ] || [ "${VALIDATE_STATE}" = "CANCELLED" ]; then
        PIPELINE_FAILED=true
        FAILED_STAGE="validate"
        FAILED_STATE="${VALIDATE_STATE}"
      fi

      # --- Download and display per-node restart results (if available) ---
      if [ "${RESTART_STATE}" = "COMPLETED" ] || [ "${RESTART_STATE}" = "SUCCEEDED" ] || [ "${RESTART_STATE}" = "FAILED" ]; then
        echo "  Downloading node restart results..."
        NR_HTTP=$(api_call_with_retry node_results.json \
          -X GET "${BSM_API_URL}/api/v1/jobs/${JOB_ID}/artifacts/node-results" \
          --cacert "${BSM_CERT_FILE}")
        [ -f /tmp/bsm_access_token ] && ACCESS_TOKEN=$(cat /tmp/bsm_access_token) && rm -f /tmp/bsm_access_token

        if [ "${NR_HTTP}" = "200" ] && [ -f node_results.json ]; then
          NR_TOTAL=$(jq -r '.total // 0' node_results.json 2>/dev/null)
          NR_OK=$(jq -r '.succeeded // 0' node_results.json 2>/dev/null)
          NR_FAIL=$(jq -r '.failed // 0' node_results.json 2>/dev/null)

          echo ""
          echo "  Node Restart Results:"
          echo "  ------------------------------------------------------------"
          printf "  %-24s %s\n" "Total Nodes:" "${NR_TOTAL}"
          printf "  %-24s %s\n" "Succeeded:"   "${NR_OK}"
          printf "  %-24s %s\n" "Failed:"      "${NR_FAIL}"
          echo "  ------------------------------------------------------------"

          # Show per-node detail (up to 50 nodes)
          NR_COUNT=$(jq '.nodes | length' node_results.json 2>/dev/null || echo 0)
          if [ "${NR_COUNT}" -gt 0 ]; then
            printf "  %-20s %-10s %s\n" "Host" "Status" "Detail"
            printf "  %-20s %-10s %s\n" "----" "------" "------"
            jq -r '.nodes[]? | "  \(.host // "unknown")  \(if .failed then "FAILED" else "OK" end)  \(.status // "")"' \
              node_results.json 2>/dev/null | head -50
          fi
          echo "  ------------------------------------------------------------"
          echo ""
        else
          echo "  [INFO] No node restart results available (HTTP ${NR_HTTP})"
          echo ""
        fi
      fi

      if [ "${PIPELINE_FAILED}" = "true" ]; then
        echo "  RESULT:  FAILED"
        echo "  Cause:   '${FAILED_STAGE}' stage reached state: ${FAILED_STATE}"
        echo "  Review '${FAILED_STAGE}' stage logs for details."
        echo "============================================================"
        exit 1
      fi

      DEPLOY_OK=false
      RESTART_OK=false
      VALIDATE_OK=false
      case "${DEPLOY_STATE}" in COMPLETED|SUCCEEDED) DEPLOY_OK=true ;; esac
      case "${RESTART_STATE}" in COMPLETED|SUCCEEDED) RESTART_OK=true ;; esac
      # validate NOT_RUN means stub ran (no API state) — treat as OK
      case "${VALIDATE_STATE}" in COMPLETED|SUCCEEDED|NOT_RUN) VALIDATE_OK=true ;; esac

      if [ "${DEPLOY_OK}" = "true" ] && [ "${RESTART_OK}" = "true" ] && [ "${VALIDATE_OK}" = "true" ]; then
        echo "  RESULT:  PASSED"
        echo "  All deploy pipeline stages completed successfully."
      else
        echo "  RESULT:  INCOMPLETE"
        echo "  Not all stages completed. Check individual stage logs."
      fi
      echo "============================================================"
